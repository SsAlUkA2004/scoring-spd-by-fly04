function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function fillTextEllipsis(ctx, text, x, y, maxWidth){
  if(!text) return;
  if(ctx.measureText(text).width <= maxWidth){ctx.fillText(text, x, y);return;}
  let truncated = text;
  while(truncated.length > 1 && ctx.measureText(truncated + '…').width > maxWidth){
    truncated = truncated.slice(0, -1);
  }
  ctx.fillText(truncated + '…', x, y);
}

async function captureTableImage(){
  if(_saveImageTid===null) return;
  const titleTxt=document.getElementById('imgModalTitle').value.trim()||'Race Table';
  const descTxt=document.getElementById('imgModalDesc').value.trim();
  const tObj=tables.find(t=>t.id===_saveImageTid);if(!tObj)return;
  const isLight=currentMode==='light';
  const pc=tObj.playerCount||4;
  const activeRows=tObj.rowCount||ROWS_BASE;

  const htmlEl=document.documentElement;
  const cs=getComputedStyle(htmlEl);
  const cv=(v,fb)=>{const val=cs.getPropertyValue(v).trim();return val||fb;};
  const bgColor   =cv('--bg',       isLight?'#dde8f8':'#04081a');
  const textColor =cv('--text',     isLight?'#0a1a3a':'#e8f0ff');
  const dimColor  =cv('--dim',      isLight?'#4a6898':'#5a78aa');
  const goldColor =cv('--gold',     isLight?'#b8860b':'#f5c518');
  const blueColor =cv('--ac1',      isLight?'#1558c0':'#1d6fe8');
  const blue2Color=cv('--ac2',      isLight?'#1a72e8':'#3b9dff');
  const greenClr  =cv('--green',    isLight?'#16a34a':'#22c55e');
  const s1Color   =cv('--s1',       isLight?'#c8daf5':'#071230');
  const cardBg    =isLight?'rgba(248,252,255,.98)':s1Color+'ee';
  const hdrBg     =isLight?cv('--s2','#b8ccee'):cv('--s1','#071230');
  const colAlt    =isLight?'rgba(21,88,192,.04)':'rgba(255,255,255,.02)';
  const borderClr =blueColor+'33';
  const redClr    ='#ef4444';

  const PAD=24;
  const LABEL_W=90;
  const COL_W=82;
  const ROW_RND=32;
  const ROW_P=66;
  const ROW_TOT=38;
  const TITLE_H=50;
  const DESC_H=descTxt?32:0;
  const FOOT=24;
  const STAGE_FONT=`600 8px "Exo 2",Sarabun,sans-serif`;
  const LINE_H=11;
  const STAGE_PAD=6;

  function wrapTextLines(ctx, text, maxW){
    if(!text) return ['—'];
    const words=text.split(' ');
    const lines=[];let cur='';
    for(const w of words){
      const test=cur?cur+' '+w:w;
      if(ctx.measureText(test).width>maxW&&cur){lines.push(cur);cur=w;}
      else cur=test;
    }
    if(cur)lines.push(cur);
    return lines.length?lines:['—'];
  }

  const tmpCanvas=document.createElement('canvas');
  const tmpCtx=tmpCanvas.getContext('2d');
  tmpCtx.font=STAGE_FONT;
  let maxLines=1;
  for(let r=0;r<activeRows;r++){
    const stg=tObj.rows[r].stage||'—';
    const lines=wrapTextLines(tmpCtx,stg,COL_W-8);
    if(lines.length>maxLines)maxLines=lines.length;
  }
  const ROW_STAGE=Math.max(28, maxLines*LINE_H + STAGE_PAD*2);

  const anyBans=(tObj.bans||[]).slice(0,pc).some(b=>b);
  const BAN_BAR_H=anyBans?22:0;
  const tableH=ROW_RND+ROW_STAGE+ROW_P*pc+ROW_TOT;
  const W=PAD*2+LABEL_W+COL_W*activeRows;
  const H=PAD+TITLE_H+DESC_H+BAN_BAR_H+tableH+FOOT;

  const canvas=document.createElement('canvas');
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=cardBg;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.fill();
  ctx.strokeStyle=blueColor+'44';ctx.lineWidth=1;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.stroke();

  const acc=ctx.createLinearGradient(PAD/2,0,W-PAD/2,0);
  acc.addColorStop(0,'transparent');acc.addColorStop(.3,blueColor);
  acc.addColorStop(.5,goldColor);acc.addColorStop(.7,blueColor);acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc;ctx.fillRect(PAD/2,PAD/2,W-PAD,3);

  let y=PAD+8;
  ctx.textAlign='center';ctx.fillStyle=goldColor;
  ctx.font=`bold 18px Rajdhani,Orbitron,sans-serif`;
  fillTextEllipsis(ctx,titleTxt,W/2,y+20,W-PAD*2-20);
  y+=TITLE_H;

  if(descTxt){
    ctx.font=`600 11px "Exo 2",Sarabun,sans-serif`;ctx.fillStyle=dimColor;
    fillTextEllipsis(ctx,descTxt,W/2,y+14,W-PAD*2-16);
    y+=DESC_H;
  }

  // BAN bar
  if(anyBans){
    ctx.fillStyle='rgba(239,68,68,.08)';
    ctx.fillRect(PAD,y,W-PAD*2,BAN_BAR_H);
    ctx.strokeStyle='rgba(239,68,68,.3)';ctx.lineWidth=.5;
    ctx.strokeRect(PAD,y,W-PAD*2,BAN_BAR_H);
    ctx.textAlign='left';ctx.font='700 8px Rajdhani,monospace';ctx.fillStyle='#ef4444';
    ctx.fillText('🚫',PAD+5,y+BAN_BAR_H/2+3);
    let bx=PAD+18;
    for(let bp=0;bp<pc;bp++){
      const bn=(tObj.bans||[])[bp]||'';if(!bn)continue;
      const pLabel=(tObj.players[bp]||'').trim()||('P'+(bp+1));
      const txt=pLabel+': '+bn;
      ctx.font='600 7px "Exo 2",sans-serif';ctx.fillStyle='#ef4444';
      ctx.fillText(txt,bx,y+BAN_BAR_H/2+3);
      bx+=ctx.measureText(txt).width+12;
      if(bx>W-PAD-20)break;
    }
    y+=BAN_BAR_H;
  }

  const allScores=[];
  const allParsed=[];
  const allBest=[];
  for(let r=0;r<activeRows;r++){
    const row=tObj.rows[r];
    const scores=calcScores(row,r,pc);
    const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
    const valid=parsed.filter(t=>t!==null);
    allScores.push(scores);allParsed.push(parsed);
    allBest.push(valid.length?Math.min(...valid):null);
  }
  const tots=Array(pc).fill(0);
  allScores.forEach(sc=>sc.forEach((s,p)=>{if(s!==null)tots[p]+=s;}));
  const maxT=Math.max(...tots,0);

  const colX=(r)=>PAD+LABEL_W+COL_W*r;
  const tableX=PAD;const tableW=W-PAD*2;

  ctx.fillStyle=hdrBg;ctx.fillRect(tableX,y,tableW,ROW_RND);
  ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,y,tableW,ROW_RND);
  ctx.textAlign='left';ctx.font=`700 9px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
  ctx.fillText(T('round').toUpperCase(),tableX+8,y+ROW_RND/2+4);
  for(let r=0;r<activeRows;r++){
    const cx=colX(r);
    if(r%2===1){ctx.fillStyle=colAlt;ctx.fillRect(cx,y,COL_W,ROW_RND);}
    const isKing=r in KM&&KM[r]<pc;
    ctx.textAlign='center';
    if(isKing){
      ctx.fillStyle=redClr;roundRect(ctx,cx+10,y+4,COL_W-20,ROW_RND-8,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`700 8px Rajdhani,sans-serif`;
      ctx.fillText(`${r+1} 👑`,cx+COL_W/2,y+ROW_RND/2+4);
    } else {
      ctx.fillStyle=blue2Color;ctx.font=`700 12px Rajdhani,sans-serif`;
      ctx.fillText(r+1,cx+COL_W/2,y+ROW_RND/2+5);
    }
    const divH=tableH-ROW_TOT;
    ctx.strokeStyle=borderClr;ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(cx,y);ctx.lineTo(cx,y+divH);ctx.stroke();
  }
  y+=ROW_RND;

  ctx.fillStyle=hdrBg;ctx.fillRect(tableX,y,tableW,ROW_STAGE);
  ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,y,tableW,ROW_STAGE);
  ctx.textAlign='left';ctx.font=`700 9px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
  ctx.fillText(T('stageLabel').toUpperCase(),tableX+8,y+ROW_STAGE/2+4);
  for(let r=0;r<activeRows;r++){
    const cx=colX(r);
    if(r%2===1){ctx.fillStyle=colAlt;ctx.fillRect(cx,y,COL_W,ROW_STAGE);}
    const stg=tObj.rows[r].stage||'—';
    ctx.font=STAGE_FONT;ctx.fillStyle=textColor;ctx.textAlign='center';
    const lines=wrapTextLines(ctx,stg,COL_W-8);
    const totalTextH=lines.length*LINE_H;
    const startY=y+(ROW_STAGE-totalTextH)/2+LINE_H-2;
    lines.forEach((line,li)=>{ctx.fillText(line,cx+COL_W/2,startY+li*LINE_H);});
  }
  y+=ROW_STAGE;

  const winCount=Array(pc).fill(0);
  if(pc===2){
    for(let r=0;r<activeRows;r++){
      const t0=allParsed[r][0],t1=allParsed[r][1];
      if(t0!==null&&t1!==null){
        if(t0<t1)winCount[0]++;
        else if(t1<t0)winCount[1]++;
      }
    }
  }

  for(let p=0;p<pc;p++){
    const pName=(tObj.players[p]||'').trim()||`P${p+1}`;
    const ry=y+ROW_P*p;
    const isEven=p%2===0;

    ctx.fillStyle=isEven?cardBg:colAlt;
    ctx.fillRect(tableX,ry,LABEL_W,ROW_P);
    ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,ry,LABEL_W,ROW_P);
    ctx.textAlign='left';

    if(pc===2){
      ctx.font=`600 7px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
      ctx.fillText(`${T('playerLabel')} ${p+1}`,tableX+7,ry+13);
      ctx.font=`700 11px Rajdhani,sans-serif`;ctx.fillStyle=goldColor;
      const wins=winCount[p];
      const winsStr=String(wins);
      ctx.font=`700 11px Rajdhani,monospace`;
      const winsW=ctx.measureText(' '+winsStr).width+4;
      ctx.font=`700 11px Rajdhani,sans-serif`;ctx.fillStyle=goldColor;
      fillTextEllipsis(ctx,pName,tableX+7,ry+28,LABEL_W-12-winsW);
      const isLeading=wins>0&&wins===Math.max(...winCount);
      const badgeX=tableX+LABEL_W-winsW-4;
      ctx.fillStyle=isLeading?'rgba(245,197,24,.18)':'rgba(255,255,255,.06)';
      roundRect(ctx,badgeX-2,ry+19,winsW+2,14,4);ctx.fill();
      ctx.strokeStyle=isLeading?goldColor+'88':borderClr;ctx.lineWidth=.5;
      roundRect(ctx,badgeX-2,ry+19,winsW+2,14,4);ctx.stroke();
      ctx.font=`700 11px Rajdhani,monospace`;
      ctx.fillStyle=isLeading?goldColor:dimColor;
      ctx.textAlign='center';
      ctx.fillText(winsStr,badgeX+winsW/2-1,ry+29);
    } else {
      ctx.font=`600 8px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
      ctx.fillText(`${T('playerLabel')} ${p+1}`,tableX+7,ry+14);
      ctx.font=`700 12px Rajdhani,sans-serif`;ctx.fillStyle=goldColor;
      fillTextEllipsis(ctx,pName,tableX+7,ry+30,LABEL_W-12);
    }

    for(let r=0;r<activeRows;r++){
      const cx=colX(r);
      const isB=allParsed[r][p]!==null&&allParsed[r][p]===allBest[r];
      const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
      const isKC=isKing&&p===kp;

      ctx.fillStyle=isEven?cardBg:colAlt;
      ctx.fillRect(cx,ry,COL_W,ROW_P);
      ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(cx,ry,COL_W,ROW_P);

      if(isB){
        ctx.strokeStyle=isKC?redClr:goldColor;ctx.lineWidth=2;
        roundRect(ctx,cx+3,ry+3,COL_W-6,ROW_P-6,5);ctx.stroke();
        ctx.fillStyle=isKC?'rgba(239,68,68,.1)':'rgba(245,197,24,.1)';
        roundRect(ctx,cx+3,ry+3,COL_W-6,ROW_P-6,5);ctx.fill();
      }

      const tv=tObj.rows[r].times[p]||'—';
      ctx.textAlign='center';
      ctx.fillStyle=isB?(isKC?redClr:goldColor):textColor;
      ctx.font=`700 12px Rajdhani,monospace`;
      ctx.fillText(tv,cx+COL_W/2,ry+ROW_P/2+1);

      const s=allScores[r][p];
      const scoreChipY=ry+ROW_P/2+7;
      if(s!==null){
        const cW=30,cH=13,cX=cx+COL_W/2-cW/2,cY=scoreChipY;
        ctx.fillStyle=s===12?'rgba(239,68,68,.2)':s===11?'rgba(245,197,24,.2)':s>=8?'rgba(34,197,94,.15)':'rgba(90,120,170,.1)';
        roundRect(ctx,cX,cY,cW,cH,6);ctx.fill();
        ctx.fillStyle=s===12?redClr:s===11?goldColor:s>=8?greenClr:dimColor;
        ctx.font=`700 8px Rajdhani,monospace`;ctx.textAlign='center';
        ctx.fillText(`+${s}`,cx+COL_W/2,cY+cH/2+3);
      } else if(activeRows>ROWS_BASE&&r>=ROWS_BASE){
        ctx.fillStyle=dimColor;ctx.font=`600 7px Rajdhani,monospace`;ctx.textAlign='center';
        ctx.fillText('NO PT',cx+COL_W/2,ry+ROW_P-16);
      }
      // ── Car name ──
      const carName=((tObj.rows[r].cars||[])[p]||'').trim();
      if(carName){
        const carCls=getCarClass(carName);
        const carColor=carCls==='T'?'#22c55e':carCls==='A'?'#a855f7':dimColor;
        ctx.font=`600 7px "Exo 2",sans-serif`;ctx.textAlign='center';ctx.fillStyle=carColor;
        fillTextEllipsis(ctx,carName,cx+COL_W/2,ry+ROW_P-4,COL_W-8);
      }
    }
  }
  y+=ROW_P*pc;

  const totGrad=ctx.createLinearGradient(tableX,y,tableX+tableW,y);
  totGrad.addColorStop(0,blueColor+'55');totGrad.addColorStop(.5,goldColor+'33');totGrad.addColorStop(1,blueColor+'55');
  ctx.fillStyle=totGrad;ctx.fillRect(tableX,y,tableW,ROW_TOT);

  const topLineGrad=ctx.createLinearGradient(tableX,y,tableX+tableW,y);
  topLineGrad.addColorStop(0,'transparent');topLineGrad.addColorStop(.2,goldColor+'99');
  topLineGrad.addColorStop(.5,goldColor);topLineGrad.addColorStop(.8,goldColor+'99');topLineGrad.addColorStop(1,'transparent');
  ctx.strokeStyle=topLineGrad;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tableX,y);ctx.lineTo(tableX+tableW,y);ctx.stroke();

  ctx.textAlign='left';ctx.font=`700 10px Rajdhani,monospace`;ctx.fillStyle=goldColor;
  ctx.fillText('⚡ '+T('grandTotal').replace('⚡','').trim(),tableX+7,y+ROW_TOT/2+4);

  const scoreAreaX=tableX+LABEL_W;
  const scoreAreaW=tableW-LABEL_W;
  const scoreColW=scoreAreaW/pc;
  const FONT_SIZE=10;

  for(let p=0;p<pc;p++){
    const pName=(tObj.players[p]||'').trim()||`P${p+1}`;
    const sx=scoreAreaX+scoreColW*p;
    const isTop=tots[p]===maxT&&tots[p]>0;
    const cx2=sx+scoreColW/2;

    ctx.font=`700 ${FONT_SIZE}px Rajdhani,sans-serif`;
    const nameW=ctx.measureText(pName).width;
    const scoreStr=String(tots[p]);
    const scoreW=ctx.measureText(scoreStr).width;

    const gap=6;
    const totalW=nameW+gap+scoreW;
    const startX=cx2-totalW/2;
    const textY=y+ROW_TOT/2+4;

    ctx.font=`700 ${FONT_SIZE}px Rajdhani,sans-serif`;
    ctx.fillStyle=isTop?goldColor:dimColor;
    ctx.textAlign='left';
    ctx.fillText(pName,startX,textY);

    ctx.font=`700 ${FONT_SIZE}px Rajdhani,monospace`;
    ctx.fillStyle=isTop?goldColor:blue2Color;
    if(isTop){ctx.shadowColor=goldColor;ctx.shadowBlur=8;}
    ctx.fillText(scoreStr,startX+nameW+gap,textY);
    ctx.shadowBlur=0;ctx.shadowColor='transparent';
  }

  ctx.textAlign='right';ctx.font=`500 8px "Exo 2",sans-serif`;ctx.fillStyle=dimColor+'99';
  ctx.fillText('🏁 Race Time Tracker',W-PAD,H-8);

  const link=document.createElement('a');
  link.download=`race_match_${tObj.id+1}_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
  closeSaveImgModal();
}

// ── IMPORT EXCEL ──
function importExcel(){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded');return;}
  const input=document.createElement('input');input.type='file';input.accept='.xlsx';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const buf=await file.arrayBuffer();
    const wb=new ExcelJS.Workbook();
    try{await wb.xlsx.load(buf);}catch(err){alert(T('importErrRead')+': '+err.message);return;}
    const ws=wb.worksheets[0];if(!ws){alert(T('importErrSheet'));return;}

    const rows=[];
    ws.eachRow((row,rn)=>{
      const vals=[];
      row.eachCell({includeEmpty:true},(cell,cn)=>{
        let v=cell.value;
        if(v&&typeof v==='object'){
          if(v.richText)v=v.richText.map(r=>r.text).join('');
          else if(v.result!==undefined)v=v.result;
          else if(v.text)v=v.text;
        }
        vals[cn-1]=v===null||v===undefined?'':String(v).trim();
      });
      rows.push({rn,vals});
    });
    if(rows.length<4){alert(T('importErrData'));return;}

    const round1Patterns=[/[-–]\s*(รอบ|Round|Vòng|回合|轮次)\s*1\b/i];
    const roundPatterns=[/\b(รอบ|Round|Vòng|回合|轮次)\s*(\d+)/i];
    function isRound1(s){return round1Patterns.some(p=>p.test(s));}
    function getRoundNum(s){for(const p of roundPatterns){const m=s.match(p);if(m)return parseInt(m[2]);}return null;}
    const matchHdrPatterns=[/^(การแข่งขัน|Match|Trận|比赛|比賽)\s*\d+$/i];
    function isMatchHdr(s){return matchHdrPatterns.some(p=>p.test(s.trim()));}
    const totalPatterns=[/คะแนนรวม/,/Total/i,/总计/,/Tổng/i,/總計/,/Grand/i];
    function isTotalRow(s){return totalPatterns.some(p=>p.test(s));}

    const newTables=[];
    let currentT=null;

    for(let ri=3;ri<rows.length;ri++){
      const vals=rows[ri].vals;
      const c1=(vals[0]||'').trim();
      const c2=(vals[1]||'').trim();

      if(isTotalRow(c1)||isTotalRow(c2))continue;

      if(isMatchHdr(c1)){
        const matchPlayers=[];
        for(let p=0;p<MAX_P;p++){
          const pName=(vals[2+p*2]||'').trim();
          matchPlayers.push(pName&&pName!=='—'?pName:'');
        }
        const matchPc=Math.max(2,matchPlayers.filter(n=>n).length||2);
        currentT=mkTable(matchPc);
        currentT.players=matchPlayers.concat(Array(MAX_P-matchPlayers.length).fill('')).slice(0,MAX_P);
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
        continue;
      }

      if(!currentT&&isRound1(c2)){
        const globalPlayers=[];
        for(let p=0;p<MAX_P;p++){
          const pName=(rows[1].vals[2+p*2]||'').trim();
          globalPlayers.push(pName&&pName!=='undefined'?pName:'');
        }
        const gpc=Math.max(2,globalPlayers.filter(n=>n).length||2);
        currentT=mkTable(gpc);
        currentT.players=globalPlayers.slice(0,MAX_P);
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
      } else if(currentT&&isRound1(c2)){
        const prevT=currentT;
        currentT=mkTable(prevT.playerCount);
        currentT.players=[...prevT.players];
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
      }

      if(!currentT)continue;

      // ── Car sub-row ──
      const carRowM=c2.match(/^\[Car\]\s*(?:รอบ|Round|Vòng|回合|轮次)\s*(\d+)/i);
      if(carRowM){
        const rIdx=parseInt(carRowM[1])-1;
        if(rIdx>=0&&rIdx<ROWS_MAX){
          for(let p=0;p<(currentT.playerCount||MAX_P);p++){
            const ci=2+p*2;const cn=(vals[ci]||'').trim();
            if(cn){if(!currentT.rows[rIdx].cars)currentT.rows[rIdx].cars=Array(MAX_P).fill('');currentT.rows[rIdx].cars[p]=cn;}
          }
        }
        continue;
      }

      // ── Ban row ──
      if(/^🚫\s*Ban$/i.test(c2)){
        if(!currentT.bans)currentT.bans=Array(MAX_P).fill('');
        for(let p=0;p<(currentT.playerCount||MAX_P);p++){
          const bi=2+p*2;const bn=(vals[bi]||'').trim();
          if(bn)currentT.bans[p]=bn;
        }
        continue;
      }

      const roundMatch=c2.match(/(?:[-–]\s*)?(?:รอบ|Round|Vòng|回合|轮次)\s*(\d+)(?:\s*\(([^)]*)\))?/i);
      if(!roundMatch)continue;
      const roundIdx=parseInt(roundMatch[1])-1;
      const stageName=(roundMatch[2]||'').trim();
      if(roundIdx<0||roundIdx>=ROWS_MAX)continue;

      if(stageName)currentT.rows[roundIdx].stage=stageName;

      for(let p=0;p<(currentT.playerCount||MAX_P);p++){
        const colIdx=2+p*2;
        const tv=(vals[colIdx]||'').trim();
        if(tv&&tv!=='0'&&/\d/.test(tv))currentT.rows[roundIdx].times[p]=tv;
      }
      currentT.rowCount=Math.max(currentT.rowCount,roundIdx+1);
      if(currentT.rowCount<ROWS_BASE)currentT.rowCount=ROWS_BASE;
    }

    if(!newTables.length){alert(T('importFail'));return;}

    const choice=window.confirm(
      `${T('importExcel')}: ${T('importSuccess')} ${newTables.length} ${T('matchUnit')}\n\n` +
      `OK → ${T('addMatch')}\n` +
      `Cancel → ${T('clearData')}`
    );
    if(choice===false){
      tables=newTables;
      tc=newTables.length?Math.max(...newTables.map(t=>t.id))+1:0;
    } else {
      newTables.forEach(t=>tables.push(t));
      tc=tables.length?Math.max(...tables.map(t=>t.id))+1:0;
    }
    save();renderAll();
    alert(`✅ ${T('importSuccess')} ${newTables.length} ${T('matchUnit')}`);
  };
  input.click();
}

function calcStageRecords(tableList){
  // rc = { playerName: count }  (ties both get credit)
  const rc={};
  tableList.forEach(tObj=>{
    const pc=tObj.playerCount||4;
    const ar=tObj.rowCount||ROWS_BASE;
    tObj.rows.forEach((row,r)=>{
      if(r>=ar)return;
      const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
      const valid=parsed.filter(t=>t!==null);
      if(!valid.length)return;
      const best=Math.min(...valid);
      parsed.forEach((t,p)=>{
        if(t===best){
          const name=(tObj.players[p]||'').trim()||`P${p+1}`;
          rc[name]=(rc[name]||0)+1;
        }
      });
    });
  });
  return rc;
}

    const cy=ry+ROW_H/2+1;

    // row bg
    ctx.fillStyle=rank===1?'rgba(245,197,24,.08)':rank===2?'rgba(148,163,184,.04)':rank===3?'rgba(205,127,50,.04)':i%2===1?rowAlt:cardBg;
    ctx.fillRect(PAD,ry,W-PAD*2,ROW_H);
    ctx.strokeStyle=blueColor+'18';ctx.lineWidth=.5;ctx.strokeRect(PAD,ry,W-PAD*2,ROW_H);

    // left accent stripe
    const stripeColor=rank<=3?RANK_COLORS[rank-1]:'#334155';
    ctx.fillStyle=stripeColor;ctx.fillRect(PAD,ry,3,ROW_H);

    // rank / medal
    ctx.textAlign='center';
    if(rank<=3){
      ctx.font=`14px serif`;ctx.fillText(MEDALS[rank-1],rankX,cy+5);
    } else {
      ctx.font=`700 10px Orbitron,monospace`;ctx.fillStyle='#475569';
      ctx.fillText('#'+rank,rankX,cy+4);
    }

    // player name
    const nameColor=rank<=3?RANK_COLORS[rank-1]:textColor;
    ctx.textAlign='left';ctx.font=`700 11px "Exo 2",Sarabun,sans-serif`;ctx.fillStyle=nameColor;
    if(rank===1){ctx.shadowColor=goldColor;ctx.shadowBlur=8;}
    fillTextEllipsis(ctx,item.name,PAD+RANK_COL+8,cy+5,NAME_COL-14);
    ctx.shadowBlur=0;ctx.shadowColor='transparent';

    // progress bar
    const barX=PAD+RANK_COL+NAME_COL+8;
    const barW=BAR_COL-20;
    const barH=5;const barY=cy+1;
    ctx.fillStyle=isLight?'rgba(0,0,0,.08)':'rgba(255,255,255,.08)';
    roundRect(ctx,barX,barY-barH/2,barW,barH,3);ctx.fill();
    const filled=maxCount>0?Math.round(item.count/maxCount*barW):0;
    if(filled>0){
      const bc=rank<=3?BAR_COLORS[rank-1]:null;
      if(bc){
        const bg=ctx.createLinearGradient(barX,0,barX+filled,0);
        bg.addColorStop(0,bc[0]);bg.addColorStop(1,bc[1]);
        ctx.fillStyle=bg;
      } else {
        const bg2=ctx.createLinearGradient(barX,0,barX+filled,0);
        bg2.addColorStop(0,blueColor);bg2.addColorStop(1,blue2);
        ctx.fillStyle=bg2;
      }
      roundRect(ctx,barX,barY-barH/2,filled,barH,3);ctx.fill();
    }

    // count number
    ctx.textAlign='center';
    ctx.font=`900 14px Orbitron,monospace`;
    ctx.fillStyle=rank<=3?RANK_COLORS[rank-1]:blue2;
    if(rank===1){ctx.shadowColor=goldColor;ctx.shadowBlur=10;}
    ctx.fillText(item.count,countX,cy+5);
    ctx.shadowBlur=0;ctx.shadowColor='transparent';
  });

  y+=ROW_H*sorted.length;

  // ── Footer ──
  ctx.textAlign='right';ctx.font=`500 8px "Exo 2",sans-serif`;ctx.fillStyle=dimColor+'99';
  ctx.fillText('🏁 Race Time Tracker',W-PAD,H-10);

  const link=document.createElement('a');
  const safeName=(cat?cat.name:'all').replace(/[^a-zA-Z0-9ก-๙]/g,'_').substring(0,20);
  link.download=`stage_records_${safeName}_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
}

// CAR USAGE STATS

function calcCarUsage(tableList){
  const usage={};
  tableList.forEach(tObj=>{
    const pc=tObj.playerCount||4;
    const ar=tObj.rowCount||ROWS_BASE;
    tObj.rows.forEach((row,r)=>{
      if(r>=ar)return;
      (row.cars||[]).slice(0,pc).forEach(car=>{
        const name=(car||'').trim();
        if(name)usage[name]=(usage[name]||0)+1;
      });
    });
  });
  return usage;
}

function getCarClass(name){
  if(CAR_T.includes(name))return'T';
  if(CAR_A.includes(name))return'A';
  return'?';
}

let _carStatsCatId=null,_carStatsFilter='all';

function openCarStatsModal(catId){
  _carStatsCatId=catId;
  _carStatsFilter='all';
  const cat=catId!=null?categories.find(c=>c.id===catId):null;
  const title=cat?`🚗 ${T('carStats')} — ${cat.name}`:`🚗 ${T('allCarStats')}`;
  document.getElementById('carStatsModalTitle').textContent=title;
  _renderCarStatsBody();
  document.getElementById('carStatsModal').style.display='flex';
  document.body.style.overflow='hidden';
}

function _renderCarStatsBody(){
  const cat=_carStatsCatId!=null?categories.find(c=>c.id===_carStatsCatId):null;
  const tList=cat?tables.filter(t=>t.catId===_carStatsCatId):tables;
  const usage=calcCarUsage(tList);
  const filter=_carStatsFilter;

  // ── Filter tabs ──
  const filterDiv=document.getElementById('carStatsFilter');
  filterDiv.innerHTML='';
  const tabs=[
    {key:'all',  label:T('allClasses'), color:'var(--blue2)'},
    {key:'T',    label:'🟢 '+T('classT'), color:'#22c55e'},
    {key:'A',    label:'🟣 '+T('classA'), color:'#a855f7'},
  ];
  tabs.forEach(tab=>{
    const btn=document.createElement('button');
    btn.style.cssText=[
      'padding:4px 12px;border-radius:6px;cursor:pointer;',
      'font-family:Rajdhani,monospace;font-size:.68rem;font-weight:700;',
      'letter-spacing:.5px;transition:all .18s;border:1px solid;',
      filter===tab.key
        ?`background:${tab.color};color:#fff;border-color:${tab.color};box-shadow:0 0 8px ${tab.color}44;`
        :`background:transparent;color:${tab.color};border-color:${tab.color}55;`,
    ].join('');
    btn.textContent=tab.label;
    btn.addEventListener('click',()=>{_carStatsFilter=tab.key;_renderCarStatsBody();});
    filterDiv.appendChild(btn);
  });

  // ── Build sorted list ──
  let sorted=Object.entries(usage)
    .map(([name,count])=>({name,count,cls:getCarClass(name)}))
    .filter(item=>filter==='all'||item.cls===filter)
    .sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));

  const body=document.getElementById('carStatsBody');
  body.innerHTML='';

  if(!sorted.length){
    body.innerHTML=`<div style="padding:32px;text-align:center;color:var(--dim);font-family:'Rajdhani',monospace;font-size:.85rem;letter-spacing:.5px;">${T('noDataYet')}</div>`;
    return;
  }

  const maxCount=sorted[0].count;
  const CLS_COLOR={T:'#22c55e',A:'#a855f7','?':'var(--dim)'};

  // column headers
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 14px 5px;border-bottom:1px solid var(--card-border);background:var(--hdr-bg);flex-shrink:0;';
  hdr.innerHTML=`
    <div style="width:22px;flex-shrink:0;"></div>
    <div style="flex:1;font-family:'Rajdhani',monospace;font-size:.6rem;font-weight:700;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;">${T('carLabel')}</div>
    <div style="width:80px;flex-shrink:0;font-family:'Rajdhani',monospace;font-size:.6rem;font-weight:700;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;text-align:right;">${T('carUsage').toUpperCase()}</div>
  `;
  body.appendChild(hdr);

  sorted.forEach((item,i)=>{
    const clsColor=CLS_COLOR[item.cls]||'var(--dim)';
    const pct=maxCount>0?Math.round(item.count/maxCount*100):0;
    const isTop=i===0;

    const row=document.createElement('div');
    row.style.cssText=[
      'display:flex;align-items:center;gap:8px;padding:9px 14px;',
      'border-bottom:1px solid var(--tbl-row-border);',
      'transition:background .12s;position:relative;',
      isTop?'background:rgba(168,85,247,.06);':'',
    ].join('');
    row.addEventListener('mouseenter',()=>{if(!isTop)row.style.background='var(--card-hover)';});
    row.addEventListener('mouseleave',()=>{if(!isTop)row.style.background='';});

    // class dot + rank
    const rankCell=document.createElement('div');
    rankCell.style.cssText='width:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;';
    const dot=document.createElement('div');
    dot.style.cssText=`width:8px;height:8px;border-radius:50%;background:${clsColor};flex-shrink:0;box-shadow:0 0 6px ${clsColor}88;`;
    rankCell.appendChild(dot);

    // name + bar
    const info=document.createElement('div');info.style.cssText='flex:1;min-width:0;';
    const nameEl=document.createElement('div');
    nameEl.style.cssText=`font-family:'Exo 2',sans-serif;font-weight:${isTop?'700':'600'};font-size:.82rem;color:${isTop?clsColor:'var(--text)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;`;
    nameEl.textContent=item.name;nameEl.title=item.name;

    const clsBadge=document.createElement('span');
    clsBadge.style.cssText=`font-family:'Rajdhani',monospace;font-size:.56rem;font-weight:700;color:${clsColor};margin-left:6px;letter-spacing:.5px;opacity:.8;`;
    clsBadge.textContent=item.cls==='?'?'':item.cls;
    nameEl.appendChild(clsBadge);

    const barTrack=document.createElement('div');
    barTrack.style.cssText='height:3px;background:var(--input-bg);border-radius:2px;overflow:hidden;margin-top:4px;';
    const barFill=document.createElement('div');
    barFill.style.cssText=`height:100%;border-radius:2px;background:linear-gradient(90deg,${clsColor}aa,${clsColor});width:0%;transition:width .5s ease;`;
    barTrack.appendChild(barFill);
    setTimeout(()=>{barFill.style.width=pct+'%';},30+i*10);
    info.appendChild(nameEl);info.appendChild(barTrack);

    // count
    const countWrap=document.createElement('div');
    countWrap.style.cssText='flex-shrink:0;width:80px;text-align:right;';
    const numEl=document.createElement('div');
    numEl.style.cssText=`font-family:'Orbitron',monospace;font-weight:900;font-size:${isTop?'1.1':'0.9'}rem;color:${isTop?clsColor:'var(--blue2)'};${isTop?'text-shadow:0 0 12px '+clsColor+'77;':''}`;
    numEl.textContent=item.count;
    const unitEl=document.createElement('div');
    unitEl.style.cssText="font-family:'Rajdhani',monospace;font-size:.58rem;color:var(--dim);letter-spacing:.5px;text-transform:uppercase;margin-top:1px;";
    unitEl.textContent=T('carUsage');
    countWrap.appendChild(numEl);countWrap.appendChild(unitEl);

    row.appendChild(rankCell);row.appendChild(info);row.appendChild(countWrap);
    body.appendChild(row);
  });
  if(body.lastElementChild&&body.lastElementChild!==hdr)body.lastElementChild.style.borderBottom='none';
}

  document.body.style.overflow='';

function saveCarStatsImage(){
  const titleEl=document.getElementById('carStatsModalTitle');
  const titleTxt=titleEl?titleEl.textContent:'🚗 Car Stats';
  const cat=_carStatsCatId!=null?categories.find(c=>c.id===_carStatsCatId):null;
  const tList=cat?tables.filter(t=>t.catId===_carStatsCatId):tables;
  const usage=calcCarUsage(tList);
  const filter=_carStatsFilter;
  let sorted=Object.entries(usage)
    .map(([name,count])=>({name,count,cls:getCarClass(name)}))
    .filter(item=>filter==='all'||item.cls===filter)
    .sort((a,b)=>b.count-a.count||a.name.localeCompare(b.name));
  if(!sorted.length){alert(T('noDataYet'));return;}

  const isLight=currentMode==='light';
  const cs=getComputedStyle(document.documentElement);
  const cv=(v,fb)=>cs.getPropertyValue(v).trim()||fb;
  const bgColor =cv('--bg',    isLight?'#dde8f8':'#04081a');
  const textColor=cv('--text', isLight?'#0a1a3a':'#e8f0ff');
  const dimColor =cv('--dim',  isLight?'#4a6898':'#5a78aa');
  const goldColor=cv('--gold', isLight?'#b8860b':'#f5c518');
  const blueColor=cv('--ac1',  isLight?'#1558c0':'#1d6fe8');
  const blue2    =cv('--ac2',  isLight?'#1a72e8':'#3b9dff');
  const s1Color  =cv('--s1',   isLight?'#c8daf5':'#071230');
  const cardBg   =isLight?'rgba(255,255,255,.98)':s1Color+'ee';
  const hdrBg    =isLight?cv('--s2','#b8ccee'):s1Color;
  const rowAlt   =isLight?'rgba(0,0,0,.03)':'rgba(255,255,255,.025)';

  const CLS_COLOR={T:'#22c55e',A:'#a855f7','?':dimColor};
  const PAD=26,DOT_COL=28,NAME_COL=240,BAR_COL=110,COUNT_COL=70;
  const W=PAD*2+DOT_COL+NAME_COL+BAR_COL+COUNT_COL;
  const TITLE_H=54,HDR_H=34,ROW_H=40,FOOT=26;
  const H=PAD+TITLE_H+HDR_H+ROW_H*sorted.length+FOOT;
  const maxCount=sorted[0].count;

  const canvas=document.createElement('canvas');
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  // bg + card
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=cardBg;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.fill();
  ctx.strokeStyle=blueColor+'44';ctx.lineWidth=1;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.stroke();
  const acc=ctx.createLinearGradient(PAD/2,0,W-PAD/2,0);
  acc.addColorStop(0,'transparent');acc.addColorStop(.35,blueColor);acc.addColorStop(.65,'#a855f7');acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc;ctx.fillRect(PAD/2,PAD/2,W-PAD,3);

  // title
  let y=PAD+6;
  ctx.textAlign='center';ctx.fillStyle=goldColor;
  ctx.font='bold 17px Rajdhani,Orbitron,sans-serif';
  fillTextEllipsis(ctx,titleTxt,W/2,y+22,W-PAD*2-16);
  y+=TITLE_H;

  // col headers
  ctx.fillStyle=hdrBg;ctx.fillRect(PAD,y,W-PAD*2,HDR_H);
  ctx.strokeStyle=blueColor+'44';ctx.lineWidth=.5;ctx.strokeRect(PAD,y,W-PAD*2,HDR_H);
  ctx.font='700 9px Rajdhani,sans-serif';ctx.fillStyle=dimColor;
  const nameStartX=PAD+DOT_COL+6;
  ctx.textAlign='left';ctx.fillText(T('carLabel').toUpperCase(),nameStartX,y+HDR_H/2+3);
  ctx.textAlign='right';ctx.fillText(T('carUsage').toUpperCase(),W-PAD-6,y+HDR_H/2+3);
  y+=HDR_H;

  sorted.forEach((item,i)=>{
    const ry=y+i*ROW_H;const cy=ry+ROW_H/2;
    const cc=CLS_COLOR[item.cls]||dimColor;
    ctx.fillStyle=i===0?'rgba(168,85,247,.07)':i%2===1?rowAlt:cardBg;
    ctx.fillRect(PAD,ry,W-PAD*2,ROW_H);
    ctx.strokeStyle=blueColor+'18';ctx.lineWidth=.5;ctx.strokeRect(PAD,ry,W-PAD*2,ROW_H);

    // accent stripe
    ctx.fillStyle=cc;ctx.fillRect(PAD,ry,3,ROW_H);

    // class dot
    ctx.beginPath();ctx.arc(PAD+DOT_COL/2,cy,5,0,Math.PI*2);
    ctx.fillStyle=cc;ctx.fill();
    if(i===0){ctx.shadowColor=cc;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;}

    // car name
    ctx.textAlign='left';ctx.font=(i===0?'700':'600')+' 11px "Exo 2",Sarabun,sans-serif';
    ctx.fillStyle=i===0?cc:textColor;
    fillTextEllipsis(ctx,item.name,nameStartX,cy+4,NAME_COL-14);

    // class badge
    ctx.font='700 8px Rajdhani,sans-serif';ctx.fillStyle=cc;ctx.globalAlpha=.7;
    const nw=ctx.measureText(item.name+'  ').width;
    ctx.fillText(item.cls==='?'?'':item.cls,nameStartX+Math.min(nw,NAME_COL-30),cy+4);
    ctx.globalAlpha=1;

    // bar
    const barX=PAD+DOT_COL+NAME_COL+8;
    const barW=BAR_COL-20;const barH=5;const barY=cy-barH/2;
    ctx.fillStyle=isLight?'rgba(0,0,0,.07)':'rgba(255,255,255,.07)';
    roundRect(ctx,barX,barY,barW,barH,3);ctx.fill();
    const filled=maxCount>0?Math.round(item.count/maxCount*barW):0;
    if(filled>0){
      const bg=ctx.createLinearGradient(barX,0,barX+filled,0);
      bg.addColorStop(0,cc+'aa');bg.addColorStop(1,cc);
      ctx.fillStyle=bg;
      roundRect(ctx,barX,barY,filled,barH,3);ctx.fill();
    }

    // count
    ctx.textAlign='right';ctx.font='900 13px Orbitron,monospace';
    ctx.fillStyle=i===0?cc:blue2;
    if(i===0){ctx.shadowColor=cc;ctx.shadowBlur=8;}
    ctx.fillText(item.count,W-PAD-6,cy+5);
    ctx.shadowBlur=0;ctx.shadowColor='transparent';
    ctx.font='500 8px Rajdhani,sans-serif';ctx.fillStyle=dimColor;
    ctx.fillText(T('carUsage'),W-PAD-6,cy+14);
  });

  ctx.textAlign='right';ctx.font='500 8px "Exo 2",sans-serif';ctx.fillStyle=dimColor+'99';
  ctx.fillText('🏁 Race Time Tracker',W-PAD,H-10);

  const link=document.createElement('a');
  const safeName=(cat?cat.name:'all').replace(/[^a-zA-Z0-9฀-๿]/g,'_').substring(0,20);
  const filterLabel=_carStatsFilter==='all'?'all':_carStatsFilter;
  link.download='car_stats_'+safeName+'_'+filterLabel+'_'+Date.now()+'.png';
  link.href=canvas.toDataURL('image/png');link.click();
}

  document.body.style.overflow='';

// ── THEME SYSTEM ──
const COLOR_SWATCHES={
  blue:'linear-gradient(135deg,#1d6fe8,#3b9dff)',
  red:'linear-gradient(135deg,#e81d1d,#ff4d4d)',
  green:'linear-gradient(135deg,#1db858,#2ecc71)',
  cyan:'linear-gradient(135deg,#0891b2,#22d3ee)',
  yellow:'linear-gradient(135deg,#d4a017,#fbbf24)',
  purple:'linear-gradient(135deg,#7c3aed,#a855f7)',
  orange:'linear-gradient(135deg,#e85c1d,#fb923c)',
  pink:'linear-gradient(135deg,#db2777,#f472b6)',
};
let currentColor=localStorage.getItem('rtColor')||'blue';
let currentMode=localStorage.getItem('rtMode')||'dark';

function applyTheme(color,mode){
  currentColor=color; currentMode=mode;
  const html=document.documentElement;
  html.setAttribute('data-color',color);
  html.setAttribute('data-mode',mode);
  const sw=document.getElementById('themeSwatch');
  if(sw) sw.style.background=COLOR_SWATCHES[color]||'';
  document.querySelectorAll('.tp-color').forEach(b=>b.classList.toggle('active',b.dataset.color===color));
  document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  localStorage.setItem('rtColor',color);localStorage.setItem('rtMode',mode);
}
function setColor(c){applyTheme(c,currentMode);}
function setMode(m){applyTheme(currentColor,m);}

function toggleThemePanel(){
  const panel=document.getElementById('themePanel');
  const btn=document.getElementById('themeToggle');
  const open=panel.classList.contains('open');
  if(!open){
    const rect=btn.getBoundingClientRect();
    const panelW=210;
    let left=rect.right-panelW;
    if(left<8)left=8;
    if(left+panelW>window.innerWidth-8)left=window.innerWidth-panelW-8;
    panel.style.top=(rect.bottom+6)+'px';
    panel.style.left=left+'px';
    panel.style.right='auto';
  }
  panel.classList.toggle('open',!open);
  btn.classList.toggle('open',!open);
}
document.addEventListener('click',e=>{
  const wrap=document.getElementById('themeWrap');
  if(wrap&&!wrap.contains(e.target)){
    document.getElementById('themePanel')?.classList.remove('open');
    document.getElementById('themeToggle')?.classList.remove('open');
  }
});

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTotals();closeCatModal();closeBestTimeModal();closeScoreModal();closeStageRecModal();closeCarStatsModal();}});
applyTheme(currentColor, currentMode);
loadState();
document.querySelectorAll('.lang-opt').forEach(o=>o.classList.toggle('active',o.dataset.lang===lang));
document.getElementById('globeLabel').textContent=T('globeLabel');
buildTitle();
document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
renderAll();
