/* Apply ac vars as blue2/blue3 etc for compatibility */
[data-color]{
  --blue:var(--ac1);--blue2:var(--ac2);--blue3:var(--ac3);
  --red:#ef4444;--red2:#dc2626;--cyan:#22d3ee;--green:#22c55e;
}
html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Exo 2','Sarabun',sans-serif;
  overflow-x:hidden;
  transition:background .35s,color .35s;
}

/* Heading font: Rajdhani — sharp, sporty, great for UI labels */
.orb-font, .block-num, .pctrl-lbl, .pc-val,
.th-player-lbl, .th-pi, .th-rnd-inner, .th-stage-inner,
.rnd-lbl, .score-chip, .total-val, .tr-lbl,
.lb-score, .lb-rank, .modal-title,
.sb-hdr h2, .btn, .globe-btn,
#mainTitle .ch {
  font-family:'Orbitron','Rajdhani',monospace;
}
/* Body readable text: Exo 2 */
.si, .sdd-item, .lang-opt, .sub-line, .sub-tiktok,
.th-pi, .lb-name, .podium-name, .si-name {
  font-family:'Exo 2','Sarabun',sans-serif;
  font-weight:600;
  letter-spacing:.02em;
}
/* Time values: Rajdhani — wide numerals, very legible */
.ti {
  font-family:'Rajdhani','Orbitron',monospace;
  font-weight:700;
  letter-spacing:.08em;
}

/* ── ANIMATED BG ── */
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;transition:opacity .35s;}
.bg-base{position:absolute;inset:0;background:var(--bg);transition:background .4s;}
.bg-checker{
  position:absolute;inset:0;
  background-image:repeating-conic-gradient(rgba(255,255,255,.03) 0% 25%, transparent 0% 50%);
  background-size:24px 24px;
  mask-image:radial-gradient(ellipse at center,transparent 40%,black 100%);
  -webkit-mask-image:radial-gradient(ellipse at center,transparent 40%,black 100%);
}
.bg-lines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(105deg,transparent 0px,transparent 60px,rgba(255,255,255,.015) 60px,rgba(255,255,255,.015) 62px);
}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbSpin linear infinite;transition:background .4s;}
.orb1{width:60vw;height:60vw;max-width:800px;max-height:800px;background:var(--orb1);top:-25%;left:-15%;animation-duration:20s;}
.orb2{width:50vw;height:50vw;max-width:700px;max-height:700px;background:var(--orb2);bottom:-20%;right:-15%;animation-duration:25s;animation-direction:reverse;}
.orb3{width:35vw;height:35vw;max-width:450px;max-height:450px;background:var(--orb1);opacity:.4;top:40%;left:35%;animation-duration:32s;}
.orb4{width:25vw;height:25vw;max-width:350px;max-height:350px;background:var(--orb2);opacity:.5;bottom:15%;left:5%;animation-duration:28s;animation-direction:reverse;}
@keyframes orbSpin{
  0%  {transform:translate(0,0) scale(1);}
  25% {transform:translate(6vw,-5vw) scale(1.1);}
  50% {transform:translate(3vw,8vw) scale(.92);}
  75% {transform:translate(-5vw,3vw) scale(1.06);}
  100%{transform:translate(0,0) scale(1);}
}
.top-accent{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);z-index:500;animation:scanAnim 3s ease-in-out infinite;}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:16px 16px 80px;}

/* ── HEADER ── */
header{text-align:center;padding:28px 16px 14px;margin-bottom:18px;position:relative;}
header::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:min(600px,90%);height:4px;
  background:repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 10px,var(--gold) 10px,var(--gold) 20px);
  border-radius:2px;opacity:.6;
}
header::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(400px,70%);height:2px;
  background:repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 8px,var(--gold) 8px,var(--gold) 16px);
  opacity:.4;
}

#mainTitle{display:block;font-family:'Orbitron',monospace;font-size:clamp(1rem,4vw,2.5rem);font-weight:900;letter-spacing:clamp(2px,1vw,8px);margin-bottom:10px;text-transform:uppercase;}
#mainTitle .ch{
  display:inline-block;
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rShift 4s linear infinite,cFloat 2.6s ease-in-out infinite;
}
[data-mode="dark"] #mainTitle .ch{
  background-image:linear-gradient(160deg,#ffffff 0%,var(--blue3) 35%,var(--blue2) 60%,var(--gold) 80%,#ffffff 100%);
  filter:drop-shadow(0 0 8px color-mix(in srgb,var(--blue2) 60%,transparent));
}
[data-mode="light"] #mainTitle .ch{
  background-image:linear-gradient(160deg,var(--s1) 0%,var(--ac1) 35%,var(--ac2) 60%,var(--gold) 80%,var(--s1) 100%);
  filter:drop-shadow(0 2px 4px color-mix(in srgb,var(--ac1) 40%,transparent));
}
@keyframes rShift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#mainTitle .ch:nth-child(1){animation-delay:0s,0s}#mainTitle .ch:nth-child(2){animation-delay:.12s,.1s}#mainTitle .ch:nth-child(3){animation-delay:.24s,.2s}#mainTitle .ch:nth-child(4){animation-delay:.36s,.3s}#mainTitle .ch:nth-child(5){animation-delay:.48s,.4s}#mainTitle .ch:nth-child(6){animation-delay:.6s,.5s}#mainTitle .ch:nth-child(7){animation-delay:.72s,.6s}#mainTitle .ch:nth-child(8){animation-delay:.84s,.7s}#mainTitle .ch:nth-child(9){animation-delay:.96s,.8s}#mainTitle .ch:nth-child(10){animation-delay:1.08s,.9s}#mainTitle .ch:nth-child(11){animation-delay:1.2s,1s}#mainTitle .ch:nth-child(12){animation-delay:1.32s,1.1s}#mainTitle .ch:nth-child(13){animation-delay:1.44s,1.2s}#mainTitle .ch:nth-child(14){animation-delay:1.56s,1.3s}#mainTitle .ch:nth-child(15){animation-delay:1.68s,1.4s}#mainTitle .ch:nth-child(16){animation-delay:1.8s,1.5s}#mainTitle .ch:nth-child(17){animation-delay:1.92s,1.6s}#mainTitle .ch:nth-child(18){animation-delay:2.04s,1.7s}#mainTitle .ch:nth-child(19){animation-delay:2.16s,1.8s}#mainTitle .ch:nth-child(20){animation-delay:2.28s,1.9s}
.sub-line{color:var(--dim);font-size:.8rem;letter-spacing:.4px;margin:2px 0;}
.sub-tiktok{color:var(--blue2);font-size:.76rem;}
.scan-line{height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);max-width:500px;margin:12px auto;animation:scanAnim 3s ease-in-out infinite;}
@keyframes scanAnim{0%,100%{opacity:.3}50%{opacity:1}}

/* ── TOP BAR ── */
.top-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:14px;}
.top-bar-right{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

/* ── GLOBE ── */
.lang-wrap{position:relative;}
.globe-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);border-radius:8px;cursor:pointer;font-size:.82rem;font-family:'Exo 2',sans-serif;font-weight:600;transition:all .2s;backdrop-filter:blur(8px);}
.globe-btn:hover,.globe-btn.open{border-color:var(--blue2);color:var(--blue2);}
.globe-arrow{font-size:.58rem;opacity:.6;transition:transform .2s;}
.globe-btn.open .globe-arrow{transform:rotate(180deg);}
.lang-dd{position:absolute;top:calc(100% + 6px);left:0;min-width:180px;background:var(--s1);border:1px solid var(--blue);border-radius:10px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,40,.3);overflow:hidden;display:none;animation:ddIn .15s ease;}
[data-mode="light"] .lang-dd{background:var(--s1);}
.lang-dd.open{display:block;}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.lang-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;font-family:'Exo 2',sans-serif;font-weight:600;transition:background .12s;color:var(--text2);}
.lang-opt:hover,.lang-opt.active{background:rgba(29,111,232,.15);color:var(--blue2);}
.lang-divider{height:1px;background:var(--input-border);}

/* ── THEME PICKER ── */
.theme-wrap{position:relative;}
.theme-btn{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;transition:all .3s;backdrop-filter:blur(8px);}
.theme-btn:hover,.theme-btn.open{border-color:var(--blue2);color:var(--blue2);}
.theme-swatch{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);flex-shrink:0;transition:background .3s;}
.theme-panel{
  position:fixed;
  min-width:196px;max-width:210px;
  background:var(--s1);border:1px solid var(--card-border);
  border-radius:12px;z-index:99999;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
  display:none;
  animation:ddIn .15s ease;padding:12px;
  box-sizing:border-box;
}
[data-mode="light"] .theme-panel{background:var(--s2);}
.theme-panel.open{display:block;}
.tp-section-lbl{font-family:'Rajdhani',monospace;font-size:.6rem;font-weight:700;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.tp-mode-row{display:flex;gap:6px;margin-bottom:10px;}
.tp-mode-btn{flex:1;padding:6px 0;border-radius:6px;border:1px solid var(--card-border);background:var(--input-bg);color:var(--text2);cursor:pointer;font-family:'Exo 2',sans-serif;font-size:.8rem;font-weight:600;transition:all .2s;white-space:nowrap;}
.tp-mode-btn:hover,.tp-mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue2);}
.tp-divider{height:1px;background:var(--card-border);margin:10px 0;}
.tp-colors{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:7px;
}
.tp-color{
  width:100%;aspect-ratio:1;border-radius:8px;border:2px solid transparent;
  cursor:pointer;transition:all .2s;position:relative;
  min-width:0;
}
.tp-color:hover{transform:scale(1.08);box-shadow:0 0 8px rgba(255,255,255,.2);}
.tp-color.active{border-color:#fff;box-shadow:0 0 10px rgba(255,255,255,.4);}
.tp-color.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:900;text-shadow:0 1px 3px rgba(0,0,0,.6);}
.globe-arrow{font-size:.58rem;opacity:.6;transition:transform .2s;}
.theme-btn.open .globe-arrow,.globe-btn.open .globe-arrow{transform:rotate(180deg);}

/* ── ROW COUNT TOGGLE ── */
.row-toggle{
  display:flex;align-items:center;gap:4px;
  background:var(--input-bg);border:1px solid var(--card-border);
  border-radius:6px;overflow:hidden;padding:2px;
}
.rt-btn{
  padding:3px 10px;border:none;border-radius:4px;cursor:pointer;
  font-family:'Rajdhani',monospace;font-size:.72rem;font-weight:700;
  color:var(--dim);background:transparent;transition:all .2s;letter-spacing:.5px;
  white-space:nowrap;
}
.rt-btn.active{background:var(--blue);color:#fff;box-shadow:0 0 8px rgba(29,111,232,.3);}
.rt-btn:not(.active):hover{color:var(--blue2);}

/* Extra rounds (10-13) styling */
.row-extra td{opacity:.75;}
.row-extra .rnd-lbl{color:var(--dim);}
.extra-badge{
  display:inline-block;font-size:.5rem;vertical-align:middle;
  background:rgba(100,116,170,.2);border:1px solid var(--dim);
  color:var(--dim);border-radius:3px;padding:0 4px;margin-left:4px;
  font-family:'Rajdhani',monospace;letter-spacing:.5px;
}

/* ── COLLAPSE / EXPAND ── */
.collapse-btn{
  display:flex;align-items:center;gap:5px;
  padding:4px 10px;border:1px solid var(--card-border);
  background:var(--input-bg);color:var(--text2);
  border-radius:6px;cursor:pointer;font-size:.72rem;
  font-family:'Rajdhani',monospace;font-weight:700;
  transition:all .2s;white-space:nowrap;letter-spacing:.5px;
}
.collapse-btn:hover{border-color:var(--blue2);color:var(--blue2);}
.collapse-icon{display:inline-block;transition:transform .3s;font-style:normal;font-size:.8rem;}
.match-block.collapsed .collapse-icon{transform:rotate(-90deg);}

.block-body{
  overflow:hidden;
  transition:max-height .35s cubic-bezier(.4,0,.2,1), opacity .3s ease;
  max-height:2000px;
  opacity:1;
}
.match-block.collapsed .block-body{
  max-height:0;
  opacity:0;
}

.collapsed-summary{
  display:none;
  align-items:center;gap:8px;flex-wrap:wrap;
  padding:6px 14px 8px;
  background:var(--hdr-bg);
  border-top:1px solid var(--card-border);
  font-family:'Rajdhani',monospace;font-size:.72rem;
}
.match-block.collapsed .collapsed-summary{display:flex;}
.cs-player{
  display:flex;align-items:center;gap:4px;
  background:var(--input-bg);border:1px solid var(--card-border);
  border-radius:6px;padding:3px 9px;
}
.cs-name{color:var(--text2);font-weight:600;}
.cs-score{font-weight:700;color:var(--gold);font-size:.82rem;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-family:'Rajdhani',monospace;font-size:.8rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;white-space:nowrap;backdrop-filter:blur(6px);}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-add{background:rgba(29,111,232,.12);border-color:var(--card-border);color:var(--blue2);}
.btn-add:hover{background:var(--blue);color:#fff;box-shadow:0 0 16px rgba(29,111,232,.35);}
.btn-score{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.35);color:var(--gold);}
.btn-score:hover{background:var(--gold);color:#000;box-shadow:0 0 16px rgba(245,197,24,.3);}
.btn-excel{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
.btn-excel:hover{background:#16a34a;color:#fff;box-shadow:0 0 14px rgba(34,197,94,.3);}
.btn-clear{background:var(--card-bg);border-color:var(--s3);color:var(--dim);}
.btn-clear:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08);}

/* ── MAIN GRID ── */
.main-grid{display:block;}

/* ── CATEGORY INNER GRID ── */
.cat-inner-grid{
  display:grid;
  grid-template-columns:1fr 240px;
  gap:10px;
  align-items:start;
}
@media(max-width:800px){.cat-inner-grid{grid-template-columns:1fr;}}

/* ── CAT LEADERBOARD ── */
.cat-lb{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;overflow:hidden;
  backdrop-filter:blur(10px);position:relative;
  box-shadow:0 4px 18px rgba(0,0,10,.25);
  transition:background .35s;
}
.cat-lb::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);
  animation:scanAnim 4s ease-in-out infinite;
}
.cat-lb-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--hdr-bg);
  border-bottom:1px solid var(--card-border);
}
.cat-lb-title{
  font-family:'Rajdhani',monospace;font-size:.78rem;font-weight:700;
  letter-spacing:.12em;color:var(--gold);
  transform:skewX(-6deg);display:inline-block;
}
.cat-lb-body{padding:6px 0;}

/* ── MATCH BLOCK ── */
.match-block{margin-bottom:14px;border-radius:14px;overflow:visible;background:var(--card-bg);border:1px solid var(--card-border);box-shadow:0 0 0 1px rgba(59,157,255,.05),0 8px 28px rgba(0,0,10,.3),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(14px);position:relative;transition:background .35s,border-color .35s;}
.match-block::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--hdr-bg);border-bottom:1px solid var(--card-border);flex-wrap:wrap;gap:8px;border-radius:14px 14px 0 0;}
.block-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.block-num{font-family:'Rajdhani',monospace;font-size:.82rem;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap;}
.pctrl{display:flex;align-items:center;gap:5px;}
.pctrl-lbl{font-size:.7rem;color:var(--dim);font-family:'Rajdhani',monospace;letter-spacing:1px;white-space:nowrap;font-weight:600;}
.pc-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--card-border);background:var(--input-bg);color:var(--blue2);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1;}
.pc-btn:hover{border-color:var(--blue2);background:var(--blue);color:#fff;}
.pc-val{font-family:'Rajdhani',monospace;font-size:.85rem;font-weight:700;color:var(--gold);min-width:14px;text-align:center;}
.btn-rm{background:none;border:1px solid var(--s3);color:var(--dim);border-radius:5px;padding:3px 10px;cursor:pointer;font-size:.75rem;transition:all .2s;font-family:'Exo 2',sans-serif;font-weight:600;}
.btn-rm:hover{border-color:var(--red);color:var(--red);}

/* ── LEADERBOARD ── */
.sidebar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(59,157,255,.05),0 8px 24px rgba(0,0,16,.25);backdrop-filter:blur(14px);position:relative;transition:background .35s;}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.sb-hdr{background:var(--hdr-bg);padding:14px 18px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;}
.sb-hdr h2{font-family:'Rajdhani',monospace;font-size:1.05rem;font-weight:700;letter-spacing:.2em;transform:skewX(-8deg);display:inline-block;color:var(--gold);}
.lb-name{font-weight:700;font-size:.9rem;flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-family:'Exo 2',sans-serif;}
.tbl-wrap::-webkit-scrollbar{height:5px;}
.tbl-wrap::-webkit-scrollbar-track{background:var(--s1);border-radius:3px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:3px;}

table{
  width:100%;border-collapse:collapse;
  min-width:520px;
  table-layout:fixed;
}
thead{position:sticky;top:0;z-index:20;background:var(--tbl-head);backdrop-filter:blur(8px);}
th{padding:0;border-bottom:2px solid var(--card-border);vertical-align:middle;overflow:hidden;}
th.th-rnd{width:52px;}th.th-stage{width:145px;}
.th-player-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 6px 6px;}
.th-player-lbl{font-family:'Rajdhani',monospace;font-size:.6rem;font-weight:700;color:var(--blue3);letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase;}
.th-pi{width:100%;background:transparent;border:none;border-bottom:2px solid var(--input-border);color:var(--gold);font-family:'Rajdhani',monospace;font-size:.85rem;font-weight:700;text-align:center;padding:5px 4px;letter-spacing:.8px;outline:none;transition:border-color .2s;}
.th-pi:focus{border-bottom-color:var(--gold);}
.th-pi::placeholder{color:var(--input-border);font-size:.7rem;}
.th-rnd-inner{padding:10px 4px;font-family:'Rajdhani',monospace;font-size:.68rem;font-weight:700;letter-spacing:.3px;color:var(--dim);text-align:center;text-transform:uppercase;overflow:hidden;white-space:nowrap;}
.th-stage-inner{padding:10px 8px;font-family:'Rajdhani',monospace;font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
td{padding:0;border-bottom:1px solid var(--tbl-row-border);vertical-align:middle;overflow:hidden;transition:background .2s;}
tr:hover td{background:var(--card-hover);}
td.rnd-td{width:52px;}td.stage-td{width:145px;}

/* ── ROUND LABEL ── */
.rnd-lbl{padding:10px 8px;font-size:.75rem;font-weight:700;color:var(--blue3);white-space:nowrap;font-family:'Rajdhani',monospace;letter-spacing:1px;text-align:center;}

/* ── STAGE SELECTOR ── */
.stage-cell{padding:3px 5px;position:relative;}
.sw{position:relative;}
.si{
  width:100%;
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--blue2);font-family:'Exo 2','Sarabun',sans-serif;font-size:.82rem;font-weight:600;
  padding:6px 7px;border-radius:5px;outline:none;transition:all .2s;
  white-space:normal;
  word-break:break-word;
  overflow:hidden;
  resize:none;
  min-height:32px;
  line-height:1.35;
  display:block;
}
.si:focus{border-color:var(--blue2);box-shadow:0 0 8px rgba(29,111,232,.2);}
.si::placeholder{color:var(--dim);font-size:.75rem;font-weight:500;white-space:nowrap;}
.sdd{background:var(--s1);border:1px solid var(--blue);border-radius:8px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,10,40,.9);display:none;}
.sdd.open{display:block;}
.sdd-portal{position:fixed;z-index:99999;}
[data-mode="light"] .sdd{background:var(--s2);box-shadow:0 8px 24px rgba(0,0,0,.15);}
.sdd-grp{padding:4px 10px;font-size:.62rem;font-family:'Rajdhani',monospace;font-weight:700;color:var(--dim);background:rgba(29,111,232,.06);border-top:1px solid var(--input-border);text-transform:uppercase;letter-spacing:1px;}
.sdd-item{padding:7px 12px;font-size:.82rem;font-family:'Exo 2',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s;color:var(--text2);}
.sdd-item:hover{background:rgba(29,111,232,.14);color:var(--blue2);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── RANDOM STAGE BUTTON (Round 1 only) ── */
.rand-btn{
  display:block;width:100%;margin-top:4px;
  padding:3px 8px;
  background:rgba(245,197,24,.08);border:1px dashed rgba(245,197,24,.4);
  color:var(--gold);border-radius:5px;cursor:pointer;
  font-family:'Rajdhani',monospace;font-size:.64rem;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;
  transition:all .2s;line-height:1.5;
}
.rand-btn:hover{
  background:rgba(245,197,24,.22);
  border-color:var(--gold);
  border-style:solid;
  box-shadow:0 0 8px rgba(245,197,24,.3);
}
.rand-btn:active{transform:scale(.97);}
/* ── MAP BAN PHASE ── */
.ban-section-row td{
  background:rgba(239,68,68,.05);
  border-top:2px solid rgba(239,68,68,.28)!important;
  border-bottom:2px solid rgba(239,68,68,.18)!important;
}
.ban-section-row:hover td{background:rgba(239,68,68,.08)!important;}
.ban-lbl-wrap{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:7px 10px;gap:3px;}
.ban-phase-lbl{font-family:'Rajdhani',monospace;font-size:.7rem;font-weight:700;color:#ef4444;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:5px;white-space:nowrap;}
.ban-phase-note{font-family:'Exo 2',sans-serif;font-size:.58rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.ban-sw{padding:5px 4px;}
.ban-inp{width:100%;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.4);color:var(--text);font-family:'Exo 2',sans-serif;font-size:.76rem;font-weight:600;padding:5px 7px;border-radius:6px;outline:none;transition:all .2s;}
.ban-inp:focus{border-color:#ef4444;box-shadow:0 0 8px rgba(239,68,68,.25);}
.ban-inp::placeholder{color:rgba(239,68,68,.4);font-size:.68rem;}
.ban-chip{display:flex;align-items:center;gap:5px;background:linear-gradient(120deg,rgba(239,68,68,.18),rgba(239,68,68,.1));border:1px solid rgba(239,68,68,.55);border-radius:7px;padding:5px 7px;animation:banIn .2s ease;}
@keyframes banIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:none}}
.ban-chip-icon{font-size:.82rem;flex-shrink:0;line-height:1;}
.ban-chip-name{font-family:'Exo 2',sans-serif;font-size:.72rem;font-weight:700;color:#ef4444;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;max-width:100px;}
.ban-chip-rm{background:none;border:none;color:rgba(239,68,68,.55);cursor:pointer;font-size:.75rem;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0;}
.ban-chip-rm:hover{color:#ef4444;}
.si.stage-banned{border-color:rgba(239,68,68,.6)!important;background:rgba(239,68,68,.08)!important;color:#ef4444!important;}
.stage-ban-warn{font-family:'Rajdhani',monospace;font-size:.58rem;font-weight:700;color:#ef4444;letter-spacing:.5px;margin-top:2px;display:block;}
@media(max-width:640px){.ban-phase-note{display:none;}.ban-chip-name{max-width:60px;}.ban-inp{font-size:.68rem;padding:4px 5px;}}
@media(max-width:400px){.ban-chip-name{max-width:44px;}.ban-inp{font-size:.6rem;}}
/* ── CAR SELECTOR ── */
.car-sw{margin-top:3px;width:100%;}
.car-inp{
  width:100%;
  background:rgba(168,85,247,.08);
  border:1px solid rgba(168,85,247,.28);
  color:var(--text2);
  font-family:'Exo 2',sans-serif;font-size:.63rem;font-weight:600;
  padding:3px 6px;border-radius:5px;outline:none;transition:all .2s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.car-inp:focus{border-color:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.22);}
.car-inp::placeholder{color:rgba(168,85,247,.35);font-size:.58rem;}
.car-inp.has-car{border-color:rgba(168,85,247,.5);color:#c084fc;}
.car-grp-t{color:#22c55e!important;}
.car-grp-a{color:#a855f7!important;}
@media(max-width:640px){.car-inp{font-size:.58rem;padding:2px 4px;}}
@media(max-width:400px){.car-inp{font-size:.54rem;}}



/* ── TIME CELL ── */
td.king-td{padding-top:0 !important;vertical-align:middle;}

.tc-wrap{
  padding:6px 5px 8px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;
  box-sizing:border-box;
  width:100%;
  min-height:82px;
}

.king-badge{
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#9b1c1c,#dc2626,#ef4444);
  color:#fff;font-family:'Orbitron',monospace;font-size:.46rem;font-weight:700;
  padding:2px 8px;border-radius:4px;white-space:nowrap;letter-spacing:.5px;
  box-shadow:0 0 10px rgba(220,38,38,.6);
  animation:kPulse 2s ease-in-out infinite;
  z-index:5;
  pointer-events:none;
  width:max-content;
}
@keyframes kPulse{0%,100%{box-shadow:0 0 8px rgba(220,38,38,.4)}50%{box-shadow:0 0 18px rgba(220,38,38,.9)}}

.has-king-row td{padding-top:14px !important;}

/* ── TIME INPUT ── */
.ti{
  width:100%;text-align:center;
  border:1px solid var(--input-border);border-radius:6px;
  background:var(--input-bg);color:var(--text);
  font-family:'Rajdhani',monospace;font-size:.82rem;font-weight:700;
  letter-spacing:.1em;
  padding:6px 2px;outline:none;transition:all .2s;
}
.ti:focus{border-color:var(--blue2);box-shadow:0 0 8px rgba(29,111,232,.2);}
.ti::placeholder{color:var(--dim);font-size:.7rem;opacity:.6;}
.ti.has-v{color:var(--text);}

/* ── WINNER CARD ── */
.ti.best{border:2px solid var(--gold)!important;background:linear-gradient(160deg,rgba(245,197,24,.14),var(--input-bg))!important;color:var(--gold)!important;font-weight:700;box-shadow:0 0 12px rgba(245,197,24,.3);}
.tc-wrap.is-best{background:rgba(245,197,24,.06);border-radius:8px;outline:1.5px solid rgba(245,197,24,.35);box-shadow:0 0 14px rgba(245,197,24,.18);}
.ti.best-king{border:2px solid var(--red)!important;background:linear-gradient(160deg,rgba(239,68,68,.15),var(--input-bg))!important;color:var(--red)!important;font-weight:700;box-shadow:0 0 14px rgba(239,68,68,.4);}
.tc-wrap.is-best-king{background:rgba(239,68,68,.08);border-radius:8px;outline:1.5px solid rgba(239,68,68,.45);box-shadow:0 0 18px rgba(239,68,68,.22);}

/* Score chips */
.score-chip{font-family:'Rajdhani',monospace;font-size:.8rem;font-weight:700;padding:2px 8px;border-radius:10px;min-width:34px;text-align:center;letter-spacing:.05em;}
.sc12{background:rgba(239,68,68,.18);color:var(--red);box-shadow:0 0 8px rgba(239,68,68,.25);}
.sc11{background:rgba(245,197,24,.18);color:var(--gold);box-shadow:0 0 8px rgba(245,197,24,.25);}
.sch{background:rgba(34,197,94,.12);color:var(--green);}
.scm{background:rgba(59,157,255,.1);color:var(--blue2);}
.scl{background:rgba(239,68,68,.07);color:var(--red);}
.sc0{background:rgba(90,120,170,.08);color:var(--dim);}
.scx{background:transparent;color:var(--dim);font-size:.7rem;}

/* ── ANIMATED TOTAL ROW ── */
@keyframes totalBG{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes totalGlow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.total-row-outer{
  position:relative;overflow-x:auto;overflow-y:hidden;
  border-radius:0 0 10px 10px;scrollbar-width:none;-ms-overflow-style:none;
}
.total-row-outer::-webkit-scrollbar{display:none;}
.total-row-outer::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,
    var(--s2) 0%,var(--s1) 20%,var(--bg) 50%,var(--s1) 80%,var(--s2) 100%
  );
  background-size:300% 100%;animation:totalBG 5s linear infinite;z-index:0;
}
.total-row-outer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  background-size:200% 100%;animation:shimmer 3s ease-in-out infinite;z-index:1;pointer-events:none;
}
.total-row-border{
  height:2px;
  background:linear-gradient(90deg,var(--blue),var(--gold),#fff,var(--blue2),var(--gold),var(--blue));
  background-size:300% 100%;animation:borderFlow 3s linear infinite;
}
.total-row-outer table{width:100%;border-collapse:collapse;background:transparent;}
.total-row-outer td{border:none!important;background:transparent!important;position:relative;z-index:2;padding:0;}
.tr-lbl{
  display:block;padding:13px 14px;
  font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;letter-spacing:1.5px;
  color:transparent;
  background:linear-gradient(90deg,var(--gold) 0%,#fff 30%,var(--blue2) 60%,var(--gold2) 100%);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  animation:totalBG 3s linear infinite;white-space:nowrap;
}
.total-val{font-family:'Orbitron',monospace;font-weight:900;font-size:.95rem;text-align:center;padding:13px 4px;display:block;position:relative;z-index:2;}
.tv-top{color:var(--gold);text-shadow:0 0 16px rgba(245,197,24,.9),0 0 4px rgba(245,197,24,.5);font-size:1.15rem;animation:totalGlow 2s ease-in-out infinite;}
.tv-val{color:var(--blue2);text-shadow:0 0 10px rgba(59,157,255,.5);}
.tv-zero{color:var(--dim);font-size:.72rem;}

/* ── LEADERBOARD SIDEBAR ── */
.sidebar{
  background:var(--card-bg);
  border:1px solid var(--card-border);border-radius:14px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.08),0 8px 28px rgba(0,0,0,.3);
  backdrop-filter:blur(14px);position:relative;transition:background .35s;
}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.sb-hdr{
  background:var(--hdr-bg);
  padding:14px 18px;border-bottom:1px solid var(--card-border);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-hdr h2{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;letter-spacing:.15em;transform:skewX(-8deg);display:inline-block;color:var(--gold);text-shadow:0 0 10px rgba(245,197,24,.4);}
.lb-row{
  display:flex;align-items:center;
  padding:7px 10px;
  border-bottom:1px solid var(--tbl-row-border);
  gap:0;
  position:relative;
  transition:background .15s;
  min-height:38px;
}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:var(--card-hover);}
.lb-row.lb-1{background:rgba(245,197,24,.07);}
.lb-row.lb-2{background:rgba(148,163,184,.04);}
.lb-row.lb-3{background:rgba(205,127,50,.04);}
.lb-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
}
.lb-row.lb-1::before{background:#fbbf24;}
.lb-row.lb-2::before{background:#94a3b8;}
.lb-row.lb-3::before{background:#cd7f32;}
.lb-row.lb-o::before{background:#334155;}
/* rank badge */
.lb-rank-cell{
  width:30px;flex-shrink:0;
  font-family:'Orbitron',monospace;font-size:.7rem;font-weight:700;
  text-align:center;color:var(--dim);
}
.lb-rank-cell.r1{font-size:.95rem;}
.lb-rank-cell.r2{font-size:.85rem;}
.lb-rank-cell.r3{font-size:.85rem;}
/* name + matches */
.lb-info{flex:1;min-width:0;padding:0 6px;}
.lb-name{font-weight:700;font-size:.8rem;color:var(--text);font-family:'Exo 2',sans-serif;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.lb-plays{font-size:.58rem;color:var(--dim);font-family:'Rajdhani',monospace;
  letter-spacing:.5px;margin-top:1px;display:block;}
/* score */
.lb-score{
  font-family:'Orbitron',monospace;font-weight:900;font-size:.92rem;
  flex-shrink:0;min-width:36px;text-align:right;
}

/* ── GRAND TOTAL MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:modalFadeIn .25s ease;}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:18px;width:100%;max-width:520px;max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 0 1px var(--card-border),0 0 40px rgba(0,0,0,.3),0 20px 60px rgba(0,0,0,.6);
  animation:modalSlideUp .28s cubic-bezier(.34,1.56,.64,1);position:relative;
}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 3s ease-in-out infinite;}
@keyframes modalSlideUp{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--hdr-bg);border-bottom:1px solid var(--card-border);flex-shrink:0;}
.modal-title{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;letter-spacing:2px;color:var(--gold);text-shadow:0 0 12px rgba(245,197,24,.5);}
.modal-close{width:32px;height:32px;border-radius:50%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.modal-close:hover{background:var(--red);color:#fff;transform:rotate(90deg);}
.modal-body{overflow-y:auto;padding:16px;flex:1;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:var(--ac1);border-radius:2px;}
.podium-row{display:flex;gap:10px;margin-bottom:14px;justify-content:center;}
.podium-card{flex:1;max-width:140px;border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid transparent;position:relative;overflow:hidden;transition:transform .2s;}
.podium-card:hover{transform:translateY(-3px);}
.podium-1{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);box-shadow:0 0 20px rgba(245,197,24,.15);}
.podium-2{background:rgba(148,163,184,.07);border-color:rgba(148,163,184,.3);}
.podium-3{background:rgba(205,127,50,.07);border-color:rgba(205,127,50,.3);}
.podium-medal{font-size:1.6rem;line-height:1;}
.podium-name{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:var(--text);text-align:center;word-break:break-all;}
.podium-score{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;}
.p1-score{color:var(--gold);text-shadow:0 0 16px rgba(245,197,24,.8);}
.p2-score{color:#cbd5e1;}
.p3-score{color:#cd7f32;}
.podium-pts{font-size:.55rem;color:var(--dim);font-family:'Orbitron',monospace;letter-spacing:1px;}
.standings-list{display:flex;flex-direction:column;gap:6px;}
.standing-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--card-hover);border:1px solid var(--input-border);transition:all .2s;}
.standing-item:hover{background:var(--card-bg);border-color:var(--card-border);}
.si-rank{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--dim);min-width:24px;}
.si-name{flex:1;font-weight:700;font-size:.82rem;color:#c8d8f0;}
.si-bar-wrap{flex:1;max-width:100px;height:4px;background:var(--input-border);border-radius:2px;overflow:hidden;}
.si-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .6s ease;}
.si-score{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--blue2);min-width:32px;text-align:right;}

/* ── CATEGORY SYSTEM ── */
.cat-section{margin-bottom:12px;}
.cat-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:linear-gradient(90deg,rgba(var(--ac1),.15),var(--hdr-bg));
  border:1px solid var(--card-border);
  border-radius:10px 10px 0 0;
  cursor:pointer;
  user-select:none;
  position:relative;
  overflow:hidden;
}
.cat-header::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:linear-gradient(180deg,var(--blue),var(--gold));
  border-radius:4px 0 0 4px;
}
.cat-header.collapsed{border-radius:10px;}
.cat-header-left{display:flex;align-items:center;gap:8px;}
.cat-chevron{font-size:.72rem;transition:transform .3s;display:inline-block;color:var(--blue2);}
.cat-header.collapsed .cat-chevron{transform:rotate(-90deg);}
.cat-name{font-family:'Rajdhani',monospace;font-weight:700;font-size:.9rem;color:var(--text);letter-spacing:.5px;}
.cat-count{font-size:.65rem;color:var(--dim);font-family:'Rajdhani',monospace;background:var(--input-bg);padding:2px 8px;border-radius:10px;border:1px solid var(--card-border);}
.cat-actions{display:flex;gap:5px;align-items:center;}
.cat-btn{background:none;border:1px solid var(--s3);color:var(--dim);border-radius:5px;padding:3px 8px;cursor:pointer;font-size:.7rem;transition:all .2s;font-family:'Exo 2',sans-serif;font-weight:600;}
.cat-btn:hover{border-color:var(--blue2);color:var(--blue2);}
.cat-btn.danger:hover{border-color:var(--red);color:var(--red);}
.cat-body{
  border:1px solid var(--card-border);border-top:none;
  border-radius:0 0 10px 10px;
  padding:8px;
  background:rgba(0,0,0,.1);
  overflow:hidden;
  transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .3s,padding .35s;
  max-height:5000px;opacity:1;
}
.cat-body.hidden{max-height:0;opacity:0;padding:0 8px;}

.no-cat-zone{margin-bottom:12px;}

.cat-select-wrap{position:relative;}
.cat-select-btn{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border:1px solid var(--card-border);
  background:var(--input-bg);color:var(--text2);
  border-radius:5px;cursor:pointer;font-size:.68rem;
  font-family:'Rajdhani',monospace;font-weight:600;
  transition:all .2s;white-space:nowrap;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;
}
.cat-select-btn:hover{border-color:var(--blue2);color:var(--blue2);}
.cat-dd{
  position:fixed;min-width:160px;
  background:var(--s1);border:1px solid var(--blue);
  border-radius:8px;z-index:99999;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  display:none;overflow:hidden;
}
[data-mode="light"] .cat-dd{background:#f0f5ff;}
.cat-dd.open{display:block;}
.cat-dd-item{
  padding:9px 14px;font-size:.82rem;cursor:pointer;
  font-family:'Exo 2',sans-serif;font-weight:600;
  color:var(--text2);transition:background .1s;
  display:flex;align-items:center;gap:7px;
}
.cat-dd-item:hover,.cat-dd-item.active{background:rgba(29,111,232,.15);color:var(--blue2);}
.cat-dd-item .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.cat-dd-divider{height:1px;background:var(--input-border);}

.cat-score-panel{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:14px;margin-top:14px;
  backdrop-filter:blur(10px);
}
.cat-score-title{
  font-family:'Rajdhani',monospace;font-size:.78rem;font-weight:700;
  color:var(--gold);letter-spacing:1.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:8px;
}
.cat-score-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;border-bottom:1px solid var(--tbl-row-border);
}
.cat-score-row:last-child{border-bottom:none;}
.cat-rank-badge{
  width:24px;height:24px;border-radius:5px;
  background:var(--input-bg);display:flex;align-items:center;justify-content:center;
  font-family:'Rajdhani',monospace;font-size:.65rem;font-weight:700;
  color:var(--dim);flex-shrink:0;
}
.cat-player-name{flex:1;font-family:'Exo 2',sans-serif;font-weight:600;font-size:.8rem;color:var(--text2);}
.cat-player-score{font-family:'Rajdhani',monospace;font-weight:700;font-size:.95rem;color:var(--blue2);}

.best-time-hdr{
  padding:10px 14px;background:var(--hdr-bg);
  border-bottom:1px solid var(--card-border);
  font-family:'Rajdhani',monospace;font-size:.78rem;font-weight:700;
  color:var(--gold);display:flex;align-items:center;gap:6px;
}
.best-time-tbl{width:100%;border-collapse:collapse;font-size:.75rem;}
.best-time-tbl th{
  padding:7px 10px;font-family:'Rajdhani',monospace;font-size:.65rem;
  color:var(--dim);font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  background:var(--tbl-head);border-bottom:1px solid var(--card-border);text-align:left;
}
.best-time-tbl td{
  padding:6px 10px;border-bottom:1px solid var(--tbl-row-border);
  font-family:'Rajdhani',monospace;color:var(--text2);
}
.best-time-tbl tr:last-child td{border-bottom:none;}
.best-time-tbl tr:hover td{background:var(--card-hover);}
.bt-stage{font-family:'Exo 2',sans-serif;font-weight:600;font-size:.78rem;}
.bt-time{color:var(--gold);font-weight:700;}
.bt-player{color:var(--blue2);font-size:.7rem;}

/* ── SAVE IMAGE MODAL FIELDS ── */
.img-field{display:flex;flex-direction:column;gap:6px;}
.img-label{font-family:'Rajdhani',monospace;font-size:.72rem;font-weight:700;color:var(--blue3);letter-spacing:1px;text-transform:uppercase;}
.img-input{
  background:var(--input-bg);border:1px solid var(--input-border);
  color:var(--text);font-family:'Exo 2','Sarabun',sans-serif;font-size:.9rem;
  padding:9px 12px;border-radius:8px;outline:none;transition:all .2s;
  width:100%;
}
.img-input:focus{border-color:var(--blue2);box-shadow:0 0 8px rgba(29,111,232,.2);}
.img-input::placeholder{color:var(--dim);font-size:.82rem;}
.img-textarea{resize:vertical;min-height:70px;font-family:'Exo 2','Sarabun',sans-serif;}

/* ── BLOCK ACTION BUTTONS ── */
.btn-img,.btn-rst{
  background:none;border:1px solid var(--s3);color:var(--dim);
  border-radius:5px;padding:4px 8px;cursor:pointer;font-size:.82rem;
  transition:all .2s;line-height:1;
}
.btn-img:hover{border-color:var(--blue2);color:var(--blue2);background:rgba(29,111,232,.08);}
.btn-rst:hover{border-color:var(--gold);color:var(--gold);background:rgba(245,158,11,.08);}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;right:18px;width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(29,111,232,.5);z-index:300;transition:transform .2s;}
.fab:hover{transform:scale(1.12);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--s1);}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--blue2);}

/* ════════════════════════ RESPONSIVE ════════════════════════ */
@media(max-width:400px){
  .app{padding:6px 6px 70px;}#mainTitle{letter-spacing:2px;}
  table{min-width:360px!important;}
  th.th-rnd,td.rnd-td{width:36px!important;}
  th.th-stage,td.stage-td{width:100px!important;}
  .th-rnd-inner,.th-stage-inner{padding:7px 4px;font-size:.44rem;}
  .th-player-lbl{font-size:.4rem;}.th-pi{font-size:.54rem;padding:3px 2px;}
  .si{font-size:.62rem;padding:4px 4px;}.ti{font-size:.54rem;padding:3px 1px;}
  .score-chip{font-size:.54rem;padding:1px 4px;min-width:22px;}
  .king-badge{font-size:.4rem;padding:2px 4px;}.rnd-lbl{padding:7px 4px;font-size:.52rem;}
  .tr-lbl{font-size:.5rem;padding:9px 6px;}.total-val{font-size:.78rem;padding:9px 2px;}
  .rand-btn{font-size:.55rem;padding:2px 4px;}

const MAX_P=6,MIN_P=2,ROWS_BASE=9,ROWS_MAX=13;
const KM={1:0,2:1,3:2,4:3,5:4,6:5};
let tables=[],tc=0;
let categories=[],catCounter=0;

function loadState(){
  try{tables=JSON.parse(localStorage.getItem('rt6')||'[]');}catch(e){tables=[];}
  try{categories=JSON.parse(localStorage.getItem('rtCats')||'[]');}catch(e){categories=[];}
  const validCatIds=new Set(categories.map(c=>c.id));
  tables.forEach(t=>{
    if(!t.players)t.players=Array(MAX_P).fill('');
    if(!t.rowCount)t.rowCount=ROWS_BASE;
    if(t.collapsed===undefined||t.collapsed===null)t.collapsed=false;
    if(t.catId===undefined){t.catId=null;}
    else if(t.catId!==null&&!validCatIds.has(t.catId)){t.catId=null;}
    while(t.rows.length<ROWS_MAX)t.rows.push({stage:'',times:Array(MAX_P).fill(''),cars:Array(MAX_P).fill('')});
    t.rows.forEach(row=>{if(!row.cars)row.cars=Array(MAX_P).fill('');while(row.cars.length<MAX_P)row.cars.push('');});
    if(!t.bans)t.bans=Array(MAX_P).fill('');
    while(t.bans.length<MAX_P)t.bans.push('');
  });
  try{lang=localStorage.getItem('rtLang')||'th';}catch(e){}
  if(!tables.length){tc=0;tables.push(mkTable(4));}
  else tc=Math.max(...tables.map(t=>t.id))+1;
  if(categories.length)catCounter=Math.max(...categories.map(c=>c.id))+1;
}
function save(){
  localStorage.setItem('rt6',JSON.stringify(tables));
  localStorage.setItem('rtCats',JSON.stringify(categories));
  localStorage.setItem('rtLang',lang);
}
function mkTable(pc){
  return{
    id:tc++,playerCount:pc||4,rowCount:ROWS_BASE,collapsed:false,
    players:Array(MAX_P).fill(''),
    bans:Array(MAX_P).fill(''),
    rows:Array.from({length:ROWS_MAX},()=>({stage:'',times:Array(MAX_P).fill(''),cars:Array(MAX_P).fill('')}))
  };
}

function parseTime(v){
  if(!v||!v.trim())return null;
  const p=v.split(':');
  if(p.length===3)return(parseInt(p[0])||0)*6000+(parseInt(p[1])||0)*100+(parseInt(p[2])||0);
  return null;
}
function fmtTime(v){
  v=(v||'').replace(/[^0-9:]/g,'');if(!v)return'';
  if(!v.includes(':')){const d=v.padStart(6,'0');return`${d.slice(0,2)}:${d.slice(2,4)}:${d.slice(4,6)}`;}
  return v;
}
function calcScores(row,r,pc){
  const scoreable = r < ROWS_BASE;
  const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
  const valid=parsed.filter(t=>t!==null);
  if(!valid.length||!scoreable)return parsed.map(()=>null);
  const best=Math.min(...valid);
  const kp=(r in KM&&KM[r]<pc)?KM[r]:-1;
  return parsed.map((t,p)=>{
    if(t===null)return null;
    const ds=(t-best)/100;
    let s;
    if(ds===0)s=11;else if(ds<1)s=10;else if(ds<2)s=9;else if(ds<3)s=8;
    else if(ds<4)s=7;else if(ds<5)s=6;else if(ds<6)s=5;
    else if(ds<7)s=4;else if(ds<8)s=3;else if(ds<9)s=2;else if(ds<10)s=1;else s=0;
    if(p===kp&&ds===0)s=12;
    return s;
  });
}
function scClass(s){
  if(s===null)return'scx';if(s===12)return'sc12';if(s===11)return'sc11';
  if(s>=8)return'sch';if(s>=5)return'scm';if(s>=2)return'scl';return'sc0';
}

let _activeCarDd=null,_activeCarInp=null;
function _closeCarDd(){
  if(_activeCarDd){_activeCarDd.classList.remove('open');_activeCarDd=null;_activeCarInp=null;}
}
function _closeAllDd(){_closeDd();_closeBanDd();_closeCarDd();}
document.addEventListener('click',e=>{
  if(_activeCarDd&&!_activeCarDd.contains(e.target)&&e.target!==_activeCarInp)_closeCarDd();
},true);
document.addEventListener('scroll',e=>{
  if(_activeCarDd&&_activeCarInp&&!_activeCarDd.contains(e.target)){
    const rect=_activeCarInp.getBoundingClientRect();
    if(rect.bottom<0||rect.top>window.innerHeight)_closeCarDd();
    else{_activeCarDd.style.top=(rect.bottom+2)+'px';_activeCarDd.style.left=rect.left+'px';}
  }
},true);

function buildCarSelector(tObj,r,p){
  const wrap=document.createElement('div');wrap.className='car-sw';
  if(!tObj.rows[r].cars)tObj.rows[r].cars=Array(MAX_P).fill('');

  const inp=document.createElement('input');
  inp.type='text';inp.className='car-inp';
  inp.placeholder=T('carPH');
  const curVal=tObj.rows[r].cars[p]||'';
  inp.value=curVal;inp.title=curVal;
  if(curVal)inp.classList.add('has-car');
  inp.autocomplete='off';inp.spellcheck=false;

  const dd=document.createElement('div');dd.className='sdd sdd-portal car-portal';
  document.body.appendChild(dd);

  function posCarDd(){
    const rect=inp.getBoundingClientRect();
    dd.style.cssText='position:fixed;top:'+(rect.bottom+2)+'px;left:'+rect.left+'px;width:'+Math.max(rect.width,170)+'px;max-height:220px;z-index:99999;';
    const below=window.innerHeight-rect.bottom;
    if(below<230&&rect.top>230){dd.style.top='auto';dd.style.bottom=(window.innerHeight-rect.top+2)+'px';}
    else dd.style.bottom='auto';
  }
  function popCar(q){
    dd.innerHTML='';q=(q||'').toLowerCase();
    let addedT=false,addedA=false;
    for(const car of ALL_CARS){
      if(q&&!car.name.toLowerCase().includes(q))continue;
      if(car.cls==='T'&&!addedT){
        const g=document.createElement('div');g.className='sdd-grp car-grp-t';
        g.textContent=T('classT');dd.appendChild(g);addedT=true;
      }
      if(car.cls==='A'&&!addedA){
        const g=document.createElement('div');g.className='sdd-grp car-grp-a';
        g.textContent=T('classA');dd.appendChild(g);addedA=true;
      }
      const item=document.createElement('div');item.className='sdd-item';
      const dot=document.createElement('span');dot.className='sdot';
      dot.style.background=car.cls==='T'?'#22c55e':'#a855f7';
      item.appendChild(dot);item.appendChild(document.createTextNode(car.name));
      item.addEventListener('mousedown',e=>{
        e.preventDefault();
        inp.value=car.name;inp.title=car.name;inp.classList.add('has-car');
        tObj.rows[r].cars[p]=car.name;save();_closeCarDd();
      });
      dd.appendChild(item);
    }
    if(!dd.children.length){
      const ni=document.createElement('div');ni.className='sdd-item';ni.style.color='var(--dim)';ni.textContent='—';dd.appendChild(ni);
    }
  }

  inp.addEventListener('focus',()=>{
    _closeAllDd();
    popCar(inp.value);posCarDd();
    dd.classList.add('open');_activeCarDd=dd;_activeCarInp=inp;
  });
  inp.addEventListener('input',()=>{
    tObj.rows[r].cars[p]=inp.value;save();
    inp.title=inp.value;
    if(inp.value)inp.classList.add('has-car');else inp.classList.remove('has-car');
    popCar(inp.value);posCarDd();
    dd.classList.add('open');_activeCarDd=dd;_activeCarInp=inp;
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Escape'||e.key==='Enter'){inp.blur();_closeCarDd();}
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{if(_activeCarDd===dd)_closeCarDd();},160));

  // Lightweight cleanup — no MutationObserver needed; portals purged on renderAll/rebuildBlock
  wrap.appendChild(inp);
  return wrap;
}

    }
    function popBan(q){

      for(const s of ALL_S){

      if(!dd.children.length){

      }
    }
    inp.addEventListener('focus',()=>{_closeBanDd();_closeDd();_closeCarDd();popBan(inp.value);posBanDd();dd.classList.add('open');_activeBanDd=dd;_activeBanInp=inp;});
    inp.addEventListener('input',()=>{popBan(inp.value);posBanDd();dd.classList.add('open');_activeBanDd=dd;_activeBanInp=inp;});
    inp.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='Enter'){inp.blur();_closeBanDd();}});
    inp.addEventListener('blur',()=>setTimeout(()=>{if(_activeBanDd===dd)_closeBanDd();},160));
    const obs=new MutationObserver(()=>{
      if(!document.body.contains(inp)){
        if(_activeBanDd===dd){_activeBanDd=null;_activeBanInp=null;}
        dd.remove();obs.disconnect();
      }
    });
    obs.observe(document.body,{childList:true,subtree:true});
    wrap.appendChild(inp);
  }
  return wrap;
}

// Global dropdown element
let _activeDd = null;
let _activeDdInp = null;
function _closeDd(){
  if(_activeDd){_activeDd.classList.remove('open');_activeDd=null;_activeDdInp=null;}
}
document.addEventListener('click', e=>{
  if(_activeDd && !_activeDd.contains(e.target) && e.target!==_activeDdInp) _closeDd();
}, true);
document.addEventListener('scroll', e=>{
  if(_activeDd && !_activeDd.contains(e.target)){
    if(_activeDdInp){
      const rect=_activeDdInp.getBoundingClientRect();
      if(rect.bottom<0||rect.top>window.innerHeight){
        _closeDd();
      } else {
        _activeDd.style.top=(rect.bottom+2)+'px';
        _activeDd.style.left=rect.left+'px';
        _activeDd.style.width=Math.max(rect.width,180)+'px';
      }
    }
  }
}, true);

function buildStageSelector(tObj,r){
  const pc=tObj.playerCount||4;
  const wrap=document.createElement('div');wrap.className='sw';
  const inp=document.createElement('textarea');
  inp.className='si';inp.rows=1;
  inp.placeholder=T('stagePH');inp.value=tObj.rows[r].stage||'';inp.autocomplete='off';
  inp.spellcheck=false;

  function autoResize(){
    inp.style.height='auto';
    inp.style.height=inp.scrollHeight+'px';
  }
  if(inp.value) setTimeout(autoResize,0);
  inp.addEventListener('input',autoResize);
  inp.addEventListener('focus',autoResize);

  const dd=document.createElement('div');dd.className='sdd sdd-portal';
  document.body.appendChild(dd);

  function positionDd(){
    const rect=inp.getBoundingClientRect();
    dd.style.position='fixed';
    dd.style.top=(rect.bottom+2)+'px';
    dd.style.left=rect.left+'px';
    dd.style.width=Math.max(rect.width,180)+'px';
    dd.style.maxHeight='220px';
    dd.style.zIndex='99999';
    const spaceBelow=window.innerHeight-rect.bottom;
    if(spaceBelow<230&&rect.top>230){
      dd.style.top='auto';
      dd.style.bottom=(window.innerHeight-rect.top+2)+'px';
    } else {
      dd.style.bottom='auto';
    }
  }

  function pop(q){
    dd.innerHTML='';q=(q||'').toLowerCase();let ls=null;
    const bannedInMatch=new Set((tObj.bans||[]).slice(0,pc).filter(b=>b));
    for(const s of ALL_S){
      if(bannedInMatch.has(s.name))continue;
      if(q&&!s.name.toLowerCase().includes(q))continue;
      if(s.stars!==ls){
        const g=document.createElement('div');g.className='sdd-grp';
        g.textContent=`${'⭐'.repeat(s.stars)} ${s.stars}★`;g.style.color=SC[s.stars];dd.appendChild(g);ls=s.stars;
      }
      const item=document.createElement('div');item.className='sdd-item';
      const dot=document.createElement('span');dot.className='sdot';dot.style.background=SC[s.stars];
      item.appendChild(dot);item.appendChild(document.createTextNode(s.name));
      item.addEventListener('mousedown',e=>{
        e.preventDefault();
        inp.value=s.name;
        tObj.rows[r].stage=s.name;
        inp.title=s.name;
        save();_closeDd();
        setTimeout(()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';},0);
      });
      dd.appendChild(item);
    }
    if(!dd.children.length){
      const ni=document.createElement('div');ni.className='sdd-item';ni.style.color='var(--dim)';ni.textContent='—';dd.appendChild(ni);
    }
  }

  inp.addEventListener('focus',()=>{
    autoResize();
    _closeAllDd();
    pop(inp.value);
    positionDd();
    dd.classList.add('open');
    _activeDd=dd;_activeDdInp=inp;
  });
  inp.addEventListener('input',()=>{
    tObj.rows[r].stage=inp.value;save();
    inp.title=inp.value;
    autoResize();
    pop(inp.value);
    positionDd();
    dd.classList.add('open');
    _activeDd=dd;_activeDdInp=inp;
  });
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{if(_activeDd===dd)_closeDd();},160));
  if(tObj.rows[r].stage) inp.title=tObj.rows[r].stage;

  const obs=new MutationObserver(()=>{if(!document.body.contains(inp)){if(_activeDd===dd){_activeDd=null;_activeDdInp=null;}dd.remove();obs.disconnect();}});
  obs.observe(document.body,{childList:true,subtree:true});

  wrap.appendChild(inp);

  // ── Random stage button — Round 1 (r===0) only ──
  if(r===0){
    const randBtn=document.createElement('button');
    randBtn.type='button';
    randBtn.className='rand-btn';
    randBtn.innerHTML=T('randStage');
    randBtn.title=T('randStage');
    randBtn.addEventListener('click',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      const s=ALL_S[Math.floor(Math.random()*ALL_S.length)];
      inp.value=s.name;
      tObj.rows[r].stage=s.name;
      inp.title=s.name;
      save();
      _closeDd();
      setTimeout(()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px';},0);
    });
    wrap.appendChild(randBtn);
  }

  return wrap;
}

function recalcBlock(tid){
  const tObj=tables.find(t=>t.id===tid);if(!tObj)return;
  const block=document.querySelector(`.match-block[data-tid="${tid}"]`);if(!block)return;
  const pc=tObj.playerCount||4;
  const activeRows=tObj.rowCount||ROWS_BASE;
  for(let r=0;r<activeRows;r++){
    const row=tObj.rows[r];const scores=calcScores(row,r,pc);
    const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
    const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
    const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
    for(let p=0;p<pc;p++){
      const td=block.querySelector(`td[data-p="${p}"][data-r="${r}"]`);if(!td)continue;
      const cw=td.querySelector('.tc-wrap');
      const inp=td.querySelector('.ti');const chip=td.querySelector('[data-chip]');if(!inp||!chip)continue;
      const t=parseTime(inp.value);const isB=t!==null&&t===best;const isKC=isKing&&p===kp;
      inp.className='ti'+(inp.value?' has-v':'')+(isB?(isKC?' best-king':' best'):'');
      if(cw){
        cw.classList.remove('is-best','is-best-king');
        if(isB) cw.classList.add(isKC?'is-best-king':'is-best');
      }
      const s=scores[p];chip.className=`score-chip ${scClass(s)}`;chip.textContent=s===null?'—':`+${s}`;
    }
  }
  const tots=Array(pc).fill(0);
  tObj.rows.forEach((row,r)=>{if(r<activeRows)calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
  const maxT=tots.length?Math.max(...tots):0;
  const totRow=document.getElementById(`tot-${tid}`);if(!totRow)return;
  totRow.querySelectorAll('[data-tp]').forEach((td,p)=>{
    const v=tots[p];const sp=td.querySelector('.total-val');if(!sp)return;
    sp.className='total-val '+(v===0?'tv-zero':v===maxT?'tv-top':'tv-val');sp.textContent=v||'0';
  });
  updateCollapsedSummary(tid);
  // ── Update banned-stage warnings ──
  const bannedSet=new Set((tObj.bans||[]).slice(0,pc).filter(b=>b));
  block.querySelectorAll('.stage-cell').forEach(cell=>{
    const si=cell.querySelector('.si');
    if(!si)return;
    const isBanned=bannedSet.size>0&&si.value&&bannedSet.has(si.value.trim());
    si.classList.toggle('stage-banned',!!isBanned);
    const existWarn=cell.querySelector('.stage-ban-warn');
    if(isBanned&&!existWarn){
      const sw=cell.querySelector('.sw');
      if(sw){const w=document.createElement('span');w.className='stage-ban-warn';w.textContent='🚫 '+T('banLabel');sw.appendChild(w);}
    } else if(!isBanned&&existWarn){
      existWarn.remove();
    }
  });
}

function showTotals(){
  const sm={};
  tables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const tots=Array(pc).fill(0);
    const activeRows=tObj.rowCount||ROWS_BASE;
    tObj.rows.forEach((row,r)=>{if(r<activeRows)calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){const n=(tObj.players[p]||'').trim()||`P${p+1}`;sm[n]=(sm[n]||0)+tots[p];}
  });
  const sorted=Object.entries(sm).map(([n,s])=>({name:n,score:s})).sort((a,b)=>b.score-a.score);
  const maxScore=sorted.length?sorted[0].score:1;

  const modal=document.getElementById('grandModal');
  const body=document.getElementById('modalBody');
  body.innerHTML='';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));

  if(!sorted.length){
    body.innerHTML=`<div style="text-align:center;color:var(--dim);padding:40px;font-family:'Orbitron',monospace;font-size:.75rem;">— ${T('score')} —</div>`;
  } else {
    const top3=sorted.slice(0,Math.min(3,sorted.length));
    if(top3.length>0){
      const podium=document.createElement('div');podium.className='podium-row';
      const order=top3.length===1?[0]:top3.length===2?[1,0]:[1,0,2];
      order.forEach(idx=>{
        if(idx>=top3.length)return;
        const item=top3[idx];const rank=idx+1;
        const card=document.createElement('div');
        card.className=`podium-card podium-${rank}`;
        const medal=['🥇','🥈','🥉'][idx];
        card.innerHTML=`
          <div class="podium-medal">${medal}</div>
          <div class="podium-name">${item.name}</div>
          <div class="podium-score p${rank}-score">${item.score}</div>
          <div class="podium-pts">${T('pts').toUpperCase()}</div>
        `;
        if(rank===1)card.style.transform='scale(1.05)';
        podium.appendChild(card);
      });
      body.appendChild(podium);
    }

    if(sorted.length>3){
      const sep=document.createElement('div');
      sep.style.cssText='text-align:center;color:var(--dim);font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;margin:8px 0;';
      sep.textContent='─── OTHER RANKINGS ───';
      body.appendChild(sep);
      const list=document.createElement('div');list.className='standings-list';
      sorted.slice(3).forEach((item,i)=>{
        const div=document.createElement('div');div.className='standing-item';
        const barPct=maxScore>0?Math.round((item.score/maxScore)*100):0;
        div.innerHTML=`
          <span class="si-rank">#${i+4}</span>
          <span class="si-name">${item.name}</span>
          <div class="si-bar-wrap"><div class="si-bar" style="width:${barPct}%"></div></div>
          <span class="si-score">${item.score}</span>
        `;
        list.appendChild(div);
      });
      body.appendChild(list);
    }
  }

  modal.style.display='flex';
  document.body.style.overflow='hidden';
}

function closeTotals(){
  document.getElementById('grandModal').style.display='none';
  document.body.style.overflow='';
}
function closeModal(e){

let _editCatId=null;
const CAT_COLORS=['#3b9dff','#f5c518','#22c55e','#ef4444','#a855f7','#fb923c','#f472b6','#22d3ee'];

function getCatColor(id){return CAT_COLORS[id%CAT_COLORS.length];}

function openCatModal(editId=null){
  _editCatId=editId;
  const cat=editId!==null?categories.find(c=>c.id===editId):null;
  document.getElementById('catModalTitle').textContent=cat?T('editCatTitle'):T('createCatTitle');
  document.getElementById('catNameInput').value=cat?cat.name:'';
  document.getElementById('catModal').style.display='flex';
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('catNameInput').select(),80);
}
function closeCatModal(){
  document.getElementById('catModal').style.display='none';
  document.body.style.overflow='';_editCatId=null;
}
function saveCat(){
  const name=document.getElementById('catNameInput').value.trim();
  if(!name)return;
  if(_editCatId!==null){
    const c=categories.find(c=>c.id===_editCatId);if(c)c.name=name;
  } else {
    categories.push({id:catCounter++,name,collapsed:false});
  }
  save();closeCatModal();renderAll();
}
function deleteCategory(id){
  if(!confirm(T('deleteCatConfirm')))return;
  categories=categories.filter(c=>c.id!==id);
  tables.forEach(t=>{if(t.catId===id)t.catId=null;});
  save();renderAll();
}
function toggleCatCollapse(id){
  const c=categories.find(c=>c.id===id);if(!c)return;
  c.collapsed=!c.collapsed;save();
  const body=document.getElementById(`catBody-${id}`);
  const hdr=document.getElementById(`catHdr-${id}`);
  if(body)body.classList.toggle('hidden',c.collapsed);
  if(hdr)hdr.classList.toggle('collapsed',c.collapsed);
}
function setTableCategory(tid,catId){
  const t=tables.find(t=>t.id===tid);if(!t)return;
  t.catId=catId;save();renderAll();
}

let _activeCatDd=null;
function openCatDd(btn,tid){
  if(_activeCatDd){const _wasSame=_activeCatDd.dataset.tid===String(tid);_activeCatDd.remove();_activeCatDd=null;if(_wasSame)return;}
  const dd=document.createElement('div');dd.className='cat-dd';dd.dataset.tid=tid;
  const none=document.createElement('div');none.className='cat-dd-item';
  none.innerHTML=`<span class="cat-dot" style="background:var(--dim)"></span>${T('noCat')}`;
  none.onclick=()=>{setTableCategory(tid,null);dd.remove();_activeCatDd=null;};
  dd.appendChild(none);
  if(categories.length){
    const div=document.createElement('div');div.className='cat-dd-divider';dd.appendChild(div);
  }
  categories.forEach(cat=>{
    const item=document.createElement('div');item.className='cat-dd-item';
    const tObj=tables.find(t=>t.id===tid);
    if(tObj&&tObj.catId===cat.id)item.classList.add('active');
    item.innerHTML=`<span class="cat-dot" style="background:${getCatColor(cat.id)}"></span>${cat.name}`;
    item.onclick=()=>{setTableCategory(tid,cat.id);dd.remove();_activeCatDd=null;};
    dd.appendChild(item);
  });
  document.body.appendChild(dd);
  _activeCatDd=dd;
  const rect=btn.getBoundingClientRect();
  dd.style.top=(rect.bottom+4)+'px';
  dd.style.left=rect.left+'px';
  dd.style.display='block';
  setTimeout(()=>{
    document.addEventListener('click',function h(e){if(!dd.contains(e.target)&&e.target!==btn){dd.remove();_activeCatDd=null;document.removeEventListener('click',h);}});
  },10);
}

// ── CAT LEADERBOARD BOX ──
function buildCatLbBox(catId){
  const box=document.createElement('div');box.className='cat-lb';box.id=`catLb-${catId}`;
  const hdr=document.createElement('div');hdr.className='cat-lb-hdr';
  const dot=document.createElement('span');dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${getCatColor(catId)};display:inline-block;margin-right:6px;`;
  const title=document.createElement('span');title.className='cat-lb-title';title.textContent='🏆 LEADERBOARD';
  hdr.appendChild(dot);hdr.appendChild(title);box.appendChild(hdr);
  const lbBody=document.createElement('div');lbBody.className='cat-lb-body';lbBody.id=`catLbBody-${catId}`;
  box.appendChild(lbBody);return box;
}
function updateCatLb(catId){
  const lbBody=document.getElementById(`catLbBody-${catId}`);if(!lbBody)return;
  const catTables=tables.filter(t=>t.catId===catId);
  const sm={};const playCount={};
  catTables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const ar=tObj.rowCount||ROWS_BASE;const tots=Array(pc).fill(0);
    tObj.rows.forEach((row,r)=>{if(r<ar)calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){
      const n=(tObj.players[p]||'').trim()||`P${p+1}`;
      sm[n]=(sm[n]||0)+tots[p];
      playCount[n]=(playCount[n]||0)+1;
    }
  });
  const sorted=Object.entries(sm).map(([n,s])=>({name:n,score:s,plays:playCount[n]||0})).sort((a,b)=>b.score-a.score).slice(0,5);
  lbBody.innerHTML='';
  if(!sorted.length){
    lbBody.innerHTML=`<div style="padding:14px;text-align:center;color:var(--dim);font-size:.72rem;font-family:Rajdhani,monospace;">— ${T('noDataYet')} —</div>`;
    return;
  }
  const RANK_ICONS=['🥇','🥈','🥉'];
  const RANK_COLORS=['#fbbf24','#cbd5e1','#cd7f32'];
  sorted.forEach((item,i)=>{
    const rank=i+1;
    const row=document.createElement('div');
    row.className=`lb-row ${rank===1?'lb-1':rank===2?'lb-2':rank===3?'lb-3':'lb-o'}`;

    // ── rank cell ──
    const rankCell=document.createElement('div');
    rankCell.className=`lb-rank-cell${rank<=3?' r'+rank:''}`;
    if(rank<=3){
      rankCell.textContent=RANK_ICONS[rank-1];
    } else {
      rankCell.textContent=`#${rank}`;
      rankCell.style.color='#475569';
    }

    // ── name + matches ──
    const info=document.createElement('div');info.className='lb-info';
    const nameEl=document.createElement('span');nameEl.className='lb-name';nameEl.textContent=item.name;
    const playsEl=document.createElement('span');playsEl.className='lb-plays';
    playsEl.textContent=`${item.plays} ${T('matchUnit')}`;
    info.appendChild(nameEl);info.appendChild(playsEl);

    // ── score ──
    const scoreEl=document.createElement('div');scoreEl.className='lb-score';
    scoreEl.textContent=item.score;
    scoreEl.style.color=rank<=3?RANK_COLORS[rank-1]:'var(--blue2)';
    if(rank===1)scoreEl.style.textShadow='0 0 12px rgba(251,191,36,.7)';

    row.appendChild(rankCell);row.appendChild(info);row.appendChild(scoreEl);
    lbBody.appendChild(row);
  });
}

let _bestTimeCatId=null;

function openBestTimeModal(catId){
  _bestTimeCatId=catId;
  const cat=catId!==null?categories.find(c=>c.id===catId):null;
  const catTables=catId!==null?tables.filter(t=>t.catId===catId):tables;
  const title=cat?`⚡ ${T('catBestTime')} — ${cat.name}`:`⚡ ${T('allBestTime')}`;
  document.getElementById('bestTimeTitle').textContent=title;
  const body=document.getElementById('bestTimeBody');body.innerHTML='';
  const stageMap={};
  catTables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const ar=tObj.rowCount||ROWS_BASE;
    tObj.rows.forEach((row,r)=>{
      if(r>=ar||!row.stage)return;
      row.times.slice(0,pc).forEach((tv,p)=>{
        const t=parseTime(tv);if(t===null)return;
        const name=(tObj.players[p]||'').trim()||`P${p+1}`;
        if(!stageMap[row.stage]||t<stageMap[row.stage].time)
          stageMap[row.stage]={time:t,timeStr:tv,player:name,match:`${T('matchLabel')} #${tObj.id+1}`};
      });
    });
  });
  const stages=Object.entries(stageMap).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!stages.length){
    body.innerHTML=`<div style="padding:24px;text-align:center;color:var(--dim);font-family:Rajdhani,monospace;font-size:.85rem;">${T('noDataYet')}</div>`;
  } else {
    const wrap=document.createElement('div');wrap.style.cssText='overflow-x:auto;';
    const tbl=document.createElement('table');tbl.className='best-time-tbl';
    tbl.innerHTML=`<thead><tr><th>${T('stageLabel')}</th><th>${T('bestTimeCol')}</th><th>${T('player')}</th><th>${T('matchLabel')}</th></tr></thead>`;
    const tbody=document.createElement('tbody');
    stages.forEach(([stage,info])=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`<td class="bt-stage">${stage}</td><td class="bt-time">${info.timeStr}</td><td class="bt-player">${info.player}</td><td class="bt-player">${info.match}</td>`;
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);wrap.appendChild(tbl);body.appendChild(wrap);
  }
  document.getElementById('bestTimeModal').style.display='flex';
  document.body.style.overflow='hidden';
}
function closeBestTimeModal(){document.getElementById('bestTimeModal').style.display='none';document.body.style.overflow='';}

async function saveBestTimeImage(){
  const catId=_bestTimeCatId;
  const cat=catId!==null?categories.find(c=>c.id===catId):null;
  const catTables=catId!==null?tables.filter(t=>t.catId===catId):tables;
  const titleTxt=cat?`⚡ ${T('catBestTime')} — ${cat.name}`:`⚡ ${T('allBestTime')}`;

  const stageMap={};
  catTables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const ar=tObj.rowCount||ROWS_BASE;
    tObj.rows.forEach((row,r)=>{
      if(r>=ar||!row.stage)return;
      row.times.slice(0,pc).forEach((tv,p)=>{
        const t=parseTime(tv);if(t===null)return;
        const name=(tObj.players[p]||'').trim()||`P${p+1}`;
        if(!stageMap[row.stage]||t<stageMap[row.stage].time)
          stageMap[row.stage]={time:t,timeStr:tv,player:name,match:`#${tObj.id+1}`};
      });
    });
  });
  const stages=Object.entries(stageMap).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!stages.length){alert(T('noDataYet'));return;}

  const isLight=currentMode==='light';
  const htmlEl=document.documentElement;
  const cs=getComputedStyle(htmlEl);
  const cv=(v,fb)=>cs.getPropertyValue(v).trim()||fb;
  const bgColor  =cv('--bg',       isLight?'#dde8f8':'#04081a');
  const textColor=cv('--text',     isLight?'#0a1a3a':'#e8f0ff');
  const dimColor =cv('--dim',      isLight?'#4a6898':'#5a78aa');
  const goldColor=cv('--gold',     isLight?'#b8860b':'#f5c518');
  const blueColor=cv('--ac1',      isLight?'#1558c0':'#1d6fe8');
  const blue2    =cv('--ac2',      isLight?'#1a72e8':'#3b9dff');
  const s1Color  =cv('--s1',       isLight?'#c8daf5':'#071230');
  const cardBg   =isLight?'rgba(255,255,255,.98)':s1Color+'ee';
  const hdrBg    =isLight?cv('--s2','#b8ccee'):cv('--s1','#071230');
  const rowAlt   =isLight?'#f0f6ff':'#05101888';

  const PAD=28,COL_STAGE=240,COL_TIME=100,COL_PLAYER=120,COL_MATCH=80;
  const W=PAD*2+COL_STAGE+COL_TIME+COL_PLAYER+COL_MATCH;
  const ROW_H=38,HEAD_H=44,TITLE_H=52,FOOT=28;
  const H=PAD+TITLE_H+HEAD_H+ROW_H*stages.length+FOOT;

  const canvas=document.createElement('canvas');canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=cardBg;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.fill();
  ctx.strokeStyle=blueColor+'55';ctx.lineWidth=1;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.stroke();
  const acc=ctx.createLinearGradient(PAD/2,0,W-PAD/2,0);
  acc.addColorStop(0,'transparent');acc.addColorStop(.35,blueColor);acc.addColorStop(.65,goldColor);acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc;ctx.fillRect(PAD/2,PAD/2,W-PAD,3);

  let y=PAD+8;
  ctx.textAlign='center';ctx.fillStyle=goldColor;
  ctx.font=`bold 18px Rajdhani,Orbitron,sans-serif`;
  fillTextEllipsis(ctx,titleTxt,W/2,y+20,W-PAD*2-16);
  y+=TITLE_H;

  ctx.fillStyle=hdrBg;ctx.fillRect(PAD,y,W-PAD*2,HEAD_H);
  const cols=[{label:T('stageLabel'),x:PAD+6,w:COL_STAGE-10,align:'left'},{label:T('bestTimeCol'),x:PAD+COL_STAGE+COL_TIME/2,w:COL_TIME,align:'center'},{label:T('player'),x:PAD+COL_STAGE+COL_TIME+COL_PLAYER/2,w:COL_PLAYER,align:'center'},{label:T('matchLabel'),x:PAD+COL_STAGE+COL_TIME+COL_PLAYER+COL_MATCH/2,w:COL_MATCH,align:'center'}];
  ctx.font=`700 10px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
  cols.forEach(col=>{ctx.textAlign=col.align;ctx.fillText(col.label,col.x,y+HEAD_H/2+4);});
  ctx.strokeStyle=blueColor+'44';ctx.lineWidth=1;ctx.strokeRect(PAD,y,W-PAD*2,HEAD_H);
  y+=HEAD_H;

  stages.forEach(([stage,info],i)=>{
    const ry=y+i*ROW_H;
    ctx.fillStyle=i%2===1?rowAlt:cardBg;ctx.fillRect(PAD,ry,W-PAD*2,ROW_H);
    ctx.strokeStyle=blueColor+'22';ctx.lineWidth=.5;ctx.strokeRect(PAD,ry,W-PAD*2,ROW_H);
    const cy=ry+ROW_H/2+4;
    ctx.textAlign='left';ctx.font=`600 10px "Exo 2",Sarabun,sans-serif`;ctx.fillStyle=textColor;
    fillTextEllipsis(ctx,stage,PAD+6,cy,COL_STAGE-12);
    ctx.textAlign='center';ctx.font=`700 12px Rajdhani,monospace`;ctx.fillStyle=goldColor;
    ctx.fillText(info.timeStr,PAD+COL_STAGE+COL_TIME/2,cy);
    ctx.fillStyle=blue2;ctx.font=`600 10px "Exo 2",sans-serif`;
    fillTextEllipsis(ctx,info.player,PAD+COL_STAGE+COL_TIME+COL_PLAYER/2,cy,COL_PLAYER-8);
    ctx.fillStyle=dimColor;ctx.font=`600 9px Rajdhani,monospace`;
    ctx.fillText(info.match,PAD+COL_STAGE+COL_TIME+COL_PLAYER+COL_MATCH/2,cy);
  });
  y+=ROW_H*stages.length;

  ctx.textAlign='right';ctx.font=`500 8px "Exo 2",sans-serif`;ctx.fillStyle=dimColor;
  ctx.fillText('🏁 Race Time Tracker',W-PAD,H-10);

  const link=document.createElement('a');
  const safeName=(cat?cat.name:'all').replace(/[^a-zA-Z0-9ก-๙]/g,'_').substring(0,20);
  link.download=`best_times_${safeName}_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
}

function collapseAll(){
  const allCollapsed=tables.every(t=>t.collapsed);
  tables.forEach(t=>{t.collapsed=!allCollapsed;});save();
  tables.forEach(t=>{
    const block=document.querySelector(`.match-block[data-tid="${t.id}"]`);
    if(block){block.classList.toggle('collapsed',t.collapsed);updateCollapsedSummary(t.id);}
  });
  const sp=document.getElementById('collapseAllTxt');
  if(sp)sp.textContent=allCollapsed?T('collapseAll'):T('expandAll');
}
function toggleCollapse(tid){
  const tObj=tables.find(t=>t.id===tid);if(!tObj)return;
  tObj.collapsed=!tObj.collapsed;save();
  const block=document.querySelector(`.match-block[data-tid="${tid}"]`);
  if(block){
    block.classList.toggle('collapsed',tObj.collapsed);
    updateCollapsedSummary(tid);
  }
}

function updateCollapsedSummary(tid){
  const tObj=tables.find(t=>t.id===tid);if(!tObj)return;
  const summary=document.getElementById(`summary-${tid}`);if(!summary)return;
  const pc=tObj.playerCount||4;
  const activeRows=tObj.rowCount||ROWS_BASE;
  const tots=Array(pc).fill(0);
  tObj.rows.forEach((row,r)=>{if(r<activeRows)calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
  const maxT=Math.max(...tots,0);
  summary.innerHTML='';
  for(let p=0;p<pc;p++){
    const name=(tObj.players[p]||'').trim()||`P${p+1}`;
    const div=document.createElement('div');div.className='cs-player';
    const isTop=tots[p]===maxT&&tots[p]>0;
    div.style.borderColor=isTop?'var(--gold)':'';
    div.innerHTML=`<span class="cs-name">${name}</span><span class="cs-score" style="color:${isTop?'var(--gold)':'var(--blue2)'}">${tots[p]}</span>`;
    summary.appendChild(div);
  }
}
