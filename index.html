function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

// Draw text with ellipsis if too wide
function fillTextEllipsis(ctx, text, x, y, maxWidth){
  if(!text) return;
  if(ctx.measureText(text).width <= maxWidth){
    ctx.fillText(text, x, y);
    return;
  }
  let truncated = text;
  while(truncated.length > 1 && ctx.measureText(truncated + '…').width > maxWidth){
    truncated = truncated.slice(0, -1);
  }
  ctx.fillText(truncated + '…', x, y);
}

async function captureTableImage(){
  if(_saveImageTid===null) return;
  const titleTxt=document.getElementById('imgModalTitle').value.trim()||'Race Table';
  const descTxt=document.getElementById('imgModalDesc').value.trim();
  const tObj=tables.find(t=>t.id===_saveImageTid);if(!tObj)return;
  const isLight=currentMode==='light';
  const pc=tObj.playerCount||4;
  const activeRows=tObj.rowCount||ROWS_BASE;

  // Theme colors
  const htmlEl=document.documentElement;
  const cs=getComputedStyle(htmlEl);
  const cv=(v,fb)=>{const val=cs.getPropertyValue(v).trim();return val||fb;};
  const bgColor   =cv('--bg',       isLight?'#dde8f8':'#04081a');
  const textColor =cv('--text',     isLight?'#0a1a3a':'#e8f0ff');
  const dimColor  =cv('--dim',      isLight?'#4a6898':'#5a78aa');
  const goldColor =cv('--gold',     isLight?'#b8860b':'#f5c518');
  const blueColor =cv('--ac1',      isLight?'#1558c0':'#1d6fe8');
  const blue2Color=cv('--ac2',      isLight?'#1a72e8':'#3b9dff');
  const greenClr  =cv('--green',    isLight?'#16a34a':'#22c55e');
  const s1Color   =cv('--s1',       isLight?'#c8daf5':'#071230');
  const cardBg    =isLight?'rgba(248,252,255,.98)':s1Color+'ee';
  const hdrBg     =isLight?cv('--s2','#b8ccee'):cv('--s1','#071230');
  const colAlt    =isLight?'rgba(21,88,192,.04)':'rgba(255,255,255,.02)';
  const borderClr =blueColor+'33';
  const redClr    ='#ef4444';

  // ── LANDSCAPE LAYOUT ──
  // Rows (fixed): [รอบ, แผนที่, P1, P2, ..., Pn, คะแนนรวม]
  // Columns: each round + label col on left
  const PAD=24;
  const LABEL_W=90;   // leftmost label column width
  const COL_W=82;     // width per round column
  const ROW_RND=32;   // row: round number
  const ROW_STAGE=36; // row: stage name
  const ROW_P=52;     // row: each player (time + score chip)
  const ROW_TOT=38;   // row: total row
  const TITLE_H=50;
  const DESC_H=descTxt?32:0;
  const FOOT=24;

  const nRows=2+pc+1; // รอบ + แผนที่ + pc players + total
  const tableH=ROW_RND+ROW_STAGE+ROW_P*pc+ROW_TOT;
  const W=PAD*2+LABEL_W+COL_W*activeRows;
  const H=PAD+TITLE_H+DESC_H+tableH+FOOT;

  const canvas=document.createElement('canvas');
  canvas.width=W*2;canvas.height=H*2;
  const ctx=canvas.getContext('2d');ctx.scale(2,2);

  // ── Background ──
  ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
  ctx.fillStyle=cardBg;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.fill();
  ctx.strokeStyle=blueColor+'44';ctx.lineWidth=1;roundRect(ctx,PAD/2,PAD/2,W-PAD,H-PAD,14);ctx.stroke();

  // Top accent stripe
  const acc=ctx.createLinearGradient(PAD/2,0,W-PAD/2,0);
  acc.addColorStop(0,'transparent');acc.addColorStop(.3,blueColor);
  acc.addColorStop(.5,goldColor);acc.addColorStop(.7,blueColor);acc.addColorStop(1,'transparent');
  ctx.fillStyle=acc;ctx.fillRect(PAD/2,PAD/2,W-PAD,3);

  // ── Title ──
  let y=PAD+8;
  ctx.textAlign='center';ctx.fillStyle=goldColor;
  ctx.font=`bold 18px Rajdhani,Orbitron,sans-serif`;
  fillTextEllipsis(ctx,titleTxt,W/2,y+20,W-PAD*2-20);
  y+=TITLE_H;

  // ── Description ──
  if(descTxt){
    ctx.font=`600 11px "Exo 2",Sarabun,sans-serif`;ctx.fillStyle=dimColor;
    fillTextEllipsis(ctx,descTxt,W/2,y+14,W-PAD*2-16);
    y+=DESC_H;
  }

  // ── Pre-calc scores for all rounds ──
  const allScores=[];
  const allParsed=[];
  const allBest=[];
  for(let r=0;r<activeRows;r++){
    const row=tObj.rows[r];
    const scores=calcScores(row,r,pc);
    const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
    const valid=parsed.filter(t=>t!==null);
    allScores.push(scores);allParsed.push(parsed);
    allBest.push(valid.length?Math.min(...valid):null);
  }
  const tots=Array(pc).fill(0);
  allScores.forEach(sc=>sc.forEach((s,p)=>{if(s!==null)tots[p]+=s;}));
  const maxT=Math.max(...tots,0);

  // Helper: col X position
  const colX=(r)=>PAD+LABEL_W+COL_W*r;
  const tableX=PAD;const tableW=W-PAD*2;

  // ── ROW 1: รอบ (round numbers) ──
  // Label
  ctx.fillStyle=hdrBg;ctx.fillRect(tableX,y,tableW,ROW_RND);
  ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,y,tableW,ROW_RND);
  ctx.textAlign='left';ctx.font=`700 9px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
  ctx.fillText(T('round').toUpperCase(),tableX+8,y+ROW_RND/2+4);
  // Round numbers
  for(let r=0;r<activeRows;r++){
    const cx=colX(r);
    // Alternate column bg
    if(r%2===1){ctx.fillStyle=colAlt;ctx.fillRect(cx,y,COL_W,ROW_RND);}
    // King indicator
    const isKing=r in KM&&KM[r]<pc;
    ctx.textAlign='center';
    if(isKing){
      ctx.fillStyle=redClr;roundRect(ctx,cx+10,y+4,COL_W-20,ROW_RND-8,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font=`700 8px Rajdhani,sans-serif`;
      ctx.fillText(`${r+1} 👑`,cx+COL_W/2,y+ROW_RND/2+4);
    } else {
      ctx.fillStyle=blue2Color;ctx.font=`700 12px Rajdhani,sans-serif`;
      ctx.fillText(r+1,cx+COL_W/2,y+ROW_RND/2+5);
    }
    // Vertical divider
    ctx.strokeStyle=borderClr;ctx.lineWidth=.5;
    ctx.beginPath();ctx.moveTo(cx,y);ctx.lineTo(cx,y+tableH);ctx.stroke();
  }
  y+=ROW_RND;

  // ── ROW 2: แผนที่ (stage) ──
  ctx.fillStyle=hdrBg;ctx.fillRect(tableX,y,tableW,ROW_STAGE);
  ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,y,tableW,ROW_STAGE);
  ctx.textAlign='left';ctx.font=`700 9px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
  ctx.fillText(T('stageLabel').toUpperCase(),tableX+8,y+ROW_STAGE/2+4);
  for(let r=0;r<activeRows;r++){
    const cx=colX(r);
    if(r%2===1){ctx.fillStyle=colAlt;ctx.fillRect(cx,y,COL_W,ROW_STAGE);}
    const stg=tObj.rows[r].stage||'—';
    ctx.textAlign='center';ctx.fillStyle=textColor;
    ctx.font=`600 8px "Exo 2",Sarabun,sans-serif`;
    fillTextEllipsis(ctx,stg,cx+COL_W/2,y+ROW_STAGE/2+4,COL_W-8);
  }
  y+=ROW_STAGE;

  // ── ROWS 3..N: Players ──
  for(let p=0;p<pc;p++){
    const pName=(tObj.players[p]||'').trim()||`P${p+1}`;
    const ry=y+ROW_P*p;
    const isEven=p%2===0;

    // Label cell — show name only, no score
    ctx.fillStyle=isEven?cardBg:colAlt;
    ctx.fillRect(tableX,ry,LABEL_W,ROW_P);
    ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(tableX,ry,LABEL_W,ROW_P);
    ctx.textAlign='left';
    ctx.font=`600 8px Rajdhani,sans-serif`;ctx.fillStyle=dimColor;
    ctx.fillText(`${T('playerLabel')} ${p+1}`,tableX+7,ry+14);
    ctx.font=`700 12px Rajdhani,sans-serif`;ctx.fillStyle=goldColor;
    fillTextEllipsis(ctx,pName,tableX+7,ry+30,LABEL_W-12);

    // Round cells for this player
    for(let r=0;r<activeRows;r++){
      const cx=colX(r);
      const isB=allParsed[r][p]!==null&&allParsed[r][p]===allBest[r];
      const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
      const isKC=isKing&&p===kp;

      ctx.fillStyle=isEven?cardBg:colAlt;
      ctx.fillRect(cx,ry,COL_W,ROW_P);
      ctx.strokeStyle=borderClr;ctx.lineWidth=.5;ctx.strokeRect(cx,ry,COL_W,ROW_P);

      if(isB){
        ctx.strokeStyle=isKC?redClr:goldColor;ctx.lineWidth=2;
        roundRect(ctx,cx+3,ry+3,COL_W-6,ROW_P-6,5);ctx.stroke();
        ctx.fillStyle=isKC?'rgba(239,68,68,.1)':'rgba(245,197,24,.1)';
        roundRect(ctx,cx+3,ry+3,COL_W-6,ROW_P-6,5);ctx.fill();
      }

      const tv=tObj.rows[r].times[p]||'—';
      ctx.textAlign='center';
      ctx.fillStyle=isB?(isKC?redClr:goldColor):textColor;
      ctx.font=`700 12px Rajdhani,monospace`;
      ctx.fillText(tv,cx+COL_W/2,ry+ROW_P/2+1);

      const s=allScores[r][p];
      if(s!==null){
        const cW=30,cH=13,cX=cx+COL_W/2-cW/2,cY=ry+ROW_P/2+7;
        ctx.fillStyle=s===12?'rgba(239,68,68,.2)':s===11?'rgba(245,197,24,.2)':s>=8?'rgba(34,197,94,.15)':'rgba(90,120,170,.1)';
        roundRect(ctx,cX,cY,cW,cH,6);ctx.fill();
        ctx.fillStyle=s===12?redClr:s===11?goldColor:s>=8?greenClr:dimColor;
        ctx.font=`700 8px Rajdhani,monospace`;ctx.textAlign='center';
        ctx.fillText(`+${s}`,cx+COL_W/2,cY+cH/2+3);
      } else if(activeRows>ROWS_BASE&&r>=ROWS_BASE){
        ctx.fillStyle=dimColor;ctx.font=`600 7px Rajdhani,monospace`;ctx.textAlign='center';
        ctx.fillText('NO PT',cx+COL_W/2,ry+ROW_P-8);
      }
    }
  }
  y+=ROW_P*pc;

  // ── TOTAL ROW — ⚡ label + N equal cells (name + score, same size, no dividers) ──
  const totGrad=ctx.createLinearGradient(tableX,y,tableX+tableW,y);
  totGrad.addColorStop(0,blueColor+'55');totGrad.addColorStop(.5,goldColor+'33');totGrad.addColorStop(1,blueColor+'55');
  ctx.fillStyle=totGrad;ctx.fillRect(tableX,y,tableW,ROW_TOT);
  ctx.strokeStyle=goldColor+'66';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(tableX,y);ctx.lineTo(tableX+tableW,y);ctx.stroke();
  ctx.strokeStyle=borderClr;ctx.lineWidth=.5;
  // Only draw outer border, no inner dividers
  ctx.strokeRect(tableX,y,tableW,ROW_TOT);

  // ⚡ label
  ctx.textAlign='left';ctx.font=`700 10px Rajdhani,monospace`;ctx.fillStyle=goldColor;
  ctx.fillText('⚡ '+T('grandTotal').replace('⚡','').trim(),tableX+7,y+ROW_TOT/2+4);

  // Player score cells — divide remaining width equally, NO dividers between cells
  const scoreAreaX=tableX+LABEL_W;
  const scoreAreaW=tableW-LABEL_W;
  const scoreColW=scoreAreaW/pc;
  const FONT_SIZE=10; // same font size for both name and score

  for(let p=0;p<pc;p++){
    const pName=(tObj.players[p]||'').trim()||`P${p+1}`;
    const sx=scoreAreaX+scoreColW*p;
    const isTop=tots[p]===maxT&&tots[p]>0;
    const cx2=sx+scoreColW/2;

    // Name + score centered together, same font size
    ctx.textAlign='center';
    ctx.font=`600 ${FONT_SIZE}px Rajdhani,sans-serif`;
    ctx.fillStyle=isTop?goldColor:dimColor;
    const nameW=ctx.measureText(pName).width;

    ctx.font=`700 ${FONT_SIZE}px Rajdhani,monospace`;
    const scoreStr=String(tots[p]);
    const scoreW=ctx.measureText(scoreStr).width;

    const gap=6;
    const totalW=nameW+gap+scoreW;
    const startX=cx2-totalW/2;

    // Draw name
    ctx.font=`600 ${FONT_SIZE}px Rajdhani,sans-serif`;
    ctx.fillStyle=isTop?goldColor:dimColor;
    ctx.textAlign='left';
    ctx.fillText(pName,startX,y+ROW_TOT/2+4);

    // Draw score right after name
    ctx.font=`700 ${FONT_SIZE}px Rajdhani,monospace`;
    ctx.fillStyle=isTop?goldColor:blue2Color;
    if(isTop){ctx.shadowColor=goldColor;ctx.shadowBlur=8;}
    ctx.fillText(scoreStr,startX+nameW+gap,y+ROW_TOT/2+4);
    ctx.shadowBlur=0;ctx.shadowColor='transparent';
  }

  // Watermark
  ctx.textAlign='right';ctx.font=`500 8px "Exo 2",sans-serif`;ctx.fillStyle=dimColor+'99';
  ctx.fillText('🏁 Race Time Tracker',W-PAD,H-8);

  const link=document.createElement('a');
  link.download=`race_match_${tObj.id+1}_${Date.now()}.png`;
  link.href=canvas.toDataURL('image/png');link.click();
  closeSaveImgModal();
}

// ── IMPORT EXCEL ──
function importExcel(){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded');return;}
  const input=document.createElement('input');input.type='file';input.accept='.xlsx';
  input.onchange=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    const buf=await file.arrayBuffer();
    const wb=new ExcelJS.Workbook();
    try{await wb.xlsx.load(buf);}catch(err){alert('ไม่สามารถอ่านไฟล์ได้: '+err.message);return;}
    const ws=wb.worksheets[0];if(!ws){alert('ไม่พบ sheet ในไฟล์นี้');return;}

    // ── Collect all rows into array ──
    const rows=[];
    ws.eachRow((row,rn)=>{
      const vals=[];
      row.eachCell({includeEmpty:true},(cell,cn)=>{
        // Resolve merged cells, rich text, etc.
        let v=cell.value;
        if(v&&typeof v==='object'){
          if(v.richText)v=v.richText.map(r=>r.text).join('');
          else if(v.result!==undefined)v=v.result;
          else if(v.text)v=v.text;
        }
        vals[cn-1]=v===null||v===undefined?'':String(v).trim();
      });
      rows.push({rn,vals});
    });
    if(rows.length<4){alert('ไฟล์ไม่ถูกต้องหรือข้อมูลน้อยเกินไป');return;}

    // ── Row 2: generic P1..PX headers (just column positions) ──
    // ── Row 4+: data with match header rows interspersed ──
    // New format: match header row (dark bg) has player names, then round rows
    // Old format: round rows with "รอบ 1" in col2 starts new match

    // Detect round patterns for both formats
    const round1Patterns=[/[-–]\s*(รอบ|Round|Vòng|回合|轮次)\s*1\b/i];
    const roundPatterns=[/\b(รอบ|Round|Vòng|回合|轮次)\s*(\d+)/i];
    function isRound1(s){return round1Patterns.some(p=>p.test(s));}
    function getRoundNum(s){for(const p of roundPatterns){const m=s.match(p);if(m)return parseInt(m[2]);}return null;}

    // Match header row: contains matchLabel keyword + match number
    const matchHdrPatterns=[/^(การแข่งขัน|Match|Trận|比赛|比賽)\s*\d+$/i];
    function isMatchHdr(s){return matchHdrPatterns.some(p=>p.test(s.trim()));}

    // Total row patterns
    const totalPatterns=[/คะแนนรวม/,/Total/i,/总计/,/Tổng/i,/總計/,/Grand/i];
    function isTotalRow(s){return totalPatterns.some(p=>p.test(s));}

    const newTables=[];
    let currentT=null;

    for(let ri=3;ri<rows.length;ri++){
      const vals=rows[ri].vals;
      const c1=(vals[0]||'').trim();
      const c2=(vals[1]||'').trim();
      const combined=c1+' '+c2;

      // Skip total rows
      if(isTotalRow(c1)||isTotalRow(c2))continue;

      // ── New format: match header row (e.g. "การแข่งขัน 1") ──
      if(isMatchHdr(c1)){
        // Read player names from cols 3,5,7,... of this same row
        const matchPlayers=[];
        for(let p=0;p<MAX_P;p++){
          const pName=(vals[2+p*2]||'').trim();
          matchPlayers.push(pName&&pName!=='—'?pName:'');
        }
        const matchPc=Math.max(2,matchPlayers.filter(n=>n).length||2);
        currentT=mkTable(matchPc);
        currentT.players=matchPlayers.concat(Array(MAX_P-matchPlayers.length).fill('')).slice(0,MAX_P);
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
        continue;
      }

      // ── Old format: new match detected by "รอบ 1" pattern ──
      if(!currentT&&isRound1(c2)){
        // Read global player names from row 2 (rows[1])
        const globalPlayers=[];
        for(let p=0;p<MAX_P;p++){
          const pName=(rows[1].vals[2+p*2]||'').trim();
          globalPlayers.push(pName&&pName!=='undefined'?pName:'');
        }
        const gpc=Math.max(2,globalPlayers.filter(n=>n).length||2);
        currentT=mkTable(gpc);
        currentT.players=globalPlayers.slice(0,MAX_P);
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
      } else if(currentT&&isRound1(c2)){
        // Old format multi-match: new match starts
        const prevT=currentT;
        currentT=mkTable(prevT.playerCount);
        currentT.players=[...prevT.players];
        currentT.rowCount=ROWS_BASE;
        newTables.push(currentT);
      }

      if(!currentT)continue;

      // ── Parse round row ──
      // New format col2: "รอบ 1 (stageName)"  Old format: "การแข่งขัน 1 - รอบ 1 (stageName)"
      const roundMatch=c2.match(/(?:[-–]\s*)?(?:รอบ|Round|Vòng|回合|轮次)\s*(\d+)(?:\s*\(([^)]*)\))?/i);
      if(!roundMatch)continue;
      const roundIdx=parseInt(roundMatch[1])-1;
      const stageName=(roundMatch[2]||'').trim();
      if(roundIdx<0||roundIdx>=ROWS_MAX)continue;

      if(stageName)currentT.rows[roundIdx].stage=stageName;

      for(let p=0;p<(currentT.playerCount||MAX_P);p++){
        const colIdx=2+p*2;
        const tv=(vals[colIdx]||'').trim();
        if(tv&&tv!=='0'&&/\d/.test(tv))currentT.rows[roundIdx].times[p]=tv;
      }
      currentT.rowCount=Math.max(currentT.rowCount,roundIdx+1);
      if(currentT.rowCount<ROWS_BASE)currentT.rowCount=ROWS_BASE;
    }

    if(!newTables.length){alert('ไม่พบข้อมูลการแข่งขันในไฟล์\n\nกรุณาตรวจสอบว่าไฟล์ถูก Export จากเว็บนี้');return;}

    // ── Ask user: append or replace ──
    const choice=window.confirm(
      `${T('importExcel')}: พบ ${newTables.length} การแข่งขัน\n\n` +
      `กด OK  → เพิ่มต่อกับข้อมูลที่มีอยู่\n` +
      `กด Cancel → ล้างทั้งหมดแล้วนำเข้าใหม่`
    );
    if(choice===false){
      tables=newTables;
      tc=newTables.length?Math.max(...newTables.map(t=>t.id))+1:0;
    } else {
      newTables.forEach(t=>tables.push(t));
      tc=tables.length?Math.max(...tables.map(t=>t.id))+1:0;
    }
    save();renderAll();
    alert(`✅ นำเข้าสำเร็จ ${newTables.length} การแข่งขัน`);
  };
  input.click();
}

// ── EXPORT EXCEL ──
async function exportExcel(tablesToExport, sheetTitle){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded');return;}
  const tblList = tablesToExport || tables;
  const wsName = (sheetTitle||'Race Tracker').substring(0,30);
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet(wsName);
  const maxPc=Math.max(...tblList.map(t=>t.playerCount||4));
  const cols=2+maxPc*2;
  const headerTitle=sheetTitle?`${T('title')} — ${sheetTitle}`:T('title');
  // Row 1: title
  ws.mergeCells(1,1,1,cols);const tC=ws.getCell(1,1);tC.value=headerTitle;tC.font={bold:true,size:14,color:{argb:'FFFFFFFF'}};tC.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};tC.alignment={horizontal:'center',vertical:'middle'};ws.getRow(1).height=36;
  // Row 2: column headers — generic P1..PX so imports know position
  ws.getCell(2,1).value='#';ws.getCell(2,2).value=T('matchLabel');
  [ws.getCell(2,1),ws.getCell(2,2)].forEach(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};c.alignment={horizontal:'center'};});
  for(let p=0;p<maxPc;p++){
    const tc2=3+p*2,pc2=4+p*2;
    ws.mergeCells(2,tc2,2,pc2);const nc=ws.getCell(2,tc2);
    nc.value=`P${p+1}`;nc.font={bold:true,size:11};
    nc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E3A5F'}};nc.alignment={horizontal:'center'};
    ws.getCell(3,tc2).value='Time';ws.getCell(3,pc2).value=T('pts');
    [ws.getCell(3,tc2),ws.getCell(3,pc2)].forEach(c=>{c.font={bold:true};c.alignment={horizontal:'center'};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F2744'}};});
  }
  ws.getRow(2).height=24;ws.getRow(3).height=20;
  let rn=4;
  tblList.forEach((tObj,ti)=>{
    const pc=tObj.playerCount||4;
    const activeRows=tObj.rowCount||ROWS_BASE;
    // Write match header row with actual player names for this match
    ws.mergeCells(rn,1,rn,2);
    const mhdr=ws.getCell(rn,1);
    mhdr.value=`${T('matchLabel')} ${ti+1}`;
    mhdr.font={bold:true,size:12,color:{argb:'FFFFFFFF'}};
    mhdr.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F2244'}};
    mhdr.alignment={horizontal:'left',vertical:'middle'};
    ws.getRow(rn).height=22;
    // Player names for this match
    for(let p=0;p<maxPc;p++){
      const tc2=3+p*2,pc2=4+p*2;
      const pName=p<pc?(tObj.players[p]||'').trim()||`P${p+1}`:'—';
      ws.mergeCells(rn,tc2,rn,pc2);
      const nc=ws.getCell(rn,tc2);nc.value=pName;
      nc.font={bold:true,size:10,color:{argb:'FFE8F0FF'}};
      nc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A3060'}};
      nc.alignment={horizontal:'center'};
    }
    rn++;
    for(let r=0;r<activeRows;r++){
      const row=tObj.rows[r];const scores=calcScores(row,r,pc);
      const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
      const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
      const isKR=r in KM&&KM[r]<pc;const kp=isKR?KM[r]:-1;
      const ml=`${T('round')} ${r+1}${row.stage?` (${row.stage})`:''}`;
      ws.getCell(rn,1).value=rn-3;ws.getCell(rn,2).value=ml;ws.getCell(rn,2).font={bold:false};
      for(let p=0;p<maxPc;p++){
        const tc2=3+p*2,pc2=4+p*2;const tv=p<pc?row.times[p]:'';const sv=p<pc&&scores[p]!==null?scores[p]:0;
        ws.getCell(rn,tc2).value=tv||'';ws.getCell(rn,pc2).value=tv?sv:0;
        [ws.getCell(rn,tc2),ws.getCell(rn,pc2)].forEach(c=>c.alignment={horizontal:'center'});
        if(p<pc&&parsed[p]!==null&&parsed[p]===best){const fl=isKR&&p===kp?{type:'pattern',pattern:'solid',fgColor:{argb:'FFFF6666'}}:{type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFF99'}};ws.getCell(rn,tc2).fill=fl;ws.getCell(rn,pc2).fill=fl;ws.getCell(rn,pc2).font={bold:true};}
      }rn++;
    }
    const mt=Array(pc).fill(0);tObj.rows.forEach((row2,r2)=>{calcScores(row2,r2,pc).forEach((s,p)=>{if(s!==null)mt[p]+=s;});});
    ws.mergeCells(rn,1,rn,2);ws.getCell(rn,1).value=`${T('grandTotal')}`;ws.getCell(rn,1).font={bold:true,italic:true};ws.getCell(rn,1).alignment={horizontal:'right'};
    for(let p=0;p<maxPc;p++){const tc2=3+p*2,pc2=4+p*2;ws.mergeCells(rn,tc2,rn,pc2);const c=ws.getCell(rn,tc2);c.value=p<pc?mt[p]:0;c.font={bold:true,size:12};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF2CC'}};c.alignment={horizontal:'center'};}rn++;
  });
  ws.getColumn(1).width=6;ws.getColumn(2).width=35;
  for(let p=0;p<maxPc;p++){ws.getColumn(3+p*2).width=13;ws.getColumn(4+p*2).width=8;}
  ws.eachRow((row,rNum)=>{if(rNum<2)return;row.eachCell(c=>{if(c.value===undefined||c.value===null)return;c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};});});
  const safeName=(sheetTitle||'all').replace(/[^a-zA-Z0-9ก-๙]/g,'_').substring(0,20);
  const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`race_${safeName}_${Date.now()}.xlsx`;a.click();URL.revokeObjectURL(a.href);
}

// ── LANG ──
function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
  document.getElementById('globeLabel').textContent=T('globeLabel');
  document.querySelectorAll('.lang-opt').forEach(o=>o.classList.toggle('active',o.dataset.lang===lang));
  buildTitle();renderAll();
}
const gBtn=document.getElementById('globeBtn'),lDd=document.getElementById('langDd');
gBtn.addEventListener('click',e=>{e.stopPropagation();const o=lDd.classList.contains('open');lDd.classList.toggle('open',!o);gBtn.classList.toggle('open',!o);});
document.addEventListener('click',()=>{lDd.classList.remove('open');gBtn.classList.remove('open');});
lDd.addEventListener('click',e=>{const opt=e.target.closest('.lang-opt');if(!opt)return;lang=opt.dataset.lang;save();applyLang();lDd.classList.remove('open');gBtn.classList.remove('open');});

function buildTitle(){
  const txt=T('title'),h1=document.getElementById('mainTitle');h1.innerHTML='';
  [...txt].forEach(c=>{const s=document.createElement('span');s.className='ch';s.textContent=c===' '?'\u00A0':c;h1.appendChild(s);});
}

// ── THEME SYSTEM ──
const COLOR_SWATCHES={
  blue:'linear-gradient(135deg,#1d6fe8,#3b9dff)',
  red:'linear-gradient(135deg,#e81d1d,#ff4d4d)',
  green:'linear-gradient(135deg,#1db858,#2ecc71)',
  cyan:'linear-gradient(135deg,#0891b2,#22d3ee)',
  yellow:'linear-gradient(135deg,#d4a017,#fbbf24)',
  purple:'linear-gradient(135deg,#7c3aed,#a855f7)',
  orange:'linear-gradient(135deg,#e85c1d,#fb923c)',
  pink:'linear-gradient(135deg,#db2777,#f472b6)',
};
let currentColor=localStorage.getItem('rtColor')||'blue';
let currentMode=localStorage.getItem('rtMode')||'dark';

function applyTheme(color,mode){
  currentColor=color; currentMode=mode;
  const html=document.documentElement;
  html.setAttribute('data-color',color);
  html.setAttribute('data-mode',mode);
  // update swatch
  const sw=document.getElementById('themeSwatch');
  if(sw) sw.style.background=COLOR_SWATCHES[color]||'';
  // update active states
  document.querySelectorAll('.tp-color').forEach(b=>b.classList.toggle('active',b.dataset.color===color));
  document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));
  localStorage.setItem('rtColor',color);localStorage.setItem('rtMode',mode);
}
function setColor(c){applyTheme(c,currentMode);}
function setMode(m){applyTheme(currentColor,m);}

function toggleThemePanel(){
  const panel=document.getElementById('themePanel');
  const btn=document.getElementById('themeToggle');
  const open=panel.classList.contains('open');
  if(!open){
    const rect=btn.getBoundingClientRect();
    const panelW=210;
    // Try align right edge to button right, but don't go off left edge
    let left=rect.right-panelW;
    if(left<8)left=8;
    if(left+panelW>window.innerWidth-8)left=window.innerWidth-panelW-8;
    panel.style.top=(rect.bottom+6)+'px';
    panel.style.left=left+'px';
    panel.style.right='auto';
  }
  panel.classList.toggle('open',!open);
  btn.classList.toggle('open',!open);
}
document.addEventListener('click',e=>{
  const wrap=document.getElementById('themeWrap');
  if(wrap&&!wrap.contains(e.target)){
    document.getElementById('themePanel')?.classList.remove('open');
    document.getElementById('themeToggle')?.classList.remove('open');
  }
});

// ── INIT ──
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeTotals();closeCatModal();closeBestTimeModal();closeScoreModal();}});
applyTheme(currentColor, currentMode);
loadState();
document.querySelectorAll('.lang-opt').forEach(o=>o.classList.toggle('active',o.dataset.lang===lang));
document.getElementById('globeLabel').textContent=T('globeLabel');
buildTitle();
document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
renderAll();
</script>
