<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏁 Race Time Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#050510;--s1:#0f172a;--s2:#1e293b;--s3:#334155;
  --red:#ef4444;--red2:#dc2626;--amber:#f59e0b;--cyan:#22d3ee;
  --green:#22c55e;--purple:#a855f7;--text:#e2e8f0;--dim:#64748b;
  --gold:#fbbf24;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;overflow-x:hidden;}

/* ── ANIMATED BG ORBS ── */
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015)1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015)1px,transparent 1px);background-size:44px 44px;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);animation:orbSpin linear infinite;}
.orb1{width:55vw;height:55vw;max-width:700px;max-height:700px;background:rgba(239,68,68,.22);top:-20%;left:-15%;animation-duration:18s;}
.orb2{width:50vw;height:50vw;max-width:650px;max-height:650px;background:rgba(59,130,246,.18);bottom:-20%;right:-15%;animation-duration:22s;animation-direction:reverse;}
.orb3{width:40vw;height:40vw;max-width:500px;max-height:500px;background:rgba(168,85,247,.14);top:30%;left:40%;animation-duration:30s;}
.orb4{width:30vw;height:30vw;max-width:400px;max-height:400px;background:rgba(34,211,238,.1);bottom:10%;left:10%;animation-duration:25s;animation-direction:reverse;}
@keyframes orbSpin{
  0%  {transform:translate(0,0) scale(1);}
  25% {transform:translate(8vw,-6vw) scale(1.12);}
  50% {transform:translate(4vw,10vw) scale(.9);}
  75% {transform:translate(-6vw,4vw) scale(1.08);}
  100%{transform:translate(0,0) scale(1);}
}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:12px 16px 80px;}

/* ── HEADER ── */
header{text-align:center;padding:28px 16px 14px;margin-bottom:18px;}
#mainTitle{display:block;font-family:'Orbitron',monospace;font-size:clamp(1rem,4vw,2.5rem);font-weight:900;letter-spacing:clamp(2px,1vw,8px);margin-bottom:10px;text-transform:uppercase;}
#mainTitle .ch{display:inline-block;background:linear-gradient(135deg,#fff,#ff3232,#fff,#ff6060,#fff);background-size:400% 400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:rShift 5s linear infinite,cFloat 2.6s ease-in-out infinite;}
@keyframes rShift{0%{background-position:0% 50%}100%{background-position:400% 50%}}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#mainTitle .ch:nth-child(1){animation-delay:0s,0s}#mainTitle .ch:nth-child(2){animation-delay:.12s,.1s}#mainTitle .ch:nth-child(3){animation-delay:.24s,.2s}#mainTitle .ch:nth-child(4){animation-delay:.36s,.3s}#mainTitle .ch:nth-child(5){animation-delay:.48s,.4s}#mainTitle .ch:nth-child(6){animation-delay:.6s,.5s}#mainTitle .ch:nth-child(7){animation-delay:.72s,.6s}#mainTitle .ch:nth-child(8){animation-delay:.84s,.7s}#mainTitle .ch:nth-child(9){animation-delay:.96s,.8s}#mainTitle .ch:nth-child(10){animation-delay:1.08s,.9s}#mainTitle .ch:nth-child(11){animation-delay:1.2s,1s}#mainTitle .ch:nth-child(12){animation-delay:1.32s,1.1s}#mainTitle .ch:nth-child(13){animation-delay:1.44s,1.2s}#mainTitle .ch:nth-child(14){animation-delay:1.56s,1.3s}#mainTitle .ch:nth-child(15){animation-delay:1.68s,1.4s}#mainTitle .ch:nth-child(16){animation-delay:1.8s,1.5s}#mainTitle .ch:nth-child(17){animation-delay:1.92s,1.6s}#mainTitle .ch:nth-child(18){animation-delay:2.04s,1.7s}#mainTitle .ch:nth-child(19){animation-delay:2.16s,1.8s}#mainTitle .ch:nth-child(20){animation-delay:2.28s,1.9s}
.sub-line{color:var(--dim);font-size:.8rem;letter-spacing:.4px;margin:2px 0;}
.sub-tiktok{color:var(--cyan);font-size:.76rem;}
.scan-line{height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);max-width:500px;margin:12px auto;animation:scanAnim 3s ease-in-out infinite;}
@keyframes scanAnim{0%,100%{opacity:.3}50%{opacity:1}}

/* ── TOP BAR ── */
.top-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:14px;}
.top-bar-right{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

/* ── GLOBE ── */
.lang-wrap{position:relative;}
.globe-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--s3);background:rgba(30,41,59,.8);color:var(--text);border-radius:8px;cursor:pointer;font-size:.8rem;font-family:'Sarabun',sans-serif;transition:all .2s;backdrop-filter:blur(8px);}
.globe-btn:hover,.globe-btn.open{border-color:var(--cyan);color:var(--cyan);}
.globe-arrow{font-size:.58rem;opacity:.6;transition:transform .2s;}
.globe-btn.open .globe-arrow{transform:rotate(180deg);}
.lang-dd{position:absolute;top:calc(100% + 6px);left:0;min-width:180px;background:#0f172a;border:1px solid var(--cyan);border-radius:10px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.8);overflow:hidden;display:none;animation:ddIn .15s ease;}
.lang-dd.open{display:block;}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.lang-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.84rem;transition:background .12s;}
.lang-opt:hover,.lang-opt.active{background:rgba(34,211,238,.1);color:var(--cyan);}
.lang-divider{height:1px;background:var(--s3);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;white-space:nowrap;backdrop-filter:blur(6px);}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-add{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.5);color:#c084fc;}
.btn-add:hover{background:#7c3aed;color:#fff;box-shadow:0 5px 15px rgba(124,58,237,.4);}
.btn-score{background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.4);color:var(--gold);}
.btn-score:hover{background:var(--amber);color:#000;box-shadow:0 5px 15px rgba(245,158,11,.4);}
.btn-excel{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:#4ade80;}
.btn-excel:hover{background:#16a34a;color:#fff;box-shadow:0 5px 15px rgba(34,197,94,.4);}
.btn-clear{background:rgba(30,41,59,.6);border-color:var(--s3);color:var(--dim);}
.btn-clear:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.1);}
@media(max-width:480px){.btn .btn-txt{display:none;}.btn{padding:8px 10px;}}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 270px;gap:14px;align-items:start;}
@media(max-width:960px){.main-grid{grid-template-columns:1fr;}}

/* ── MATCH BLOCK ── */
.match-block{background:rgba(15,23,42,.82);border:1px solid rgba(51,65,85,.55);border-radius:14px;overflow:hidden;margin-bottom:14px;backdrop-filter:blur(14px);box-shadow:0 8px 32px rgba(0,0,0,.55);}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:rgba(0,0,0,.45);border-bottom:1px solid rgba(51,65,85,.45);flex-wrap:wrap;gap:8px;}
.block-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.block-num{font-family:'Orbitron',monospace;font-size:.62rem;color:var(--red);letter-spacing:2px;white-space:nowrap;}
.pctrl{display:flex;align-items:center;gap:5px;}
.pctrl-lbl{font-size:.58rem;color:var(--dim);font-family:'Orbitron',monospace;letter-spacing:1px;white-space:nowrap;}
.pc-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--s3);background:var(--s1);color:var(--text);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1;}
.pc-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.pc-val{font-family:'Orbitron',monospace;font-size:.72rem;color:var(--cyan);min-width:14px;text-align:center;}
.btn-rm{background:none;border:1px solid var(--s3);color:var(--dim);border-radius:5px;padding:3px 10px;cursor:pointer;font-size:.72rem;transition:all .2s;}
.btn-rm:hover{border-color:var(--red);color:var(--red);}

/* ── TABLE ── */
.tbl-wrap{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  /* Force touch scroll on iOS */
  touch-action:pan-x pan-y;
}
/* Table always has a minimum width so it scrolls properly on mobile */
table{width:100%;border-collapse:collapse;min-width:480px;}
thead{position:sticky;top:0;z-index:20;background:rgba(9,18,36,.97);backdrop-filter:blur(8px);}
th{padding:0;border-bottom:2px solid rgba(51,65,85,.7);vertical-align:middle;}
th.th-rnd{min-width:40px;width:40px;}
th.th-stage{min-width:140px;width:140px;}
th.th-p{min-width:88px;}
/* Player name in TH */
.th-player-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 4px 6px;}
.th-player-lbl{font-family:'Orbitron',monospace;font-size:.52rem;color:var(--dim);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.th-pi{width:100%;background:transparent;border:none;border-bottom:2px solid var(--s3);color:var(--cyan);font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;text-align:center;padding:5px 4px;letter-spacing:.8px;outline:none;transition:border-color .2s;}
.th-pi:focus{border-bottom-color:var(--cyan);}
.th-pi::placeholder{color:rgba(34,211,238,.2);font-size:.58rem;}
.th-rnd-inner{padding:10px 8px;font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;letter-spacing:1px;color:var(--dim);text-align:left;text-transform:uppercase;}
.th-stage-inner{padding:10px 8px;font-family:'Orbitron',monospace;font-size:.55rem;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase;}

td{padding:0;border-bottom:1px solid rgba(30,41,59,.7);vertical-align:middle;}
tr:hover td{background:rgba(30,41,59,.35);}

/* ── ROUND LABEL ── */
.rnd-lbl{padding:10px 10px;font-size:.62rem;color:var(--dim);white-space:nowrap;font-family:'Orbitron',monospace;letter-spacing:.5px;}

/* ── STAGE SELECTOR ── */
.stage-cell{padding:3px 5px;position:relative;}
.sw{position:relative;}
.si{width:100%;background:rgba(0,0,0,.4);border:1px solid transparent;color:var(--cyan);font-family:'Sarabun',sans-serif;font-size:.76rem;font-weight:600;padding:6px 7px;border-radius:5px;outline:none;transition:border-color .2s;}
.si:focus{border-color:var(--cyan);background:rgba(34,211,238,.04);}
.si::placeholder{color:var(--dim);font-size:.68rem;font-weight:400;}
.sdd{position:absolute;top:100%;left:0;right:0;background:#0d1b2e;border:1px solid var(--cyan);border-radius:8px;max-height:210px;overflow-y:auto;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.85);display:none;}
.sdd.open{display:block;}
.sdd-grp{padding:4px 10px;font-size:.54rem;font-family:'Orbitron',monospace;color:var(--dim);background:rgba(0,0,0,.35);border-top:1px solid var(--s3);text-transform:uppercase;}
.sdd-item{padding:6px 12px;font-size:.76rem;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s;}
.sdd-item:hover{background:rgba(34,211,238,.1);color:var(--cyan);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── TIME CELL ── */
.tc-wrap{padding:4px 3px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;}
.king-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--red2);color:#fff;font-family:'Orbitron',monospace;font-size:.48rem;font-weight:700;padding:1px 6px;border-radius:0 0 6px 6px;white-space:nowrap;letter-spacing:.4px;box-shadow:0 2px 12px rgba(220,38,38,.6);animation:kPulse 2s ease-in-out infinite;z-index:3;}
@keyframes kPulse{0%,100%{box-shadow:0 2px 10px rgba(220,38,38,.5)}50%{box-shadow:0 2px 20px rgba(220,38,38,.95)}}
.ti{width:100%;text-align:center;border:1px solid var(--s3);border-radius:5px;background:rgba(0,0,0,.35);color:var(--text);font-family:'Orbitron',monospace;font-size:.65rem;padding:5px 2px;outline:none;transition:all .2s;}
.ti:focus{border-color:var(--cyan);box-shadow:0 0 8px rgba(34,211,238,.22);}
.ti.best{border-color:var(--amber);background:rgba(245,158,11,.08);color:var(--amber);font-weight:700;}
.ti.best-king{border-color:var(--red);background:rgba(239,68,68,.12);color:#fca5a5;font-weight:700;}
.ti::placeholder{color:rgba(100,116,139,.35);font-size:.56rem;}
.ti.has-v{color:var(--text);}
.score-chip{font-family:'Orbitron',monospace;font-size:.68rem;font-weight:900;padding:2px 7px;border-radius:10px;min-width:32px;text-align:center;}
.sc12{background:rgba(239,68,68,.2);color:#fca5a5;box-shadow:0 0 8px rgba(239,68,68,.3);}
.sc11{background:rgba(245,158,11,.2);color:var(--amber);box-shadow:0 0 8px rgba(245,158,11,.3);}
.sch{background:rgba(34,197,94,.12);color:#4ade80;}
.scm{background:rgba(100,116,139,.12);color:var(--text);}
.scl{background:rgba(239,68,68,.08);color:#f87171;}
.sc0{background:rgba(15,23,42,.6);color:var(--dim);}
.scx{background:transparent;color:var(--dim);font-size:.58rem;}

/* ── ANIMATED TOTAL ROW — seamless single gradient ── */
@keyframes totalBG{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes totalGlow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:300% 50%}}

/* Wrapper div injected inside tbl-wrap to hold the animated row bg */
.total-row-outer{
  position:relative;
  overflow:hidden;
  border-radius:0 0 10px 10px;
}
/* The single animated background layer */
.total-row-outer::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,
    #5a0000,#200008,#000015,#001535,#0a003a,
    #001535,#000015,#200008,#5a0000
  );
  background-size:300% 100%;
  animation:totalBG 4s linear infinite;
  z-index:0;
}
/* Animated shimmer sweep */
.total-row-outer::after{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,
    transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%
  );
  background-size:200% 100%;
  animation:shimmer 2.5s ease-in-out infinite;
  z-index:1;pointer-events:none;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Animated top border line */
.total-row-border{
  height:2px;
  background:linear-gradient(90deg,
    #ef4444,#ff6b6b,#a855f7,#3b82f6,#22d3ee,#3b82f6,#a855f7,#ff6b6b,#ef4444
  );
  background-size:300% 100%;
  animation:borderFlow 3s linear infinite;
}

/* All tr/td inside the outer div: transparent, no borders between them */
.total-row-outer table{width:100%;border-collapse:collapse;background:transparent;}
.total-row-outer td{
  border:none !important;
  background:transparent !important;
  position:relative;z-index:2;
  padding:0;
}

.tr-lbl{
  display:block;padding:13px 14px;
  font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;letter-spacing:1.5px;
  color:transparent;
  background:linear-gradient(90deg,
    #ef4444 0%,#ff8080 25%,#ffffff 50%,#60a5fa 75%,#22d3ee 100%
  );
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;
  animation:totalBG 3s linear infinite;
  white-space:nowrap;
  text-shadow:none;
}
.total-val{
  font-family:'Orbitron',monospace;font-weight:900;font-size:.95rem;
  text-align:center;padding:13px 4px;display:block;
  position:relative;z-index:2;
}
.tv-top{
  color:var(--gold);
  text-shadow:0 0 16px rgba(251,191,36,.9),0 0 4px rgba(251,191,36,.5);
  font-size:1.15rem;
  animation:totalGlow 2s ease-in-out infinite;
}
.tv-val{
  color:var(--cyan);
  text-shadow:0 0 10px rgba(34,211,238,.5);
}
.tv-zero{color:var(--dim);font-size:.72rem;}

/* ── LEADERBOARD SIDEBAR ── always vertical ── */
.sidebar{background:rgba(15,23,42,.85);border:1px solid rgba(51,65,85,.55);border-radius:14px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5);backdrop-filter:blur(14px);}
.sb-hdr{background:rgba(0,0,0,.5);padding:14px 18px;border-bottom:1px solid rgba(51,65,85,.45);display:flex;align-items:center;justify-content:space-between;}
.sb-hdr h2{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;letter-spacing:.15em;transform:skewX(-8deg);display:inline-block;}
/* ALWAYS vertical list — no flex row ever */
.lb-body{padding:8px 0;display:block;}
.lb-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:8px;margin:0 6px 6px;border:1px solid transparent;transition:all .3s;cursor:default;position:relative;overflow:hidden;}
.lb-item:hover{transform:scale(1.02);box-shadow:0 6px 18px rgba(0,0,0,.4);}
.lb-1{background:rgba(251,191,36,.07);border-color:rgba(251,191,36,.45);}
.lb-2{background:rgba(148,163,184,.05);border-color:rgba(148,163,184,.28);}
.lb-3{background:rgba(205,127,50,.05);border-color:rgba(205,127,50,.28);}
.lb-o{background:rgba(15,23,42,.5);border-color:rgba(51,65,85,.35);}
.lb-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.lb-rank{width:30px;height:30px;border-radius:6px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:.7rem;border:1px solid var(--s3);flex-shrink:0;}
.lb-name{font-weight:700;font-size:.8rem;flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#cbd5e1;}
.lb-score{font-family:'Orbitron',monospace;font-weight:900;font-size:1.25rem;}

/* ── TOTAL ROW OUTER — scrolls with table ── */
.total-row-outer{
  position:relative;overflow-x:auto;overflow-y:hidden;
  border-radius:0 0 10px 10px;
  /* hide scrollbar but still scrollable */
  scrollbar-width:none;-ms-overflow-style:none;
}
.total-row-outer::-webkit-scrollbar{display:none;}
.grand-panel{background:rgba(15,23,42,.85);border:1px solid rgba(51,65,85,.5);border-radius:14px;padding:16px;margin-top:10px;backdrop-filter:blur(14px);box-shadow:0 8px 28px rgba(0,0,0,.5);}
.grand-panel h2{font-family:'Orbitron',monospace;font-size:.8rem;color:var(--cyan);letter-spacing:3px;text-align:center;margin-bottom:12px;}
.gp-tbl{width:100%;border-collapse:collapse;}
.gp-tbl th,.gp-tbl td{padding:9px 12px;text-align:center;border:1px solid var(--s3);font-family:'Orbitron',monospace;font-size:.72rem;}
.gp-tbl th{background:var(--s2);color:var(--dim);}
.gr1{color:var(--gold);}.gr2{color:#cbd5e1;}.gr3{color:#cd7f32;}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;right:18px;width:40px;height:40px;background:var(--red2);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px rgba(220,38,38,.45);z-index:300;transition:transform .2s;}
.fab:hover{transform:scale(1.12);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--s1);}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px;}::-webkit-scrollbar-thumb:hover{background:var(--red);}

/* ════════════════════════
   RESPONSIVE
   ════════════════════════ */

/* Mobile S (< 400px) */
@media(max-width:400px){
  .app{padding:6px 6px 70px;}
  #mainTitle{letter-spacing:2px;}
  .btn{padding:6px 8px;}
  .th-rnd-inner,.th-stage-inner{padding:7px 4px;font-size:.46rem;}
  .th-player-lbl{font-size:.42rem;}
  .th-pi{font-size:.56rem;padding:3px 2px;}
  .si{font-size:.65rem;padding:4px 4px;}
  .ti{font-size:.56rem;padding:3px 1px;}

<script>
// ── I18N ──
const I18N={
  th:{title:'🏁 RACE TIME TRACKER',sub1:'บันทึกเวลา · คำนวณแต้ม · จัดอันดับ',sub2:'กรอกเวลาในแต่ละรอบ เช่น 15699 → 1:56:99',addMatch:'เพิ่มการแข่งขัน',totalScore:'คะแนนรวม',exportExcel:'Export',clearData:'ล้างข้อมูล',totalAll:'คะแนนรวมทั้งหมด',leaderboard:'🏆 LEADERBOARD',matchLabel:'การแข่งขัน',removeMatch:'✕ ลบ',round:'รอบ',playerLabel:'ผู้เล่น',score:'คะแนน',grandTotal:'⚡ คะแนนรวม',stagePH:'🔍 เลือกด่าน...',rank:'อันดับ',player:'ผู้เล่น',confirmClear:'ล้างข้อมูลทั้งหมด?',confirmRemove:'ลบการแข่งขันนี้?',minP:'ต้องมีผู้เล่นอย่างน้อย 2 คน',maxP:'มีผู้เล่นสูงสุด 6 คนแล้ว',kingMap:'👑 KING',pts:'แต้ม',globeLabel:'ไทย',stageLabel:'แผนที่'},
  en:{title:'🏁 RACE TIME TRACKER',sub1:'Record Times · Calculate Points · Rank Players',sub2:'Enter digits e.g. 15699 → 1:56:99',addMatch:'Add Match',totalScore:'Total Score',exportExcel:'Export',clearData:'Clear Data',totalAll:'Overall Standings',leaderboard:'🏆 LEADERBOARD',matchLabel:'Match',removeMatch:'✕ Remove',round:'Round',playerLabel:'Player',score:'Score',grandTotal:'⚡ Total',stagePH:'🔍 Select stage...',rank:'Rank',player:'Player',confirmClear:'Clear all data?',confirmRemove:'Remove this match?',minP:'Minimum 2 players',maxP:'Maximum 6 players',kingMap:'👑 KING',pts:'pts',globeLabel:'English',stageLabel:'Stage'},
  zh:{title:'🏁 竞速时间追踪器',sub1:'记录时间 · 计算积分 · 排行榜',sub2:'输入数字 例如 15699 → 1:56:99',addMatch:'添加比赛',totalScore:'总分',exportExcel:'导出',clearData:'清除数据',totalAll:'总排行',leaderboard:'🏆 排行榜',matchLabel:'比赛',removeMatch:'✕ 删除',round:'轮次',playerLabel:'玩家',score:'分数',grandTotal:'⚡ 总计',stagePH:'🔍 选择赛道...',rank:'排名',player:'玩家',confirmClear:'清除所有数据？',confirmRemove:'删除此比赛？',minP:'最少2名玩家',maxP:'最多6名玩家',kingMap:'👑 王牌',pts:'分',globeLabel:'简体中文',stageLabel:'赛道'},
  vi:{title:'🏁 THEO DÕI THỜI GIAN ĐUA',sub1:'Ghi Thời Gian · Tính Điểm · Xếp Hạng',sub2:'Nhập số vd 15699 → 1:56:99',addMatch:'Thêm trận',totalScore:'Tổng điểm',exportExcel:'Xuất',clearData:'Xóa dữ liệu',totalAll:'Bảng xếp hạng',leaderboard:'🏆 XẾP HẠNG',matchLabel:'Trận',removeMatch:'✕ Xóa',round:'Vòng',playerLabel:'Người chơi',score:'Điểm',grandTotal:'⚡ Tổng',stagePH:'🔍 Chọn màn...',rank:'Hạng',player:'Người chơi',confirmClear:'Xóa tất cả?',confirmRemove:'Xóa trận này?',minP:'Tối thiểu 2 người',maxP:'Tối đa 6 người',kingMap:'👑 KING',pts:'điểm',globeLabel:'Tiếng Việt',stageLabel:'Bản đồ'},
  tw:{title:'🏁 競速時間追蹤器',sub1:'記錄時間 · 計算積分 · 排行榜',sub2:'輸入數字 例如 15699 → 1:56:99',addMatch:'新增比賽',totalScore:'總分',exportExcel:'匯出',clearData:'清除資料',totalAll:'總排行',leaderboard:'🏆 排行榜',matchLabel:'比賽',removeMatch:'✕ 刪除',round:'回合',playerLabel:'玩家',score:'分數',grandTotal:'⚡ 總計',stagePH:'🔍 選擇賽道...',rank:'排名',player:'玩家',confirmClear:'清除所有資料？',confirmRemove:'刪除此比賽？',minP:'最少2名玩家',maxP:'最多6名玩家',kingMap:'👑 王牌',pts:'分',globeLabel:'繁體中文',stageLabel:'賽道'}
};
let lang='th';
function T(k){return(I18N[lang]||I18N.th)[k]||(I18N.th[k]||k);}

// ── STAGES ──
const SBS={3:["City11","North Sea","TROY - Smeltery","All the way to Qian","Alpha Headquarters","Decisive Battle! Eye of the Sea","Dream of Heavenly Palace","Superstring Base","Dragon Crystal Lake","The Circular City of Troy","Stunning Jiangxi","Glimpses of Eden","Wushan Five Elements","Romantic Seaside","Polar Illusion","Endless Golden River","Travel to Tianfu","Foggy Mountain Maple","Winter Games","Loving Villa","Train Station","Nightless Sand City","Moonville","Dragon Gate","Forge Arena","King Inferno City","Blue and White Dreamland","320 Adventure Island","Star Dream Amusement Park","Winter Ancient","Moonlight Realm","Los Angeles","Train Station","City11 (Reversed)","Urban Chase","Magic Music City Holiday","Cologne Cathedral"],4:["Highway 1","Great Wall","West Lake","TROY - Experiment Field O","Thousand-House Miaozhai","Windy Airport","Decisive Battle! Snow Mountain","Back to Ancient Shu","Speed Aerospace City","Eternal Ancient Capital","Utopia","Dragon Boat Race","Titan's Peak","Clouds Heavenly Gate","Neuschwanstein","Eden Valley","Autumn Story","Dinosaur World","Flowers in the Summer Sea","Wind-Chased Green Meadow","Mermaid Island"],5:["Scenic Hills","Epic Legend","Atlantis","Atlantis(Reversed)","Mogao Grottoes","Old Street Construction","Crimson Leaves Town","Mars Base","Snow Chasm","Wild West","Sky City","Winter Gorge"],6:["Grand Canyon","Scotland Yard"],7:["Space Station","Painted Landscape"]};
const SC={3:'#4fc3f7',4:'#81c784',5:'#ffb74d',6:'#f06292',7:'#ce93d8'};
const ALL_S=[];for(const[s,l]of Object.entries(SBS))l.forEach(n=>ALL_S.push({name:n,stars:parseInt(s)}));

const MAX_P=6,MIN_P=2,ROWS=9;
const KM={1:0,2:1,3:2,4:3,5:4,6:5};
let tables=[],tc=0;

function loadState(){
  try{tables=JSON.parse(localStorage.getItem('rt6')||'[]');}catch(e){tables=[];}
  tables.forEach(t=>{if(!t.players)t.players=Array(MAX_P).fill('');});
  try{lang=localStorage.getItem('rtLang')||'th';}catch(e){}
  if(!tables.length){tc=0;tables.push(mkTable(4));}
  else tc=Math.max(...tables.map(t=>t.id))+1;
}
function save(){localStorage.setItem('rt6',JSON.stringify(tables));localStorage.setItem('rtLang',lang);}
function mkTable(pc){return{id:tc++,playerCount:pc||4,players:Array(MAX_P).fill(''),rows:Array.from({length:ROWS},()=>({stage:'',times:Array(MAX_P).fill('')}))};}

function parseTime(v){
  if(!v||!v.trim())return null;
  const p=v.split(':');
  if(p.length===3)return(parseInt(p[0])||0)*6000+(parseInt(p[1])||0)*100+(parseInt(p[2])||0);
  return null;
}
function fmtTime(v){
  v=(v||'').replace(/[^0-9:]/g,'');if(!v)return'';
  if(!v.includes(':')){const d=v.padStart(6,'0');return`${d.slice(0,2)}:${d.slice(2,4)}:${d.slice(4,6)}`;}
  return v;
}
function calcScores(row,r,pc){
  const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
  const valid=parsed.filter(t=>t!==null);
  if(!valid.length)return parsed.map(()=>null);
  const best=Math.min(...valid);
  const kp=(r in KM&&KM[r]<pc)?KM[r]:-1;
  return parsed.map((t,p)=>{
    if(t===null)return null;
    const ds=(t-best)/100;
    let s;
    if(ds===0)s=11;else if(ds<1)s=10;else if(ds<2)s=9;else if(ds<3)s=8;
    else if(ds<4)s=7;else if(ds<5)s=6;else if(ds<6)s=5;
    else if(ds<7)s=4;else if(ds<8)s=3;else if(ds<9)s=2;else if(ds<10)s=1;else s=0;
    if(p===kp&&ds===0)s=12;
    return s;
  });
}
function scClass(s){
  if(s===null)return'scx';if(s===12)return'sc12';if(s===11)return'sc11';
  if(s>=8)return'sch';if(s>=5)return'scm';if(s>=2)return'scl';return'sc0';
}

function buildStageSelector(tObj,r){
  const wrap=document.createElement('div');wrap.className='sw';
  const inp=document.createElement('input');inp.type='text';inp.className='si';inp.placeholder=T('stagePH');inp.value=tObj.rows[r].stage||'';inp.autocomplete='off';
  const dd=document.createElement('div');dd.className='sdd';
  function pop(q){
    dd.innerHTML='';q=(q||'').toLowerCase();let ls=null;
    for(const s of ALL_S){
      if(q&&!s.name.toLowerCase().includes(q))continue;
      if(s.stars!==ls){
        const g=document.createElement('div');g.className='sdd-grp';g.textContent=`${'⭐'.repeat(s.stars)} ${s.stars}★`;g.style.color=SC[s.stars];dd.appendChild(g);ls=s.stars;
      }
      const item=document.createElement('div');item.className='sdd-item';
      const dot=document.createElement('span');dot.className='sdot';dot.style.background=SC[s.stars];
      item.appendChild(dot);item.appendChild(document.createTextNode(s.name));
      item.addEventListener('mousedown',e=>{e.preventDefault();inp.value=s.name;tObj.rows[r].stage=s.name;save();dd.classList.remove('open');});
      dd.appendChild(item);
    }
    if(!dd.children.length){const ni=document.createElement('div');ni.className='sdd-item';ni.style.color='var(--dim)';ni.textContent='—';dd.appendChild(ni);}
  }
  inp.addEventListener('focus',()=>{pop(inp.value);dd.classList.add('open');});
  inp.addEventListener('input',()=>{tObj.rows[r].stage=inp.value;save();pop(inp.value);dd.classList.add('open');});
  inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('open'),160));
  wrap.appendChild(inp);wrap.appendChild(dd);return wrap;
}

function buildTable(tObj){
  const pc=tObj.playerCount||4;
  const block=document.createElement('div');block.className='match-block';block.dataset.tid=tObj.id;

  // Header bar
  const hdr=document.createElement('div');hdr.className='block-hdr';
  const left=document.createElement('div');left.className='block-hdr-left';
  const num=document.createElement('span');num.className='block-num';num.textContent=`${T('matchLabel')} #${tObj.id+1}`;left.appendChild(num);
  const pctrl=document.createElement('div');pctrl.className='pctrl';
  const plbl=document.createElement('span');plbl.className='pctrl-lbl';plbl.textContent=T('playerLabel');
  const bDec=document.createElement('button');bDec.className='pc-btn';bDec.textContent='−';bDec.onclick=()=>{if(tObj.playerCount<=MIN_P){alert(T('minP'));return;}tObj.playerCount--;save();rebuildBlock(tObj);};
  const bVal=document.createElement('span');bVal.className='pc-val';bVal.textContent=pc;
  const bInc=document.createElement('button');bInc.className='pc-btn';bInc.textContent='+';bInc.onclick=()=>{if(tObj.playerCount>=MAX_P){alert(T('maxP'));return;}tObj.playerCount++;save();rebuildBlock(tObj);};
  pctrl.append(plbl,bDec,bVal,bInc);left.append(num,pctrl);hdr.appendChild(left);
  const rmBtn=document.createElement('button');rmBtn.className='btn-rm';rmBtn.textContent=T('removeMatch');rmBtn.onclick=()=>removeMatch(tObj.id);hdr.appendChild(rmBtn);
  block.appendChild(hdr);

  const wrap=document.createElement('div');wrap.className='tbl-wrap';
  const table=document.createElement('table');
  const thead=document.createElement('thead');
  const hRow=document.createElement('tr');

  // TH: Round
  const thR=document.createElement('th');thR.className='th-rnd';
  const thRInner=document.createElement('div');thRInner.className='th-rnd-inner';thRInner.textContent=T('round');thR.appendChild(thRInner);hRow.appendChild(thR);
  // TH: Stage
  const thS=document.createElement('th');thS.className='th-stage';
  const thSInner=document.createElement('div');thSInner.className='th-stage-inner';thSInner.textContent=T('stageLabel');thS.appendChild(thSInner);hRow.appendChild(thS);
  // TH: Players (with input)
  for(let p=0;p<pc;p++){
    const th=document.createElement('th');th.className='th-p';
    const pw=document.createElement('div');pw.className='th-player-wrap';
    const lbl=document.createElement('span');lbl.className='th-player-lbl';lbl.textContent=T('playerLabel')+` ${p+1}`;
    const inp=document.createElement('input');inp.type='text';inp.className='th-pi';inp.placeholder=`P${p+1}`;
    if(!tObj.players)tObj.players=Array(MAX_P).fill('');
    inp.value=tObj.players[p]||'';inp.dataset.p=p;
    inp.addEventListener('input',function(){tObj.players[parseInt(this.dataset.p)]=this.value;save();updateLeaderboard();});
    pw.appendChild(lbl);pw.appendChild(inp);th.appendChild(pw);hRow.appendChild(th);
  }
  thead.appendChild(hRow);table.appendChild(thead);
  const tbody=document.createElement('tbody');

  // Round rows
  for(let r=0;r<ROWS;r++){
    const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
    const tr=document.createElement('tr');
    // Round label
    const rTd=document.createElement('td');rTd.className='rnd-lbl';rTd.textContent=`${r+1}`;tr.appendChild(rTd);
    // Stage selector
    const sTd=document.createElement('td');sTd.className='stage-cell';sTd.appendChild(buildStageSelector(tObj,r));tr.appendChild(sTd);
    // Time cells
    for(let p=0;p<pc;p++){
      const td=document.createElement('td');td.dataset.p=p;td.dataset.r=r;
      const cw=document.createElement('div');cw.className='tc-wrap';
      if(isKing&&p===kp){const b=document.createElement('div');b.className='king-badge';b.textContent=T('kingMap');cw.appendChild(b);}
      const inp=document.createElement('input');inp.type='text';inp.className='ti';inp.placeholder='mm:ss:cs';
      const v=tObj.rows[r].times[p]||'';inp.value=v;if(v)inp.classList.add('has-v');
      inp.dataset.tid=tObj.id;inp.dataset.p=p;inp.dataset.r=r;
      inp.addEventListener('change',function(){
        const val=fmtTime(this.value.trim());this.value=val;
        const t2=tables.find(x=>x.id===parseInt(this.dataset.tid));
        if(t2){t2.rows[parseInt(this.dataset.r)].times[parseInt(this.dataset.p)]=val;save();}
        if(val)this.classList.add('has-v');else this.classList.remove('has-v');
        recalcBlock(parseInt(this.dataset.tid));updateLeaderboard();
      });
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
      const chip=document.createElement('div');chip.className='score-chip scx';chip.textContent='—';chip.dataset.chip='1';
      cw.appendChild(inp);cw.appendChild(chip);td.appendChild(cw);tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  // Total row — seamless animated gradient via wrapper div
  // Build as a separate div outside the main table
  const outerDiv=document.createElement('div');outerDiv.className='total-row-outer';outerDiv.id=`tot-${tObj.id}`;
  // Animated top border
  const borderLine=document.createElement('div');borderLine.className='total-row-border';outerDiv.appendChild(borderLine);
  // Inner table for layout alignment
  const totTable=document.createElement('table');
  const totTbody=document.createElement('tbody');
  const totTr=document.createElement('tr');
  // Label cell
  const totLbl=document.createElement('td');totLbl.colSpan=2;totLbl.style.cssText='width:'+((50+160)+'px')+';min-width:210px;';
  const lspan=document.createElement('span');lspan.className='tr-lbl';lspan.textContent=T('grandTotal');totLbl.appendChild(lspan);totTr.appendChild(totLbl);
  // Score cells
  for(let p=0;p<pc;p++){
    const td=document.createElement('td');td.dataset.tp=p;td.style.cssText='min-width:90px;';
    const vspan=document.createElement('span');vspan.className='total-val tv-zero';vspan.textContent='0';td.appendChild(vspan);totTr.appendChild(td);
  }
  totTbody.appendChild(totTr);totTable.appendChild(totTbody);outerDiv.appendChild(totTable);
  tbody.appendChild(document.createElement('tr'));// spacer so table structure is valid

  table.appendChild(tbody);wrap.appendChild(table);
  block.appendChild(wrap);
  block.appendChild(outerDiv);
  // Sync horizontal scroll between table and total row
  wrap.addEventListener('scroll',()=>{outerDiv.scrollLeft=wrap.scrollLeft;});
  outerDiv.addEventListener('scroll',()=>{wrap.scrollLeft=outerDiv.scrollLeft;});
  return block;
}

function recalcBlock(tid){
  const tObj=tables.find(t=>t.id===tid);if(!tObj)return;
  const block=document.querySelector(`.match-block[data-tid="${tid}"]`);if(!block)return;
  const pc=tObj.playerCount||4;
  for(let r=0;r<ROWS;r++){
    const row=tObj.rows[r];const scores=calcScores(row,r,pc);
    const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
    const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
    const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
    for(let p=0;p<pc;p++){
      const td=block.querySelector(`td[data-p="${p}"][data-r="${r}"]`);if(!td)continue;
      const inp=td.querySelector('.ti');const chip=td.querySelector('[data-chip]');if(!inp||!chip)continue;
      const t=parseTime(inp.value);const isB=t!==null&&t===best;const isKC=isKing&&p===kp;
      inp.className='ti'+(inp.value?' has-v':'')+(isB?(isKC?' best-king':' best'):'');
      const s=scores[p];chip.className=`score-chip ${scClass(s)}`;chip.textContent=s===null?'—':`+${s}`;
    }
  }
  const tots=Array(pc).fill(0);
  tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
  const maxT=tots.length?Math.max(...tots):0;
  const totRow=document.getElementById(`tot-${tid}`);if(!totRow)return;
  totRow.querySelectorAll('[data-tp]').forEach((td,p)=>{
    const v=tots[p];const sp=td.querySelector('.total-val');if(!sp)return;
    sp.className='total-val '+(v===0?'tv-zero':v===maxT?'tv-top':'tv-val');sp.textContent=v||'0';
  });
}
function recalcAll(){tables.forEach(t=>recalcBlock(t.id));}
function rebuildBlock(tObj){const old=document.querySelector(`.match-block[data-tid="${tObj.id}"]`);if(old){const nd=buildTable(tObj);old.replaceWith(nd);recalcBlock(tObj.id);updateLeaderboard();}}
function rebuildAll(){const a=document.getElementById('tablesArea');a.innerHTML='';tables.forEach(t=>a.appendChild(buildTable(t)));recalcAll();updateLeaderboard();}

function updateLeaderboard(){
  const sm={};
  tables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const tots=Array(pc).fill(0);
    tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){const n=(tObj.players[p]||'').trim()||`P${p+1}`;sm[n]=(sm[n]||0)+tots[p];}
  });
  const sorted=Object.entries(sm).map(([name,score])=>({name,score})).sort((a,b)=>b.score-a.score);
  const lb=document.getElementById('lbList');lb.innerHTML='';
  if(!sorted.length){lb.innerHTML='<div style="padding:16px;text-align:center;color:var(--dim);font-size:.72rem;">—</div>';return;}
  sorted.forEach((item,i)=>{
    const rank=i+1;
    const div=document.createElement('div');div.style.position='relative';
    const stripe=document.createElement('div');stripe.className='lb-stripe';
    stripe.style.background=rank===1?'#fbbf24':rank===2?'#cbd5e1':rank===3?'#cd7f32':'#334155';
    const inner=document.createElement('div');
    inner.className=`lb-item ${rank===1?'lb-1':rank===2?'lb-2':rank===3?'lb-3':'lb-o'}`;
    const rankEl=document.createElement('div');rankEl.className='lb-rank';
    rankEl.style.color=rank===1?'#fbbf24':rank===2?'#cbd5e1':rank===3?'#cd7f32':'#475569';
    rankEl.textContent=rank<=3?['🥇','🥈','🥉'][rank-1]:`#${rank}`;
    rankEl.style.fontSize=rank>3?'.6rem':'inherit';
    const nameEl=document.createElement('span');nameEl.className='lb-name';nameEl.textContent=item.name;
    const scoreEl=document.createElement('span');scoreEl.className='lb-score';
    scoreEl.style.color=rank===1?'#fbbf24':'#fff';
    if(rank===1)scoreEl.style.textShadow='0 0 10px rgba(251,191,36,.8)';
    scoreEl.textContent=item.score;
    inner.appendChild(rankEl);inner.appendChild(nameEl);inner.appendChild(scoreEl);
    div.appendChild(stripe);div.appendChild(inner);lb.appendChild(div);
  });
}

function showTotals(){
  const sm={};
  tables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const tots=Array(pc).fill(0);
    tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){const n=(tObj.players[p]||'').trim()||`P${p+1}`;sm[n]=(sm[n]||0)+tots[p];}
  });
  const sorted=Object.entries(sm).map(([n,s])=>({name:n,score:s})).sort((a,b)=>b.score-a.score);
  const sec=document.getElementById('grandPanel');sec.style.display='block';sec.scrollIntoView({behavior:'smooth',block:'nearest'});
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
  let html=`<thead><tr><th>${T('rank')}</th><th>${T('player')}</th><th>${T('score')}</th></tr></thead><tbody>`;
  sorted.forEach((item,i)=>{
    const cls=i===0?'gr1':i===1?'gr2':i===2?'gr3':'';
    const medal=['🥇','🥈','🥉'][i]||`#${i+1}`;
    html+=`<tr><td class="${cls}">${medal}</td><td class="${cls}">${item.name}</td><td class="${cls}">${item.score}</td></tr>`;
  });
  html+='</tbody>';document.getElementById('gpTbl').innerHTML=html;
}

function confirmClear(){if(confirm(T('confirmClear'))){['rt6','rtLang'].forEach(k=>localStorage.removeItem(k));location.reload();}}
function removeMatch(tid){
  if(tables.length===1){alert('min 1');return;}if(!confirm(T('confirmRemove')))return;
  tables=tables.filter(t=>t.id!==tid);save();document.querySelector(`.match-block[data-tid="${tid}"]`)?.remove();updateLeaderboard();
}
function addMatch(){const t=mkTable(4);tables.push(t);save();const dom=buildTable(t);document.getElementById('tablesArea').appendChild(dom);dom.scrollIntoView({behavior:'smooth',block:'start'});recalcBlock(t.id);updateLeaderboard();}

// ── EXPORT EXCEL ──
async function exportExcel(){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded');return;}
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet('Race Tracker');
  const maxPc=Math.max(...tables.map(t=>t.playerCount||4));
  const allNames=[];
  for(let p=0;p<maxPc;p++){const fn=tables.map(t=>(t.players[p]||'').trim()).find(n=>n)||`P${p+1}`;allNames.push(fn);}
  const cols=2+maxPc*2;
  ws.mergeCells(1,1,1,cols);const tC=ws.getCell(1,1);tC.value=T('title');tC.font={bold:true,size:14,color:{argb:'FFFFFFFF'}};tC.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};tC.alignment={horizontal:'center',vertical:'middle'};ws.getRow(1).height=36;
  ws.getCell(2,1).value='#';ws.getCell(2,2).value=T('matchLabel');
  [ws.getCell(2,1),ws.getCell(2,2)].forEach(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};c.alignment={horizontal:'center'};});
  allNames.forEach((name,i)=>{const tc2=3+i*2,pc2=4+i*2;ws.mergeCells(2,tc2,2,pc2);const nc=ws.getCell(2,tc2);nc.value=name;nc.font={bold:true,size:11};nc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E3A5F'}};nc.alignment={horizontal:'center'};ws.getCell(3,tc2).value='Time';ws.getCell(3,pc2).value=T('pts');[ws.getCell(3,tc2),ws.getCell(3,pc2)].forEach(c=>{c.font={bold:true};c.alignment={horizontal:'center'};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F2744'}};});});
  ws.getRow(2).height=24;ws.getRow(3).height=20;
  let rn=4;
  tables.forEach((tObj,ti)=>{
    const pc=tObj.playerCount||4;
    for(let r=0;r<ROWS;r++){
      const row=tObj.rows[r];const scores=calcScores(row,r,pc);
      const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
      const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
      const isKR=r in KM&&KM[r]<pc;const kp=isKR?KM[r]:-1;
      const ml=`${T('matchLabel')} ${ti+1} - ${T('round')} ${r+1}${row.stage?` (${row.stage})`:''}`;
      ws.getCell(rn,1).value=rn-3;ws.getCell(rn,2).value=ml;ws.getCell(rn,2).font={bold:true};
      for(let p=0;p<maxPc;p++){
        const tc2=3+p*2,pc2=4+p*2;const tv=p<pc?row.times[p]:'';const sv=p<pc&&scores[p]!==null?scores[p]:0;
        ws.getCell(rn,tc2).value=tv||'';ws.getCell(rn,pc2).value=tv?sv:0;
        [ws.getCell(rn,tc2),ws.getCell(rn,pc2)].forEach(c=>c.alignment={horizontal:'center'});
        if(p<pc&&parsed[p]!==null&&parsed[p]===best){const fl=isKR&&p===kp?{type:'pattern',pattern:'solid',fgColor:{argb:'FFFF6666'}}:{type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFF99'}};ws.getCell(rn,tc2).fill=fl;ws.getCell(rn,pc2).fill=fl;ws.getCell(rn,pc2).font={bold:true};}
      }rn++;
    }
    const mt=Array(pc).fill(0);tObj.rows.forEach((row2,r2)=>{calcScores(row2,r2,pc).forEach((s,p)=>{if(s!==null)mt[p]+=s;});});
    ws.mergeCells(rn,1,rn,2);ws.getCell(rn,1).value=`${T('grandTotal')} (${T('matchLabel')} ${ti+1})`;ws.getCell(rn,1).font={bold:true,italic:true};ws.getCell(rn,1).alignment={horizontal:'right'};
    for(let p=0;p<maxPc;p++){const tc2=3+p*2,pc2=4+p*2;ws.mergeCells(rn,tc2,rn,pc2);const c=ws.getCell(rn,tc2);c.value=p<pc?mt[p]:0;c.font={bold:true,size:12};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF2CC'}};c.alignment={horizontal:'center'};}rn++;
  });
  ws.getColumn(1).width=6;ws.getColumn(2).width=35;allNames.forEach((_,i)=>{ws.getColumn(3+i*2).width=13;ws.getColumn(4+i*2).width=8;});
  ws.eachRow((row,rNum)=>{if(rNum<2)return;row.eachCell(c=>{if(c.value===undefined||c.value===null)return;c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};});});
  const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`race_tracker_${Date.now()}.xlsx`;a.click();URL.revokeObjectURL(a.href);
}
document.getElementById('btnExcel').addEventListener('click',exportExcel);
