<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏁 Race Time Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,400;0,600;0,700;0,900;1,700&family=Sarabun:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

/* ═══════════════════════════════════
   DARK THEME (default)
   ═══════════════════════════════════ */
:root,
[data-theme="dark"]{
  --bg:#04081a;
  --s1:#071230;--s2:#0d1e4a;--s3:#1a3a7a;--s4:#2255aa;
  --blue:#1d6fe8;--blue2:#3b9dff;--blue3:#6cb8ff;
  --gold:#f5c518;--gold2:#ffdd57;
  --red:#ef4444;--red2:#dc2626;
  --text:#e8f0ff;--text2:#b8d0f0;--dim:#5a78aa;
  --cyan:#22d3ee;--green:#22c55e;
  --card-bg:rgba(13,30,74,.88);
  --card-border:rgba(29,111,232,.4);
  --card-hover:rgba(29,111,232,.06);
  --hdr-bg:linear-gradient(90deg,rgba(29,111,232,.22),rgba(13,30,74,.4));
  --input-bg:rgba(7,18,48,.45);
  --input-border:rgba(29,111,232,.3);
  --tbl-head:rgba(7,18,48,.97);
  --tbl-row-border:rgba(29,111,232,.12);
  --thumb-icon:☀️;
}

/* ═══════════════════════════════════
   LIGHT THEME
   ═══════════════════════════════════ */
[data-theme="light"]{
  --bg:#dde8f8;
  --s1:#c8daf5;--s2:#b8ccee;--s3:#7aa3d4;--s4:#4a80c0;
  --blue:#1558c0;--blue2:#1a72e8;--blue3:#2a86f0;
  --gold:#c47f00;--gold2:#e09a00;
  --red:#cc2222;--red2:#bb1111;
  --text:#0a1a3a;--text2:#1a3060;--dim:#4a6898;
  --cyan:#0891b2;--green:#16a34a;
  --card-bg:rgba(255,255,255,.88);
  --card-border:rgba(21,88,192,.3);
  --card-hover:rgba(21,88,192,.05);
  --hdr-bg:linear-gradient(90deg,rgba(21,88,192,.12),rgba(200,218,245,.5));
  --input-bg:rgba(230,240,255,.7);
  --input-border:rgba(21,88,192,.25);
  --tbl-head:rgba(220,232,248,.97);
  --tbl-row-border:rgba(21,88,192,.1);
}
html,body{
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:'Exo 2','Sarabun',sans-serif;
  overflow-x:hidden;
  transition:background .35s,color .35s;
}

/* Heading font: Rajdhani — sharp, sporty, great for UI labels */
.orb-font, .block-num, .pctrl-lbl, .pc-val,
.th-player-lbl, .th-pi, .th-rnd-inner, .th-stage-inner,
.rnd-lbl, .score-chip, .total-val, .tr-lbl,
.lb-score, .lb-rank, .modal-title,
.sb-hdr h2, .btn, .globe-btn,
#mainTitle .ch {
  font-family:'Orbitron','Rajdhani',monospace;
}
/* Body readable text: Exo 2 */
.si, .sdd-item, .lang-opt, .sub-line, .sub-tiktok,
.th-pi, .lb-name, .podium-name, .si-name {
  font-family:'Exo 2','Sarabun',sans-serif;
  font-weight:600;
  letter-spacing:.02em;
}
/* Time values: Rajdhani — wide numerals, very legible */
.ti {
  font-family:'Rajdhani','Orbitron',monospace;
  font-weight:700;
  letter-spacing:.08em;
}

/* ── ANIMATED BG ── */
.bg-fx{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;transition:opacity .35s;}
.bg-base{position:absolute;inset:0;background:var(--bg);transition:background .35s;}
[data-theme="dark"] .bg-base{
  background:radial-gradient(ellipse at 30% 20%,rgba(29,111,232,.22) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(10,30,100,.35) 0%,transparent 60%),#04081a;
}
[data-theme="light"] .bg-base{
  background:radial-gradient(ellipse at 30% 20%,rgba(21,88,192,.12) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 80%,rgba(100,150,220,.1) 0%,transparent 60%),#dde8f8;
}
.bg-checker{
  position:absolute;inset:0;
  background-image:repeating-conic-gradient(rgba(255,255,255,.04) 0% 25%, transparent 0% 50%);
  background-size:24px 24px;
  mask-image:radial-gradient(ellipse at center,transparent 40%,black 100%);
  -webkit-mask-image:radial-gradient(ellipse at center,transparent 40%,black 100%);
}
[data-theme="light"] .bg-checker{
  background-image:repeating-conic-gradient(rgba(21,88,192,.04) 0% 25%, transparent 0% 50%);
}
.bg-lines{
  position:absolute;inset:0;
  background:repeating-linear-gradient(105deg,transparent 0px,transparent 60px,rgba(29,111,232,.03) 60px,rgba(29,111,232,.03) 62px);
}
.orb{position:absolute;border-radius:50%;filter:blur(90px);animation:orbSpin linear infinite;}
.orb1{width:60vw;height:60vw;max-width:800px;max-height:800px;top:-25%;left:-15%;animation-duration:20s;}
.orb2{width:50vw;height:50vw;max-width:700px;max-height:700px;bottom:-20%;right:-15%;animation-duration:25s;animation-direction:reverse;}
.orb3{width:35vw;height:35vw;max-width:450px;max-height:450px;top:40%;left:35%;animation-duration:32s;}
.orb4{width:25vw;height:25vw;max-width:350px;max-height:350px;bottom:15%;left:5%;animation-duration:28s;animation-direction:reverse;}
[data-theme="dark"] .orb1{background:rgba(29,111,232,.26);}
[data-theme="dark"] .orb2{background:rgba(5,20,80,.55);}
[data-theme="dark"] .orb3{background:rgba(59,157,255,.1);}
[data-theme="dark"] .orb4{background:rgba(245,197,24,.07);}
[data-theme="light"] .orb1{background:rgba(21,88,192,.1);}
[data-theme="light"] .orb2{background:rgba(100,160,240,.08);}
[data-theme="light"] .orb3{background:rgba(21,88,192,.06);}
[data-theme="light"] .orb4{background:rgba(200,160,30,.06);}
@keyframes orbSpin{
  0%  {transform:translate(0,0) scale(1);}
  25% {transform:translate(6vw,-5vw) scale(1.1);}
  50% {transform:translate(3vw,8vw) scale(.92);}
  75% {transform:translate(-5vw,3vw) scale(1.06);}
  100%{transform:translate(0,0) scale(1);}
}
.top-accent{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);z-index:500;animation:scanAnim 3s ease-in-out infinite;}

/* ── LAYOUT ── */
.app{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:16px 16px 80px;}

/* ── HEADER ── */
header{text-align:center;padding:28px 16px 14px;margin-bottom:18px;position:relative;}
/* Header checkered border */
header::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:min(600px,90%);height:4px;
  background:repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 10px,var(--gold) 10px,var(--gold) 20px);
  border-radius:2px;opacity:.6;
}
header::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:min(400px,70%);height:2px;
  background:repeating-linear-gradient(90deg,var(--blue) 0px,var(--blue) 8px,var(--gold) 8px,var(--gold) 16px);
  opacity:.4;
}

#mainTitle{display:block;font-family:'Orbitron',monospace;font-size:clamp(1rem,4vw,2.5rem);font-weight:900;letter-spacing:clamp(2px,1vw,8px);margin-bottom:10px;text-transform:uppercase;}
#mainTitle .ch{
  display:inline-block;
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:rShift 4s linear infinite,cFloat 2.6s ease-in-out infinite;
}
/* Dark theme: white → light blue → gold */
[data-theme="dark"] #mainTitle .ch{
  background-image:linear-gradient(160deg,#ffffff 0%,#b8d4ff 30%,#3b9dff 60%,#f5c518 80%,#ffffff 100%);
  filter:drop-shadow(0 0 8px rgba(59,157,255,.5));
}
/* Light theme: deep navy → royal blue → dark gold — readable on light bg */
[data-theme="light"] #mainTitle .ch{
  background-image:linear-gradient(160deg,#0a1a6e 0%,#0d47b8 30%,#1565c0 55%,#b8860b 80%,#0a1a6e 100%);
  filter:drop-shadow(0 2px 4px rgba(10,26,110,.3));
}
@keyframes rShift{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes cFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
#mainTitle .ch:nth-child(1){animation-delay:0s,0s}#mainTitle .ch:nth-child(2){animation-delay:.12s,.1s}#mainTitle .ch:nth-child(3){animation-delay:.24s,.2s}#mainTitle .ch:nth-child(4){animation-delay:.36s,.3s}#mainTitle .ch:nth-child(5){animation-delay:.48s,.4s}#mainTitle .ch:nth-child(6){animation-delay:.6s,.5s}#mainTitle .ch:nth-child(7){animation-delay:.72s,.6s}#mainTitle .ch:nth-child(8){animation-delay:.84s,.7s}#mainTitle .ch:nth-child(9){animation-delay:.96s,.8s}#mainTitle .ch:nth-child(10){animation-delay:1.08s,.9s}#mainTitle .ch:nth-child(11){animation-delay:1.2s,1s}#mainTitle .ch:nth-child(12){animation-delay:1.32s,1.1s}#mainTitle .ch:nth-child(13){animation-delay:1.44s,1.2s}#mainTitle .ch:nth-child(14){animation-delay:1.56s,1.3s}#mainTitle .ch:nth-child(15){animation-delay:1.68s,1.4s}#mainTitle .ch:nth-child(16){animation-delay:1.8s,1.5s}#mainTitle .ch:nth-child(17){animation-delay:1.92s,1.6s}#mainTitle .ch:nth-child(18){animation-delay:2.04s,1.7s}#mainTitle .ch:nth-child(19){animation-delay:2.16s,1.8s}#mainTitle .ch:nth-child(20){animation-delay:2.28s,1.9s}
.sub-line{color:var(--dim);font-size:.8rem;letter-spacing:.4px;margin:2px 0;}
.sub-tiktok{color:var(--blue2);font-size:.76rem;}
.scan-line{height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);max-width:500px;margin:12px auto;animation:scanAnim 3s ease-in-out infinite;}
@keyframes scanAnim{0%,100%{opacity:.3}50%{opacity:1}}

/* ── TOP BAR ── */
.top-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;margin-bottom:14px;}
.top-bar-right{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}

/* ── GLOBE ── */
.lang-wrap{position:relative;}
.globe-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);border-radius:8px;cursor:pointer;font-size:.82rem;font-family:'Exo 2',sans-serif;font-weight:600;transition:all .2s;backdrop-filter:blur(8px);}
.globe-btn:hover,.globe-btn.open{border-color:var(--blue2);color:var(--blue2);}
.globe-arrow{font-size:.58rem;opacity:.6;transition:transform .2s;}
.globe-btn.open .globe-arrow{transform:rotate(180deg);}
.lang-dd{position:absolute;top:calc(100% + 6px);left:0;min-width:180px;background:var(--s1);border:1px solid var(--blue);border-radius:10px;z-index:9999;box-shadow:0 8px 28px rgba(0,0,40,.3);overflow:hidden;display:none;animation:ddIn .15s ease;}
[data-theme="light"] .lang-dd{background:#eef4ff;}
.lang-dd.open{display:block;}
@keyframes ddIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.lang-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:.88rem;font-family:'Exo 2',sans-serif;font-weight:600;transition:background .12s;color:var(--text2);}
.lang-opt:hover,.lang-opt.active{background:rgba(29,111,232,.15);color:var(--blue2);}
.lang-divider{height:1px;background:var(--input-border);}

/* ── THEME TOGGLE ── */
.theme-btn{display:flex;align-items:center;gap:6px;padding:8px 12px;border:1px solid var(--card-border);background:var(--card-bg);color:var(--text);border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;transition:all .3s;backdrop-filter:blur(8px);white-space:nowrap;}
.theme-btn:hover{border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px rgba(245,197,24,.2);}
.theme-icon{font-size:1rem;transition:transform .4s;}
.theme-btn:hover .theme-icon{transform:rotate(20deg) scale(1.2);}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:7px;border:1px solid transparent;cursor:pointer;font-family:'Rajdhani',monospace;font-size:.8rem;font-weight:700;letter-spacing:.8px;text-transform:uppercase;transition:all .2s;white-space:nowrap;backdrop-filter:blur(6px);}
.btn:hover{transform:translateY(-2px);}
.btn:active{transform:scale(.97);}
.btn-add{background:rgba(29,111,232,.12);border-color:var(--card-border);color:var(--blue2);}
.btn-add:hover{background:var(--blue);color:#fff;box-shadow:0 0 16px rgba(29,111,232,.35);}
.btn-score{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.35);color:var(--gold);}
.btn-score:hover{background:var(--gold);color:#000;box-shadow:0 0 16px rgba(245,197,24,.3);}
.btn-excel{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--green);}
.btn-excel:hover{background:#16a34a;color:#fff;box-shadow:0 0 14px rgba(34,197,94,.3);}
.btn-clear{background:var(--card-bg);border-color:var(--s3);color:var(--dim);}
.btn-clear:hover{border-color:var(--red);color:var(--red);background:rgba(239,68,68,.08);}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 270px;gap:14px;align-items:start;}
@media(max-width:960px){.main-grid{grid-template-columns:1fr;}}

/* ── MATCH BLOCK ── */
.match-block{margin-bottom:14px;border-radius:14px;overflow:visible;background:var(--card-bg);border:1px solid var(--card-border);box-shadow:0 0 0 1px rgba(59,157,255,.05),0 8px 28px rgba(0,0,10,.3),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(14px);position:relative;transition:background .35s,border-color .35s;}
.match-block::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.block-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--hdr-bg);border-bottom:1px solid var(--card-border);flex-wrap:wrap;gap:8px;border-radius:14px 14px 0 0;}
.block-hdr-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.block-num{font-family:'Rajdhani',monospace;font-size:.82rem;font-weight:700;color:var(--gold);letter-spacing:2px;white-space:nowrap;}
.pctrl{display:flex;align-items:center;gap:5px;}
.pctrl-lbl{font-size:.7rem;color:var(--dim);font-family:'Rajdhani',monospace;letter-spacing:1px;white-space:nowrap;font-weight:600;}
.pc-btn{width:20px;height:20px;border-radius:50%;border:1px solid var(--card-border);background:var(--input-bg);color:var(--blue2);cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .2s;padding:0;line-height:1;}
.pc-btn:hover{border-color:var(--blue2);background:var(--blue);color:#fff;}
.pc-val{font-family:'Rajdhani',monospace;font-size:.85rem;font-weight:700;color:var(--gold);min-width:14px;text-align:center;}
.btn-rm{background:none;border:1px solid var(--s3);color:var(--dim);border-radius:5px;padding:3px 10px;cursor:pointer;font-size:.75rem;transition:all .2s;font-family:'Exo 2',sans-serif;font-weight:600;}
.btn-rm:hover{border-color:var(--red);color:var(--red);}

/* ── LEADERBOARD ── */
.sidebar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px rgba(59,157,255,.05),0 8px 24px rgba(0,0,16,.25);backdrop-filter:blur(14px);position:relative;transition:background .35s;}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.sb-hdr{background:var(--hdr-bg);padding:14px 18px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;}
.sb-hdr h2{font-family:'Rajdhani',monospace;font-size:1.05rem;font-weight:700;letter-spacing:.2em;transform:skewX(-8deg);display:inline-block;color:var(--gold);}
.lb-body{padding:8px 0;display:block;}
.lb-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:8px;margin:0 6px 6px;border:1px solid transparent;transition:all .3s;cursor:default;position:relative;overflow:hidden;}
.lb-item:hover{transform:scale(1.02);box-shadow:0 4px 14px rgba(0,0,16,.2);}
.lb-1{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.35);}
.lb-2{background:rgba(148,163,184,.05);border-color:rgba(148,163,184,.2);}
.lb-3{background:rgba(205,127,50,.05);border-color:rgba(205,127,50,.2);}
.lb-o{background:var(--card-hover);border-color:var(--input-border);}
.lb-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.lb-rank{width:30px;height:30px;border-radius:6px;background:var(--input-bg);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',monospace;font-weight:700;font-size:.82rem;border:1px solid var(--input-border);flex-shrink:0;}
.lb-name{font-weight:700;font-size:.9rem;flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-family:'Exo 2',sans-serif;}
.lb-score{font-family:'Rajdhani',monospace;font-weight:700;font-size:1.4rem;letter-spacing:.05em;}
/* ── TABLE ── */
.tbl-wrap{
  overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x pan-y;
  scrollbar-width:thin;scrollbar-color:rgba(59,157,255,.5) rgba(7,18,48,.6);
}
.tbl-wrap::-webkit-scrollbar{height:5px;}
.tbl-wrap::-webkit-scrollbar-track{background:rgba(7,18,48,.6);border-radius:3px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:linear-gradient(90deg,var(--blue),var(--gold));border-radius:3px;}

/* Fixed layout so columns are equally sized */
table{
  width:100%;border-collapse:collapse;
  min-width:520px;
  table-layout:fixed; /* KEY: forces equal player columns */
}
thead{position:sticky;top:0;z-index:20;background:var(--tbl-head);backdrop-filter:blur(8px);}
th{padding:0;border-bottom:2px solid var(--card-border);vertical-align:middle;overflow:hidden;}
th.th-rnd{width:36px;}th.th-stage{width:145px;}
.th-player-wrap{display:flex;flex-direction:column;align-items:center;padding:4px 6px 6px;}
.th-player-lbl{font-family:'Rajdhani',monospace;font-size:.6rem;font-weight:700;color:var(--blue3);letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase;}
.th-pi{width:100%;background:transparent;border:none;border-bottom:2px solid var(--input-border);color:var(--gold);font-family:'Rajdhani',monospace;font-size:.85rem;font-weight:700;text-align:center;padding:5px 4px;letter-spacing:.8px;outline:none;transition:border-color .2s;}
.th-pi:focus{border-bottom-color:var(--gold);}
.th-pi::placeholder{color:var(--input-border);font-size:.7rem;}
.th-rnd-inner{padding:10px 6px;font-family:'Rajdhani',monospace;font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-align:center;text-transform:uppercase;}
.th-stage-inner{padding:10px 8px;font-family:'Rajdhani',monospace;font-size:.7rem;font-weight:700;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;}
td{padding:0;border-bottom:1px solid var(--tbl-row-border);vertical-align:middle;overflow:hidden;transition:background .2s;}
tr:hover td{background:var(--card-hover);}
td.rnd-td{width:36px;}td.stage-td{width:145px;}
/* ── ROUND LABEL ── */
.rnd-lbl{padding:10px 8px;font-size:.75rem;font-weight:700;color:var(--blue3);white-space:nowrap;font-family:'Rajdhani',monospace;letter-spacing:1px;text-align:center;}
/* ── STAGE SELECTOR ── */
.stage-cell{padding:3px 5px;position:relative;}
.sw{position:relative;}
.si{width:100%;background:var(--input-bg);border:1px solid var(--input-border);color:var(--blue2);font-family:'Exo 2','Sarabun',sans-serif;font-size:.82rem;font-weight:600;padding:6px 7px;border-radius:5px;outline:none;transition:all .2s;}
.si:focus{border-color:var(--blue2);box-shadow:0 0 8px rgba(29,111,232,.2);}
.si::placeholder{color:var(--dim);font-size:.75rem;font-weight:500;}
.sdd{background:var(--s1);border:1px solid var(--blue);border-radius:8px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,10,40,.9);display:none;}
.sdd.open{display:block;}
.sdd-portal{position:fixed;z-index:99999;}
[data-theme="light"] .sdd{background:#f0f5ff;box-shadow:0 8px 24px rgba(0,30,80,.18);}
.sdd-grp{padding:4px 10px;font-size:.62rem;font-family:'Rajdhani',monospace;font-weight:700;color:var(--dim);background:rgba(29,111,232,.06);border-top:1px solid var(--input-border);text-transform:uppercase;letter-spacing:1px;}
.sdd-item{padding:7px 12px;font-size:.82rem;font-family:'Exo 2',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .1s;color:var(--text2);}
.sdd-item:hover{background:rgba(29,111,232,.14);color:var(--blue2);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── TIME CELL ── */
/* ALL tds in player columns: same fixed height, no extra padding for king */
td.king-td{padding-top:0 !important;vertical-align:middle;}

/* tc-wrap: same size in ALL cells — king badge floats outside via absolute */
.tc-wrap{
  padding:6px 5px 8px;
  display:flex;flex-direction:column;align-items:center;gap:4px;
  position:relative;
  box-sizing:border-box;
  width:100%;
  min-height:58px; /* uniform height so all rows align */
}

/* King badge: absolutely positioned ABOVE the tc-wrap, overflows upward */
.king-badge{
  position:absolute;
  top:-14px;       /* float above the cell */
  left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,#9b1c1c,#dc2626,#ef4444);
  color:#fff;font-family:'Orbitron',monospace;font-size:.46rem;font-weight:700;
  padding:2px 8px;border-radius:4px;white-space:nowrap;letter-spacing:.5px;
  box-shadow:0 0 10px rgba(220,38,38,.6);
  animation:kPulse 2s ease-in-out infinite;
  z-index:5;
  pointer-events:none;
  width:max-content;
}
@keyframes kPulse{0%,100%{box-shadow:0 0 8px rgba(220,38,38,.4)}50%{box-shadow:0 0 18px rgba(220,38,38,.9)}}

/* Give the TR extra top space so absolute badge has room above */
.has-king-row td{padding-top:14px !important;}

/* ── TIME INPUT ── */
.ti{
  width:100%;text-align:center;
  border:1px solid var(--input-border);border-radius:6px;
  background:var(--input-bg);color:var(--text);
  font-family:'Rajdhani',monospace;font-size:.82rem;font-weight:700;
  letter-spacing:.1em;
  padding:6px 2px;outline:none;transition:all .2s;
}
.ti:focus{border-color:var(--blue2);box-shadow:0 0 8px rgba(29,111,232,.2);}
.ti::placeholder{color:var(--dim);font-size:.7rem;opacity:.6;}
.ti.has-v{color:var(--text);}
/* ── WINNER CARD ── */
.ti.best{border:2px solid var(--gold)!important;background:linear-gradient(160deg,rgba(245,197,24,.14),var(--input-bg))!important;color:var(--gold)!important;font-weight:700;box-shadow:0 0 12px rgba(245,197,24,.3);}
.tc-wrap.is-best{background:rgba(245,197,24,.06);border-radius:8px;outline:1.5px solid rgba(245,197,24,.35);box-shadow:0 0 14px rgba(245,197,24,.18);}
.ti.best-king{border:2px solid var(--red)!important;background:linear-gradient(160deg,rgba(239,68,68,.15),var(--input-bg))!important;color:var(--red)!important;font-weight:700;box-shadow:0 0 14px rgba(239,68,68,.4);}
.tc-wrap.is-best-king{background:rgba(239,68,68,.08);border-radius:8px;outline:1.5px solid rgba(239,68,68,.45);box-shadow:0 0 18px rgba(239,68,68,.22);}
/* Score chips */
.score-chip{font-family:'Rajdhani',monospace;font-size:.8rem;font-weight:700;padding:2px 8px;border-radius:10px;min-width:34px;text-align:center;letter-spacing:.05em;}
.sc12{background:rgba(239,68,68,.18);color:var(--red);box-shadow:0 0 8px rgba(239,68,68,.25);}
.sc11{background:rgba(245,197,24,.18);color:var(--gold);box-shadow:0 0 8px rgba(245,197,24,.25);}
.sch{background:rgba(34,197,94,.12);color:var(--green);}
.scm{background:rgba(59,157,255,.1);color:var(--blue2);}
.scl{background:rgba(239,68,68,.07);color:var(--red);}
.sc0{background:rgba(90,120,170,.08);color:var(--dim);}
.scx{background:transparent;color:var(--dim);font-size:.7rem;}

/* ── ANIMATED TOTAL ROW ── */
@keyframes totalBG{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes totalGlow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.total-row-outer{
  position:relative;overflow-x:auto;overflow-y:hidden;
  border-radius:0 0 10px 10px;scrollbar-width:none;-ms-overflow-style:none;
}
.total-row-outer::-webkit-scrollbar{display:none;}
.total-row-outer::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,
    #0a1f5c 0%,#071545 15%,#020a28 35%,#071545 50%,
    #020a28 65%,#071545 85%,#0a1f5c 100%
  );
  background-size:300% 100%;animation:totalBG 5s linear infinite;z-index:0;
}
.total-row-outer::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(59,157,255,.05) 50%,transparent 100%);
  background-size:200% 100%;animation:shimmer 3s ease-in-out infinite;z-index:1;pointer-events:none;
}
.total-row-border{
  height:2px;
  background:linear-gradient(90deg,var(--blue),var(--gold),#fff,var(--blue2),var(--gold),var(--blue));
  background-size:300% 100%;animation:borderFlow 3s linear infinite;
}
.total-row-outer table{width:100%;border-collapse:collapse;background:transparent;}
.total-row-outer td{border:none!important;background:transparent!important;position:relative;z-index:2;padding:0;}
.tr-lbl{
  display:block;padding:13px 14px;
  font-family:'Orbitron',monospace;font-size:.62rem;font-weight:900;letter-spacing:1.5px;
  color:transparent;
  background:linear-gradient(90deg,var(--gold) 0%,#fff 30%,var(--blue2) 60%,var(--gold2) 100%);
  background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
  animation:totalBG 3s linear infinite;white-space:nowrap;
}
.total-val{font-family:'Orbitron',monospace;font-weight:900;font-size:.95rem;text-align:center;padding:13px 4px;display:block;position:relative;z-index:2;}
.tv-top{color:var(--gold);text-shadow:0 0 16px rgba(245,197,24,.9),0 0 4px rgba(245,197,24,.5);font-size:1.15rem;animation:totalGlow 2s ease-in-out infinite;}
.tv-val{color:var(--blue2);text-shadow:0 0 10px rgba(59,157,255,.5);}
.tv-zero{color:var(--dim);font-size:.72rem;}

/* ── LEADERBOARD SIDEBAR ── */
.sidebar{
  background:linear-gradient(160deg,rgba(13,30,74,.9),rgba(4,8,26,.95));
  border:1px solid rgba(29,111,232,.35);border-radius:14px;overflow:hidden;
  box-shadow:0 0 0 1px rgba(59,157,255,.08),0 8px 28px rgba(0,0,20,.6);
  backdrop-filter:blur(14px);position:relative;
}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 4s ease-in-out infinite;}
.sb-hdr{
  background:linear-gradient(90deg,rgba(29,111,232,.25),rgba(13,30,74,.4));
  padding:14px 18px;border-bottom:1px solid rgba(29,111,232,.2);
  display:flex;align-items:center;justify-content:space-between;
}
.sb-hdr h2{font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;letter-spacing:.15em;transform:skewX(-8deg);display:inline-block;color:var(--gold);text-shadow:0 0 10px rgba(245,197,24,.4);}
.lb-body{padding:8px 0;display:block;}
.lb-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border-radius:8px;margin:0 6px 6px;
  border:1px solid transparent;transition:all .3s;cursor:default;position:relative;overflow:hidden;
}
.lb-item:hover{transform:scale(1.02);box-shadow:0 4px 16px rgba(0,0,20,.4);}
.lb-1{background:rgba(245,197,24,.08);border-color:rgba(245,197,24,.4);}
.lb-2{background:rgba(148,163,184,.05);border-color:rgba(148,163,184,.25);}
.lb-3{background:rgba(205,127,50,.05);border-color:rgba(205,127,50,.25);}
.lb-o{background:rgba(13,30,74,.4);border-color:rgba(29,111,232,.2);}
.lb-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:8px 0 0 8px;}
.lb-rank{width:30px;height:30px;border-radius:6px;background:rgba(7,18,48,.6);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:.7rem;border:1px solid rgba(29,111,232,.3);flex-shrink:0;}
.lb-name{font-weight:700;font-size:.8rem;flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#c8d8f0;}
.lb-score{font-family:'Orbitron',monospace;font-weight:900;font-size:1.25rem;}

/* ── GRAND TOTAL MODAL ── */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,5,25,.8);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:modalFadeIn .25s ease;}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:linear-gradient(160deg,rgba(13,30,74,.98),rgba(4,8,26,.99));
  border:1px solid rgba(29,111,232,.5);
  border-radius:18px;width:100%;max-width:520px;max-height:85vh;
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 0 1px rgba(59,157,255,.1),0 0 40px rgba(29,111,232,.2),0 20px 60px rgba(0,0,30,.9);
  animation:modalSlideUp .28s cubic-bezier(.34,1.56,.64,1);position:relative;
}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--blue),var(--gold),var(--blue),transparent);animation:scanAnim 3s ease-in-out infinite;}
@keyframes modalSlideUp{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:none}}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:linear-gradient(90deg,rgba(29,111,232,.25),rgba(13,30,74,.4));border-bottom:1px solid rgba(29,111,232,.25);flex-shrink:0;}
.modal-title{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:900;letter-spacing:2px;color:var(--gold);text-shadow:0 0 12px rgba(245,197,24,.5);}
.modal-close{width:32px;height:32px;border-radius:50%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.modal-close:hover{background:var(--red);color:#fff;transform:rotate(90deg);}
.modal-body{overflow-y:auto;padding:16px;flex:1;}
.modal-body::-webkit-scrollbar{width:4px;}
.modal-body::-webkit-scrollbar-thumb{background:rgba(29,111,232,.4);border-radius:2px;}
.podium-row{display:flex;gap:10px;margin-bottom:14px;justify-content:center;}
.podium-card{flex:1;max-width:140px;border-radius:12px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid transparent;position:relative;overflow:hidden;transition:transform .2s;}
.podium-card:hover{transform:translateY(-3px);}
.podium-1{background:rgba(245,197,24,.1);border-color:rgba(245,197,24,.4);box-shadow:0 0 20px rgba(245,197,24,.15);}
.podium-2{background:rgba(148,163,184,.07);border-color:rgba(148,163,184,.3);}
.podium-3{background:rgba(205,127,50,.07);border-color:rgba(205,127,50,.3);}
.podium-medal{font-size:1.6rem;line-height:1;}
.podium-name{font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;color:#fff;text-align:center;word-break:break-all;}
.podium-score{font-family:'Orbitron',monospace;font-size:1.5rem;font-weight:900;}
.p1-score{color:var(--gold);text-shadow:0 0 16px rgba(245,197,24,.8);}
.p2-score{color:#cbd5e1;}
.p3-score{color:#cd7f32;}
.podium-pts{font-size:.55rem;color:var(--dim);font-family:'Orbitron',monospace;letter-spacing:1px;}
.standings-list{display:flex;flex-direction:column;gap:6px;}
.standing-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(13,30,74,.4);border:1px solid rgba(29,111,232,.2);transition:all .2s;}
.standing-item:hover{background:rgba(13,30,74,.7);border-color:rgba(29,111,232,.4);}
.si-rank{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--dim);min-width:24px;}
.si-name{flex:1;font-weight:700;font-size:.82rem;color:#c8d8f0;}
.si-bar-wrap{flex:1;max-width:100px;height:4px;background:rgba(29,111,232,.2);border-radius:2px;overflow:hidden;}
.si-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--gold));transition:width .6s ease;}
.si-score{font-family:'Orbitron',monospace;font-weight:900;font-size:.9rem;color:var(--blue2);min-width:32px;text-align:right;}

/* ── GRAND TOTAL PANEL (legacy, unused) ── */
.grand-panel{display:none;}

/* ── FAB ── */
.fab{position:fixed;bottom:18px;right:18px;width:44px;height:44px;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(29,111,232,.5);z-index:300;transition:transform .2s;}
.fab:hover{transform:scale(1.12);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:rgba(7,18,48,.6);}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--blue2);}

/* ════════════════════════ RESPONSIVE ════════════════════════ */
@media(max-width:400px){
  .app{padding:6px 6px 70px;}#mainTitle{letter-spacing:2px;}
  table{min-width:360px!important;}
  th.th-rnd,td.rnd-td{width:28px!important;}
  th.th-stage,td.stage-td{width:100px!important;}
  .th-rnd-inner,.th-stage-inner{padding:7px 4px;font-size:.44rem;}
  .th-player-lbl{font-size:.4rem;}.th-pi{font-size:.54rem;padding:3px 2px;}
  .si{font-size:.62rem;padding:4px 4px;}.ti{font-size:.54rem;padding:3px 1px;}
  .score-chip{font-size:.54rem;padding:1px 4px;min-width:22px;}
  .king-badge{font-size:.4rem;padding:2px 4px;}.rnd-lbl{padding:7px 4px;font-size:.52rem;}
  .tr-lbl{font-size:.5rem;padding:9px 6px;}.total-val{font-size:.78rem;padding:9px 2px;}
}
@media(max-width:640px){
  .app{padding:8px 8px 70px;}header{padding:14px 8px 10px;}
  .sub-line,.sub-tiktok{font-size:.72rem;}.top-bar{gap:6px;}.top-bar-right{gap:5px;}
  .btn .btn-txt{display:none;}.btn{padding:7px 10px;font-size:.6rem;}
  .globe-btn{padding:7px 10px;font-size:.76rem;}.block-hdr{padding:7px 10px;}
  .block-num{font-size:.58rem;}.pctrl-lbl{display:none;}.btn-rm{font-size:.62rem;padding:3px 7px;}
  table{min-width:440px!important;}
  th.th-rnd,td.rnd-td{width:30px!important;}
  th.th-stage,td.stage-td{width:120px!important;}
  .th-rnd-inner,.th-stage-inner{padding:8px 4px;font-size:.46rem;}
  .th-player-lbl{font-size:.42rem;}.th-pi{font-size:.56rem;padding:4px 2px;}
  .rnd-lbl{padding:8px 5px;font-size:.54rem;}.stage-cell{padding:2px 3px;}
  .si{font-size:.66rem;padding:5px 4px;}.tc-wrap{padding:3px 2px 5px;}
  .ti{font-size:.58rem;padding:4px 1px;}.score-chip{font-size:.58rem;padding:1px 4px;min-width:24px;}
  .king-badge{font-size:.42rem;padding:2px 5px;}
  .tr-lbl{font-size:.54rem;padding:10px 8px;letter-spacing:.8px;}
  .total-val{font-size:.82rem;padding:10px 2px;}.tv-top{font-size:.98rem;}
}
@media(max-width:960px){
  .main-grid{grid-template-columns:1fr;}
  .lb-body{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px;}
  .lb-item{margin:0;}
}
@media(min-width:641px){.btn .btn-txt{display:inline;}.btn{padding:8px 14px;}}
@media(min-width:960px){
  .main-grid{grid-template-columns:1fr 270px;}
  .lb-body{display:block;padding:8px 0;}.lb-item{margin:0 6px 6px;}
}
@media(min-width:1200px){
  th.th-rnd,td.rnd-td{width:40px!important;}
  th.th-stage,td.stage-td{width:160px!important;}
}
@media(min-width:1400px){
  .main-grid{grid-template-columns:1fr 300px;}
  th.th-stage,td.stage-td{width:180px!important;}
}

<script>

const SC={3:'#4fc3f7',4:'#81c784',5:'#ffb74d',6:'#f06292',7:'#ce93d8'};
const ALL_S=[];for(const[s,l]of Object.entries(SBS))l.forEach(n=>ALL_S.push({name:n,stars:parseInt(s)}));

const MAX_P=6,MIN_P=2,ROWS=9;
const KM={1:0,2:1,3:2,4:3,5:4,6:5};
let tables=[],tc=0;

function loadState(){
  try{tables=JSON.parse(localStorage.getItem('rt6')||'[]');}catch(e){tables=[];}
  tables.forEach(t=>{if(!t.players)t.players=Array(MAX_P).fill('');});
  try{lang=localStorage.getItem('rtLang')||'th';}catch(e){}
  if(!tables.length){tc=0;tables.push(mkTable(4));}
  else tc=Math.max(...tables.map(t=>t.id))+1;
}
function save(){localStorage.setItem('rt6',JSON.stringify(tables));localStorage.setItem('rtLang',lang);}
function mkTable(pc){return{id:tc++,playerCount:pc||4,players:Array(MAX_P).fill(''),rows:Array.from({length:ROWS},()=>({stage:'',times:Array(MAX_P).fill('')}))};}

function parseTime(v){
  if(!v||!v.trim())return null;
  const p=v.split(':');
  if(p.length===3)return(parseInt(p[0])||0)*6000+(parseInt(p[1])||0)*100+(parseInt(p[2])||0);
  return null;
}
function fmtTime(v){
  v=(v||'').replace(/[^0-9:]/g,'');if(!v)return'';
  if(!v.includes(':')){const d=v.padStart(6,'0');return`${d.slice(0,2)}:${d.slice(2,4)}:${d.slice(4,6)}`;}
  return v;
}
function calcScores(row,r,pc){
  const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
  const valid=parsed.filter(t=>t!==null);
  if(!valid.length)return parsed.map(()=>null);
  const best=Math.min(...valid);
  const kp=(r in KM&&KM[r]<pc)?KM[r]:-1;
  return parsed.map((t,p)=>{
    if(t===null)return null;
    const ds=(t-best)/100;
    let s;
    if(ds===0)s=11;else if(ds<1)s=10;else if(ds<2)s=9;else if(ds<3)s=8;
    else if(ds<4)s=7;else if(ds<5)s=6;else if(ds<6)s=5;
    else if(ds<7)s=4;else if(ds<8)s=3;else if(ds<9)s=2;else if(ds<10)s=1;else s=0;
    if(p===kp&&ds===0)s=12;
    return s;
  });
}
function scClass(s){
  if(s===null)return'scx';if(s===12)return'sc12';if(s===11)return'sc11';
  if(s>=8)return'sch';if(s>=5)return'scm';if(s>=2)return'scl';return'sc0';
}

// Global dropdown element — single shared instance mounted on body
let _activeDd = null;
let _activeDdInp = null;
function _closeDd(){
  if(_activeDd){_activeDd.classList.remove('open');_activeDd=null;_activeDdInp=null;}
}
document.addEventListener('click', e=>{
  if(_activeDd && !_activeDd.contains(e.target) && e.target!==_activeDdInp) _closeDd();
}, true);
// Only close on scroll if it's the page/table scrolling, NOT the dropdown itself
document.addEventListener('scroll', e=>{
  if(_activeDd && !_activeDd.contains(e.target)){
    // Reposition instead of closing when table scrolls
    if(_activeDdInp){
      const rect=_activeDdInp.getBoundingClientRect();
      // If input scrolled off screen, close; otherwise reposition
      if(rect.bottom<0||rect.top>window.innerHeight){
        _closeDd();
      } else {
        _activeDd.style.top=(rect.bottom+2)+'px';
        _activeDd.style.left=rect.left+'px';
        _activeDd.style.width=Math.max(rect.width,180)+'px';
      }
    }
  }
}, true);

function buildStageSelector(tObj,r){
  const wrap=document.createElement('div');wrap.className='sw';
  const inp=document.createElement('input');inp.type='text';inp.className='si';
  inp.placeholder=T('stagePH');inp.value=tObj.rows[r].stage||'';inp.autocomplete='off';

  // Create a shared dropdown appended to body for each selector
  const dd=document.createElement('div');dd.className='sdd sdd-portal';
  document.body.appendChild(dd);

  function positionDd(){
    const rect=inp.getBoundingClientRect();
    dd.style.position='fixed';
    dd.style.top=(rect.bottom+2)+'px';
    dd.style.left=rect.left+'px';
    dd.style.width=Math.max(rect.width,180)+'px';
    dd.style.maxHeight='220px';
    dd.style.zIndex='99999';
    // Flip up if not enough room below
    const spaceBelow=window.innerHeight-rect.bottom;
    if(spaceBelow<230&&rect.top>230){
      dd.style.top='auto';
      dd.style.bottom=(window.innerHeight-rect.top+2)+'px';
    } else {
      dd.style.bottom='auto';
    }
  }

  function pop(q){
    dd.innerHTML='';q=(q||'').toLowerCase();let ls=null;
    for(const s of ALL_S){
      if(q&&!s.name.toLowerCase().includes(q))continue;
      if(s.stars!==ls){
        const g=document.createElement('div');g.className='sdd-grp';
        g.textContent=`${'⭐'.repeat(s.stars)} ${s.stars}★`;g.style.color=SC[s.stars];dd.appendChild(g);ls=s.stars;
      }
      const item=document.createElement('div');item.className='sdd-item';
      const dot=document.createElement('span');dot.className='sdot';dot.style.background=SC[s.stars];
      item.appendChild(dot);item.appendChild(document.createTextNode(s.name));
      item.addEventListener('mousedown',e=>{
        e.preventDefault();inp.value=s.name;tObj.rows[r].stage=s.name;save();_closeDd();
      });
      dd.appendChild(item);
    }
    if(!dd.children.length){
      const ni=document.createElement('div');ni.className='sdd-item';ni.style.color='var(--dim)';ni.textContent='—';dd.appendChild(ni);
    }
  }

  inp.addEventListener('focus',()=>{
    _closeDd();
    pop(inp.value);
    positionDd();
    dd.classList.add('open');
    _activeDd=dd;_activeDdInp=inp;
  });
  inp.addEventListener('input',()=>{
    tObj.rows[r].stage=inp.value;save();
    pop(inp.value);
    positionDd();
    dd.classList.add('open');
    _activeDd=dd;_activeDdInp=inp;
  });
  inp.addEventListener('blur',()=>setTimeout(()=>{if(_activeDd===dd)_closeDd();},160));

  // Cleanup when element is removed from DOM
  const obs=new MutationObserver(()=>{if(!document.body.contains(inp)){dd.remove();obs.disconnect();}});
  obs.observe(document.body,{childList:true,subtree:true});

  wrap.appendChild(inp);return wrap;
}

function buildTable(tObj){
  const pc=tObj.playerCount||4;
  const block=document.createElement('div');block.className='match-block';block.dataset.tid=tObj.id;

  // Header bar
  const hdr=document.createElement('div');hdr.className='block-hdr';
  const left=document.createElement('div');left.className='block-hdr-left';
  const num=document.createElement('span');num.className='block-num';num.textContent=`${T('matchLabel')} #${tObj.id+1}`;left.appendChild(num);
  const pctrl=document.createElement('div');pctrl.className='pctrl';
  const plbl=document.createElement('span');plbl.className='pctrl-lbl';plbl.textContent=T('playerLabel');
  const bDec=document.createElement('button');bDec.className='pc-btn';bDec.textContent='−';bDec.onclick=()=>{if(tObj.playerCount<=MIN_P){alert(T('minP'));return;}tObj.playerCount--;save();rebuildBlock(tObj);};
  const bVal=document.createElement('span');bVal.className='pc-val';bVal.textContent=pc;
  const bInc=document.createElement('button');bInc.className='pc-btn';bInc.textContent='+';bInc.onclick=()=>{if(tObj.playerCount>=MAX_P){alert(T('maxP'));return;}tObj.playerCount++;save();rebuildBlock(tObj);};
  pctrl.append(plbl,bDec,bVal,bInc);left.append(num,pctrl);hdr.appendChild(left);
  const rmBtn=document.createElement('button');rmBtn.className='btn-rm';rmBtn.textContent=T('removeMatch');rmBtn.onclick=()=>removeMatch(tObj.id);hdr.appendChild(rmBtn);
  block.appendChild(hdr);

  const wrap=document.createElement('div');wrap.className='tbl-wrap';
  const table=document.createElement('table');
  const thead=document.createElement('thead');
  const hRow=document.createElement('tr');

  // TH: Round
  const thR=document.createElement('th');thR.className='th-rnd';
  const thRInner=document.createElement('div');thRInner.className='th-rnd-inner';thRInner.textContent=T('round');thR.appendChild(thRInner);hRow.appendChild(thR);
  // TH: Stage
  const thS=document.createElement('th');thS.className='th-stage';
  const thSInner=document.createElement('div');thSInner.className='th-stage-inner';thSInner.textContent=T('stageLabel');thS.appendChild(thSInner);hRow.appendChild(thS);
  // TH: Players (with input)
  for(let p=0;p<pc;p++){
    const th=document.createElement('th');th.className='th-p';
    const pw=document.createElement('div');pw.className='th-player-wrap';
    const lbl=document.createElement('span');lbl.className='th-player-lbl';lbl.textContent=T('playerLabel')+` ${p+1}`;
    const inp=document.createElement('input');inp.type='text';inp.className='th-pi';inp.placeholder=`P${p+1}`;
    if(!tObj.players)tObj.players=Array(MAX_P).fill('');
    inp.value=tObj.players[p]||'';inp.dataset.p=p;
    inp.addEventListener('input',function(){tObj.players[parseInt(this.dataset.p)]=this.value;save();updateLeaderboard();});
    pw.appendChild(lbl);pw.appendChild(inp);th.appendChild(pw);hRow.appendChild(th);
  }
  thead.appendChild(hRow);table.appendChild(thead);
  const tbody=document.createElement('tbody');

  // Round rows
  for(let r=0;r<ROWS;r++){
    const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
    const tr=document.createElement('tr');
    // Mark the whole row if it has a king round → uniform top padding
    if(isKing) tr.classList.add('has-king-row');
    // Round label
    const rTd=document.createElement('td');rTd.className='rnd-lbl rnd-td';rTd.textContent=`${r+1}`;tr.appendChild(rTd);
    // Stage selector
    const sTd=document.createElement('td');sTd.className='stage-cell stage-td';sTd.appendChild(buildStageSelector(tObj,r));tr.appendChild(sTd);
    // Time cells
    for(let p=0;p<pc;p++){
      const td=document.createElement('td');td.dataset.p=p;td.dataset.r=r;
      const cw=document.createElement('div');cw.className='tc-wrap';
      // King badge inside tc-wrap as absolute, won't push layout
      if(isKing&&p===kp){
        const b=document.createElement('div');b.className='king-badge';b.textContent=T('kingMap');cw.appendChild(b);
      }
      const inp=document.createElement('input');inp.type='text';inp.className='ti';inp.placeholder='mm:ss:cs';
      const v=tObj.rows[r].times[p]||'';inp.value=v;if(v)inp.classList.add('has-v');
      inp.dataset.tid=tObj.id;inp.dataset.p=p;inp.dataset.r=r;
      inp.addEventListener('change',function(){
        const val=fmtTime(this.value.trim());this.value=val;
        const t2=tables.find(x=>x.id===parseInt(this.dataset.tid));
        if(t2){t2.rows[parseInt(this.dataset.r)].times[parseInt(this.dataset.p)]=val;save();}
        if(val)this.classList.add('has-v');else this.classList.remove('has-v');
        recalcBlock(parseInt(this.dataset.tid));updateLeaderboard();
      });
      inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();});
      const chip=document.createElement('div');chip.className='score-chip scx';chip.textContent='—';chip.dataset.chip='1';
      cw.appendChild(inp);cw.appendChild(chip);td.appendChild(cw);tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  // Total row — seamless animated gradient via wrapper div
  // Build as a separate div outside the main table
  const outerDiv=document.createElement('div');outerDiv.className='total-row-outer';outerDiv.id=`tot-${tObj.id}`;
  // Animated top border
  const borderLine=document.createElement('div');borderLine.className='total-row-border';outerDiv.appendChild(borderLine);
  // Inner table for layout alignment
  const totTable=document.createElement('table');
  const totTbody=document.createElement('tbody');
  const totTr=document.createElement('tr');
  // Label cell
  const totLbl=document.createElement('td');totLbl.colSpan=2;totLbl.style.cssText='width:'+((50+160)+'px')+';min-width:210px;';
  const lspan=document.createElement('span');lspan.className='tr-lbl';lspan.textContent=T('grandTotal');totLbl.appendChild(lspan);totTr.appendChild(totLbl);
  // Score cells
  for(let p=0;p<pc;p++){
    const td=document.createElement('td');td.dataset.tp=p;td.style.cssText='min-width:90px;';
    const vspan=document.createElement('span');vspan.className='total-val tv-zero';vspan.textContent='0';td.appendChild(vspan);totTr.appendChild(td);
  }
  totTbody.appendChild(totTr);totTable.appendChild(totTbody);outerDiv.appendChild(totTable);
  tbody.appendChild(document.createElement('tr'));// spacer so table structure is valid

  table.appendChild(tbody);wrap.appendChild(table);
  block.appendChild(wrap);
  block.appendChild(outerDiv);
  // Sync horizontal scroll between table and total row
  wrap.addEventListener('scroll',()=>{outerDiv.scrollLeft=wrap.scrollLeft;});
  outerDiv.addEventListener('scroll',()=>{wrap.scrollLeft=outerDiv.scrollLeft;});
  return block;
}

function recalcBlock(tid){
  const tObj=tables.find(t=>t.id===tid);if(!tObj)return;
  const block=document.querySelector(`.match-block[data-tid="${tid}"]`);if(!block)return;
  const pc=tObj.playerCount||4;
  for(let r=0;r<ROWS;r++){
    const row=tObj.rows[r];const scores=calcScores(row,r,pc);
    const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
    const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
    const isKing=r in KM&&KM[r]<pc;const kp=isKing?KM[r]:-1;
    for(let p=0;p<pc;p++){
      const td=block.querySelector(`td[data-p="${p}"][data-r="${r}"]`);if(!td)continue;
      const cw=td.querySelector('.tc-wrap');
      const inp=td.querySelector('.ti');const chip=td.querySelector('[data-chip]');if(!inp||!chip)continue;
      const t=parseTime(inp.value);const isB=t!==null&&t===best;const isKC=isKing&&p===kp;
      inp.className='ti'+(inp.value?' has-v':'')+(isB?(isKC?' best-king':' best'):'');
      // Winner card frame on tc-wrap
      if(cw){
        cw.classList.remove('is-best','is-best-king');
        if(isB) cw.classList.add(isKC?'is-best-king':'is-best');
      }
      const s=scores[p];chip.className=`score-chip ${scClass(s)}`;chip.textContent=s===null?'—':`+${s}`;
    }
  }
  const tots=Array(pc).fill(0);
  tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
  const maxT=tots.length?Math.max(...tots):0;
  const totRow=document.getElementById(`tot-${tid}`);if(!totRow)return;
  totRow.querySelectorAll('[data-tp]').forEach((td,p)=>{
    const v=tots[p];const sp=td.querySelector('.total-val');if(!sp)return;
    sp.className='total-val '+(v===0?'tv-zero':v===maxT?'tv-top':'tv-val');sp.textContent=v||'0';
  });
}
function recalcAll(){tables.forEach(t=>recalcBlock(t.id));}
function rebuildBlock(tObj){const old=document.querySelector(`.match-block[data-tid="${tObj.id}"]`);if(old){const nd=buildTable(tObj);old.replaceWith(nd);recalcBlock(tObj.id);updateLeaderboard();}}
function rebuildAll(){const a=document.getElementById('tablesArea');a.innerHTML='';tables.forEach(t=>a.appendChild(buildTable(t)));recalcAll();updateLeaderboard();}

function updateLeaderboard(){
  const sm={};
  tables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const tots=Array(pc).fill(0);
    tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){const n=(tObj.players[p]||'').trim()||`P${p+1}`;sm[n]=(sm[n]||0)+tots[p];}
  });
  const sorted=Object.entries(sm).map(([name,score])=>({name,score})).sort((a,b)=>b.score-a.score);
  const lb=document.getElementById('lbList');lb.innerHTML='';
  if(!sorted.length){lb.innerHTML='<div style="padding:16px;text-align:center;color:var(--dim);font-size:.72rem;">—</div>';return;}
  sorted.forEach((item,i)=>{
    const rank=i+1;
    const div=document.createElement('div');div.style.position='relative';
    const stripe=document.createElement('div');stripe.className='lb-stripe';
    stripe.style.background=rank===1?'#fbbf24':rank===2?'#cbd5e1':rank===3?'#cd7f32':'#334155';
    const inner=document.createElement('div');
    inner.className=`lb-item ${rank===1?'lb-1':rank===2?'lb-2':rank===3?'lb-3':'lb-o'}`;
    const rankEl=document.createElement('div');rankEl.className='lb-rank';
    rankEl.style.color=rank===1?'#fbbf24':rank===2?'#cbd5e1':rank===3?'#cd7f32':'#475569';
    rankEl.textContent=rank<=3?['🥇','🥈','🥉'][rank-1]:`#${rank}`;
    rankEl.style.fontSize=rank>3?'.6rem':'inherit';
    const nameEl=document.createElement('span');nameEl.className='lb-name';nameEl.textContent=item.name;
    const scoreEl=document.createElement('span');scoreEl.className='lb-score';
    scoreEl.style.color=rank===1?'#fbbf24':'#fff';
    if(rank===1)scoreEl.style.textShadow='0 0 10px rgba(251,191,36,.8)';
    scoreEl.textContent=item.score;
    inner.appendChild(rankEl);inner.appendChild(nameEl);inner.appendChild(scoreEl);
    div.appendChild(stripe);div.appendChild(inner);lb.appendChild(div);
  });
}

function showTotals(){
  const sm={};
  tables.forEach(tObj=>{
    const pc=tObj.playerCount||4;const tots=Array(pc).fill(0);
    tObj.rows.forEach((row,r)=>{calcScores(row,r,pc).forEach((s,p)=>{if(s!==null)tots[p]+=s;});});
    for(let p=0;p<pc;p++){const n=(tObj.players[p]||'').trim()||`P${p+1}`;sm[n]=(sm[n]||0)+tots[p];}
  });
  const sorted=Object.entries(sm).map(([n,s])=>({name:n,score:s})).sort((a,b)=>b.score-a.score);
  const maxScore=sorted.length?sorted[0].score:1;

  const modal=document.getElementById('grandModal');
  const body=document.getElementById('modalBody');
  body.innerHTML='';
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));

  if(!sorted.length){
    body.innerHTML=`<div style="text-align:center;color:var(--dim);padding:40px;font-family:'Orbitron',monospace;font-size:.75rem;">— ${T('score')} —</div>`;
  } else {
    // Podium (top 3)
    const top3=sorted.slice(0,Math.min(3,sorted.length));
    if(top3.length>0){
      const podium=document.createElement('div');podium.className='podium-row';
      // Reorder: 2nd left, 1st center, 3rd right
      const order=top3.length===1?[0]:top3.length===2?[1,0]:[1,0,2];
      order.forEach(idx=>{
        if(idx>=top3.length)return;
        const item=top3[idx];const rank=idx+1;
        const card=document.createElement('div');
        card.className=`podium-card podium-${rank}`;
        const medal=['🥇','🥈','🥉'][idx];
        card.innerHTML=`
          <div class="podium-medal">${medal}</div>
          <div class="podium-name">${item.name}</div>
          <div class="podium-score p${rank}-score">${item.score}</div>
          <div class="podium-pts">${T('pts').toUpperCase()}</div>
        `;
        // Make 1st place slightly bigger
        if(rank===1)card.style.transform='scale(1.05)';
        podium.appendChild(card);
      });
      body.appendChild(podium);
    }

    // Rest of standings (4th+)
    if(sorted.length>3){
      const sep=document.createElement('div');
      sep.style.cssText='text-align:center;color:var(--dim);font-family:Orbitron,monospace;font-size:.55rem;letter-spacing:2px;margin:8px 0;';
      sep.textContent='─── OTHER RANKINGS ───';
      body.appendChild(sep);
      const list=document.createElement('div');list.className='standings-list';
      sorted.slice(3).forEach((item,i)=>{
        const div=document.createElement('div');div.className='standing-item';
        const barPct=maxScore>0?Math.round((item.score/maxScore)*100):0;
        div.innerHTML=`
          <span class="si-rank">#${i+4}</span>
          <span class="si-name">${item.name}</span>
          <div class="si-bar-wrap"><div class="si-bar" style="width:${barPct}%"></div></div>
          <span class="si-score">${item.score}</span>
        `;
        list.appendChild(div);
      });
      body.appendChild(list);
    }
  }

  modal.style.display='flex';
  document.body.style.overflow='hidden';
}

function closeTotals(){
  document.getElementById('grandModal').style.display='none';
  document.body.style.overflow='';
}
function closeModal(e){
  if(e.target===document.getElementById('grandModal'))closeTotals();
}

function confirmClear(){if(confirm(T('confirmClear'))){['rt6','rtLang'].forEach(k=>localStorage.removeItem(k));location.reload();}}
function removeMatch(tid){
  if(tables.length===1){alert('min 1');return;}if(!confirm(T('confirmRemove')))return;
  tables=tables.filter(t=>t.id!==tid);save();document.querySelector(`.match-block[data-tid="${tid}"]`)?.remove();updateLeaderboard();
}
function addMatch(){const t=mkTable(4);tables.push(t);save();const dom=buildTable(t);document.getElementById('tablesArea').appendChild(dom);dom.scrollIntoView({behavior:'smooth',block:'start'});recalcBlock(t.id);updateLeaderboard();}

// ── EXPORT EXCEL ──
async function exportExcel(){
  if(typeof ExcelJS==='undefined'){alert('ExcelJS not loaded');return;}
  const wb=new ExcelJS.Workbook();const ws=wb.addWorksheet('Race Tracker');
  const maxPc=Math.max(...tables.map(t=>t.playerCount||4));
  const allNames=[];
  for(let p=0;p<maxPc;p++){const fn=tables.map(t=>(t.players[p]||'').trim()).find(n=>n)||`P${p+1}`;allNames.push(fn);}
  const cols=2+maxPc*2;
  ws.mergeCells(1,1,1,cols);const tC=ws.getCell(1,1);tC.value=T('title');tC.font={bold:true,size:14,color:{argb:'FFFFFFFF'}};tC.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};tC.alignment={horizontal:'center',vertical:'middle'};ws.getRow(1).height=36;
  ws.getCell(2,1).value='#';ws.getCell(2,2).value=T('matchLabel');
  [ws.getCell(2,1),ws.getCell(2,2)].forEach(c=>{c.font={bold:true,color:{argb:'FFFFFFFF'}};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E293B'}};c.alignment={horizontal:'center'};});
  allNames.forEach((name,i)=>{const tc2=3+i*2,pc2=4+i*2;ws.mergeCells(2,tc2,2,pc2);const nc=ws.getCell(2,tc2);nc.value=name;nc.font={bold:true,size:11};nc.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1E3A5F'}};nc.alignment={horizontal:'center'};ws.getCell(3,tc2).value='Time';ws.getCell(3,pc2).value=T('pts');[ws.getCell(3,tc2),ws.getCell(3,pc2)].forEach(c=>{c.font={bold:true};c.alignment={horizontal:'center'};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF0F2744'}};});});
  ws.getRow(2).height=24;ws.getRow(3).height=20;
  let rn=4;
  tables.forEach((tObj,ti)=>{
    const pc=tObj.playerCount||4;
    for(let r=0;r<ROWS;r++){
      const row=tObj.rows[r];const scores=calcScores(row,r,pc);
      const parsed=row.times.slice(0,pc).map(t=>parseTime(t));
      const valid=parsed.filter(t=>t!==null);const best=valid.length?Math.min(...valid):null;
      const isKR=r in KM&&KM[r]<pc;const kp=isKR?KM[r]:-1;
      const ml=`${T('matchLabel')} ${ti+1} - ${T('round')} ${r+1}${row.stage?` (${row.stage})`:''}`;
      ws.getCell(rn,1).value=rn-3;ws.getCell(rn,2).value=ml;ws.getCell(rn,2).font={bold:true};
      for(let p=0;p<maxPc;p++){
        const tc2=3+p*2,pc2=4+p*2;const tv=p<pc?row.times[p]:'';const sv=p<pc&&scores[p]!==null?scores[p]:0;
        ws.getCell(rn,tc2).value=tv||'';ws.getCell(rn,pc2).value=tv?sv:0;
        [ws.getCell(rn,tc2),ws.getCell(rn,pc2)].forEach(c=>c.alignment={horizontal:'center'});
        if(p<pc&&parsed[p]!==null&&parsed[p]===best){const fl=isKR&&p===kp?{type:'pattern',pattern:'solid',fgColor:{argb:'FFFF6666'}}:{type:'pattern',pattern:'solid',fgColor:{argb:'FFFFFF99'}};ws.getCell(rn,tc2).fill=fl;ws.getCell(rn,pc2).fill=fl;ws.getCell(rn,pc2).font={bold:true};}
      }rn++;
    }
    const mt=Array(pc).fill(0);tObj.rows.forEach((row2,r2)=>{calcScores(row2,r2,pc).forEach((s,p)=>{if(s!==null)mt[p]+=s;});});
    ws.mergeCells(rn,1,rn,2);ws.getCell(rn,1).value=`${T('grandTotal')} (${T('matchLabel')} ${ti+1})`;ws.getCell(rn,1).font={bold:true,italic:true};ws.getCell(rn,1).alignment={horizontal:'right'};
    for(let p=0;p<maxPc;p++){const tc2=3+p*2,pc2=4+p*2;ws.mergeCells(rn,tc2,rn,pc2);const c=ws.getCell(rn,tc2);c.value=p<pc?mt[p]:0;c.font={bold:true,size:12};c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF2CC'}};c.alignment={horizontal:'center'};}rn++;
  });
  ws.getColumn(1).width=6;ws.getColumn(2).width=35;allNames.forEach((_,i)=>{ws.getColumn(3+i*2).width=13;ws.getColumn(4+i*2).width=8;});
  ws.eachRow((row,rNum)=>{if(rNum<2)return;row.eachCell(c=>{if(c.value===undefined||c.value===null)return;c.border={top:{style:'thin'},left:{style:'thin'},bottom:{style:'thin'},right:{style:'thin'}};});});
  const buf=await wb.xlsx.writeBuffer();const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`race_tracker_${Date.now()}.xlsx`;a.click();URL.revokeObjectURL(a.href);
}
document.getElementById('btnExcel').addEventListener('click',exportExcel);

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=T(el.dataset.i18n));
  document.getElementById('globeLabel').textContent=T('globeLabel');
  document.querySelectorAll('.lang-opt').forEach(o=>o.classList.toggle('active',o.dataset.lang===lang));
  buildTitle();rebuildAll();
}
const gBtn=document.getElementById('globeBtn'),lDd=document.getElementById('langDd');
gBtn.addEventListener('click',e=>{e.stopPropagation();const o=lDd.classList.contains('open');lDd.classList.toggle('open',!o);gBtn.classList.toggle('open',!o);});
document.addEventListener('click',()=>{lDd.classList.remove('open');gBtn.classList.remove('open');});
lDd.addEventListener('click',e=>{const opt=e.target.closest('.lang-opt');if(!opt)return;lang=opt.dataset.lang;save();applyLang();lDd.classList.remove('open');gBtn.classList.remove('open');});

function buildTitle(){
  const txt=T('title'),h1=document.getElementById('mainTitle');h1.innerHTML='';
  [...txt].forEach(c=>{const s=document.createElement('span');s.className='ch';s.textContent=c===' '?'\u00A0':c;h1.appendChild(s);});
}

// ── THEME TOGGLE ──
let currentTheme = localStorage.getItem('rtTheme') || 'dark';
function applyTheme(t){
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  const icon = document.getElementById('themeIcon');
  const lbl = document.getElementById('themeLabel');
  if(icon){ icon.textContent = t === 'dark' ? '☀️' : '🌙'; }
  if(lbl){ lbl.textContent = t === 'dark' ? 'Light' : 'Dark'; }
  localStorage.setItem('rtTheme', t);
}
function toggleTheme(){
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeTotals();});
applyTheme(currentTheme);
loadState();

tables.forEach(t=>document.getElementById('tablesArea').appendChild(buildTable(t)));
recalcAll();updateLeaderboard();
